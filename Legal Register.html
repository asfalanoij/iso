function LRModal({item,isNew,onSave,onClose}){
  const [f,setF]=useState(item);
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const Row=({label,children})=><div style={{marginBottom:12}}>
    <label style={{fontSize:11,fontWeight:700,color:'var(--gray-600)',display:'block',marginBottom:4,textTransform:'uppercase',letterSpacing:.4}}>{label}</label>
    {children}
  </div>;
  const jKeys=Object.keys(JURISDICTIONS);
  const sKeys=Object.keys(STD_ABBR);
  return <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.45)',zIndex:300,display:'flex',alignItems:'center',justifyContent:'center',padding:20}} onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div style={{background:'#fff',borderRadius:12,boxShadow:'0 20px 60px rgba(0,0,0,.2)',width:'100%',maxWidth:660,maxHeight:'92vh',overflowY:'auto'}}>
      <div style={{padding:'16px 24px',borderBottom:'1px solid var(--gray-200)',display:'flex',justifyContent:'space-between',alignItems:'center',position:'sticky',top:0,background:'#fff',zIndex:1}}>
        <div style={{fontWeight:800,fontSize:16,color:'var(--navy)'}}>{isNew?'Add Regulatory Requirement':'Edit Regulatory Requirement'}</div>
        <button onClick={onClose} style={{fontSize:22,color:'var(--gray-500)',lineHeight:1,cursor:'pointer'}}>×</button>
      </div>
      <div style={{padding:'20px 24px'}}>
        <Row label="Regulation / Law Name"><input value={f.name} onChange={e=>set('name',e.target.value)} placeholder="Full name of law, regulation, or standard" /></Row>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          <Row label="Document Link (URL)"><input value={f.docLink||''} onChange={e=>set('docLink',e.target.value)} placeholder="https://..." /></Row>
          <Row label="Mandatory Reason"><input value={f.mandatoryReason||''} onChange={e=>set('mandatoryReason',e.target.value)} placeholder="Why is it mandatory?" /></Row>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12}}>
          <Row label="Jurisdiction"><select value={f.jurisdiction} onChange={e=>set('jurisdiction',e.target.value)}>
            {jKeys.map(k=><option key={k} value={k}>{JURISDICTIONS[k].flag} {JURISDICTIONS[k].label}</option>)}
          </select></Row>
          <Row label="Type"><select value={f.type} onChange={e=>set('type',e.target.value)}>
            {Object.entries(TYPES).map(([k,v])=><option key={k} value={k}>{v}</option>)}
          </select></Row>
          <Row label="Priority"><select value={f.priority} onChange={e=>set('priority',e.target.value)}>
            {Object.keys(PRIORITY).map(k=><option key={k} value={k}>{PRIORITY[k].label}</option>)}
          </select></Row>
        </div>
        <Row label="Applicable ISO Standards">
          <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
            {sKeys.map(sid=>{const sel=(f.standardIds||[]).includes(sid);return <button key={sid} onClick={()=>set('standardIds',sel?(f.standardIds||[]).filter(x=>x!==sid):[...(f.standardIds||[]),sid])} style={{padding:'4px 10px',borderRadius:6,fontSize:11,fontWeight:700,border:`2px solid ${sel?STD_COLOR[sid]:'var(--gray-300)'}`,background:sel?`${STD_COLOR[sid]}18`:'#fff',color:sel?STD_COLOR[sid]:'var(--gray-500)',cursor:'pointer'}}>{STD_ABBR[sid]}</button>;})}
          </div>
        </Row>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          <Row label="HLS Clause(s)"><input value={f.clause} onChange={e=>set('clause',e.target.value)} placeholder="e.g. 4.2, 9.1.2" /></Row>
          <Row label="Compliance Status"><select value={f.status} onChange={e=>set('status',e.target.value)}>
            {Object.entries(COMPLIANCE_STATUS).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
          </select></Row>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12}}>
          <Row label="Owner / Team"><select value={f.owner} onChange={e=>set('owner',e.target.value)}>
            {OWNERS.map(o=><option key={o}>{o}</option>)}
          </select></Row>
          <Row label="Last Review"><input type="date" value={f.lastReview} onChange={e=>set('lastReview',e.target.value)} /></Row>
          <Row label="Next Review"><input type="date" value={f.nextReview} onChange={e=>set('nextReview',e.target.value)} /></Row>
        </div>
        <Row label="Review Frequency"><select value={f.frequency} onChange={e=>set('frequency',e.target.value)}>
          {FREQ.map(fr=><option key={fr}>{fr}</option>)}
        </select></Row>
        <Row label="Compliance Evidence"><textarea value={f.evidence} onChange={e=>set('evidence',e.target.value)} style={{minHeight:60,resize:'vertical'}} placeholder="What evidence demonstrates compliance?" /></Row>
        <Row label="Action Required"><textarea value={f.action} onChange={e=>set('action',e.target.value)} style={{minHeight:60,resize:'vertical'}} placeholder="Gaps and required actions" /></Row>
        <Row label="Notes"><textarea value={f.notes} onChange={e=>set('notes',e.target.value)} style={{minHeight:50,resize:'vertical'}} /></Row>
      </div>
      <div style={{padding:'14px 24px',borderTop:'1px solid var(--gray-200)',display:'flex',justifyContent:'flex-end',gap:10,position:'sticky',bottom:0,background:'#fff'}}>
        <button onClick={onClose} style={{padding:'8px 18px',borderRadius:7,border:'1px solid var(--gray-300)',color:'var(--gray-700)',fontSize:13,fontWeight:600,cursor:'pointer'}}>Cancel</button>
        <button onClick={()=>onSave(f)} disabled={!f.name} style={{padding:'8px 20px',borderRadius:7,background:f.name?'var(--navy)':'var(--gray-200)',color:f.name?'#fff':'var(--gray-500)',fontSize:13,fontWeight:700,cursor:f.name?'pointer':'not-allowed'}}>{isNew?'Add':'Save'}</button>
      </div>
    </div>
  </div>;
}

function App(){
  const [items,setItems]=useState(()=>GRCStore.getLegalReqs());
  const [modal,setModal]=useState(null);
  const [filterJur,setFilterJur]=useState('');
  const [filterStatus,setFilterStatus]=useState('');
  const [filterPriority,setFilterPriority]=useState('');
  const [filterStd,setFilterStd]=useState('');
  const [expandedId,setExpandedId]=useState(null);
  const [view,setView]=useState('table');
  const [activeReason,setActiveReason]=useState(null);

  useEffect(()=>{ const h=()=>setItems(GRCStore.getLegalReqs()); GRCStore.on('change',h); return ()=>GRCStore.off('change',h); },[]);

  const filtered=useMemo(()=>items.filter(r=>{
    if(filterJur&&r.jurisdiction!==filterJur)return false;
    if(filterStatus&&r.status!==filterStatus)return false;
    if(filterPriority&&r.priority!==filterPriority)return false;
    if(filterStd&&!(r.standardIds||[]).includes(filterStd))return false;
    return true;
  }),[items,filterJur,filterStatus,filterPriority,filterStd]);

  const stats=useMemo(()=>{
    const s={compliant:0,partial:0,'non-compliant':0,monitoring:0,'not-assessed':0,critical:0};
    items.forEach(r=>{s[r.status]=(s[r.status]||0)+1;if(r.priority==='critical')s.critical++;});
    return s;
  },[items]);

  const save=(form)=>{
    GRCStore.upsertLegalReq(modal.isNew?form:{...modal.item,...form});
    setItems(GRCStore.getLegalReqs());
    setModal(null);
  };

  const blank={jurisdiction:'ID',name:'',docLink:'',mandatoryReason:'',type:'mandatory',priority:'high',standardIds:['iso27001'],clause:'4.2',status:'not-assessed',owner:'Legal',lastReview:'',nextReview:'',frequency:'Annual',evidence:'',action:'',notes:''};

  const jurGroups=Object.keys(JURISDICTIONS);

  return <div style={{minHeight:'100vh',background:'var(--gray-50)'}}>
    {/* Notion-Style Header */}
    <div style={{background:'#fff', borderBottom:'1px solid var(--gray-200)', padding:'24px 28px'}}>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:24}}>
        <div>
          <div style={{display:'flex', alignItems:'center', gap:8, color:'var(--gray-500)', fontSize:12, marginBottom:4}}>
            <span>ISO Certification 2026</span>
            <span>/</span>
            <span style={{fontWeight:600, color:'var(--gray-900)'}}>Legal Register</span>
          </div>
          <div style={{fontSize:24, fontWeight:800, color:'var(--gray-900)', letterSpacing:'-0.5px'}}>Legal & Regulatory Compliance</div>
          <div style={{fontSize:13, color:'var(--gray-500)', marginTop:4}}>7 Jurisdictions · ID · SG · HK · TW · TL · AU · USA</div>
        </div>
        <div style={{display:'flex', gap:10}}>
          <button onClick={()=>setModal({item:blank,isNew:true})} style={{padding:'8px 20px', borderRadius:'var(--radius-pill)', background:'var(--navy)', color:'#fff', fontWeight:700, fontSize:13, border:'none', boxShadow:'var(--shadow-sm)'}}>+ New Regulation</button>
          <a href="Dashboard.html" style={{padding:'8px 16px', borderRadius:6, border:'1px solid var(--gray-200)', color:'var(--gray-700)', textDecoration:'none', fontSize:13, fontWeight:600, display:'flex', alignItems:'center', gap:6}}>
            <span>←</span> Dashboard
          </a>
        </div>
      </div>

      {/* Bento Highlights */}
      <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(130px, 1fr))', gap:16, marginBottom:8}}>
        {[
          { label: 'Total Regulations', val: items.length, color: 'var(--gray-900)', sub: 'Global compliance assets' },
          { label: 'Critical Priority', val: stats.critical, color: '#E2001A', sub: 'High-risk exposure' },
          { label: 'Compliant', val: stats.compliant, color: '#059669', sub: 'Requirements met' },
          { label: 'Partial Coverage', val: stats.partial, color: '#D97706', sub: 'Gaps existing' },
          { label: 'Non-Compliant', val: stats['non-compliant'], color: '#DC2626', sub: 'Urgent action' },
          { label: 'Not Assessed', val: stats['not-assessed'], color: '#868685', sub: 'Pending review' },
        ].map(kpi => (
          <div key={kpi.label} style={{
            background: '#fff', border: '1px solid var(--gray-200)', borderRadius: 'var(--radius-lg)',
            padding: '16px 20px', transition: 'all 0.2s',
            boxShadow: '0 1px 2px rgba(0,0,0,0.05)'
          }}
          onMouseEnter={e => { e.currentTarget.style.borderColor = '#d4d4d4'; e.currentTarget.style.background = '#f9fafb'; }}
          onMouseLeave={e => { e.currentTarget.style.borderColor = 'var(--gray-200)'; e.currentTarget.style.background = '#fff'; }}
          >
            <div style={{fontSize:10, fontWeight:700, color:'var(--gray-500)', textTransform:'uppercase', letterSpacing:0.8, marginBottom:8}}>{kpi.label}</div>
            <div style={{fontSize:28, fontWeight:800, color:kpi.color, lineHeight:1, letterSpacing:'-1px'}}>{kpi.val}</div>
            <div style={{fontSize:11, color:'var(--gray-500)', marginTop:6, fontWeight:500}}>{kpi.sub}</div>
          </div>
        ))}
      </div>
    </div>

    {/* Filters */}
    <div style={{background:'#fff',borderBottom:'1px solid var(--gray-200)',padding:'10px 28px',display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
      <select value={filterJur} onChange={e=>setFilterJur(e.target.value)} style={{width:'auto',padding:'6px 10px',fontSize:12}}>
        <option value="">All Jurisdictions</option>
        {jurGroups.map(k=><option key={k} value={k}>{JURISDICTIONS[k].flag} {JURISDICTIONS[k].label}</option>)}
      </select>
      <select value={filterPriority} onChange={e=>setFilterPriority(e.target.value)} style={{width:'auto',padding:'6px 10px',fontSize:12}}>
        <option value="">All Priorities</option>
        {Object.entries(PRIORITY).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
      </select>
      <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)} style={{width:'auto',padding:'6px 10px',fontSize:12}}>
        <option value="">All Statuses</option>
        {Object.entries(COMPLIANCE_STATUS).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
      </select>
      <select value={filterStd} onChange={e=>setFilterStd(e.target.value)} style={{width:'auto',padding:'6px 10px',fontSize:12}}>
        <option value="">All Standards</option>
        {Object.entries(STD_ABBR).map(([k,v])=><option key={k} value={k}>{v}</option>)}
      </select>
      {(filterJur||filterStatus||filterPriority||filterStd)&&<button onClick={()=>{setFilterJur('');setFilterStatus('');setFilterPriority('');setFilterStd('');}} style={{fontSize:12,color:'var(--red)',fontWeight:600,padding:'4px 8px',cursor:'pointer'}}>Clear ×</button>}
      <span style={{marginLeft:'auto',fontSize:12,color:'var(--gray-500)'}}>{filtered.length} of {items.length} requirements · Click to expand</span>
    </div>

    <div style={{padding:'20px 28px'}}>
      {view==='map'?(
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14}}>
          {jurGroups.map(jk=>{
            const j=JURISDICTIONS[jk];
            const jItems=filtered.filter(r=>r.jurisdiction===jk);
            if(!jItems.length)return null;
            const nc=jItems.filter(r=>r.priority==='critical'&&r.status!=='compliant').length;
            return <div key={jk} style={{background:'#fff',borderRadius:'var(--radius)',boxShadow:'var(--shadow)',padding:16,borderTop:`3px solid ${j.color}`}}>
              <div style={{fontSize:20,marginBottom:4}}>{j.flag}</div>
              <div style={{fontWeight:700,fontSize:14,color:'var(--navy)'}}>{j.label}</div>
              <div style={{fontSize:12,color:'var(--gray-500)',marginBottom:10}}>{jItems.length} requirements{nc>0&&<span style={{color:'var(--red)',fontWeight:700}}> · {nc} critical gaps</span>}</div>
              {jItems.map(r=><div key={r.id} style={{padding:'6px 8px',borderRadius:6,marginBottom:4,background:'var(--gray-50)',display:'flex',justifyContent:'space-between',alignItems:'center',gap:6}}>
                <div style={{fontSize:11,color:'var(--gray-700)',fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1}}>
                  {r.name}
                  <a href={r.docLink||`https://www.google.com/search?q=${encodeURIComponent(r.name)}`} target="_blank" style={{marginLeft:6,textDecoration:'none'}} title="View Real Document">📄</a>
                  <span onClick={e=>{e.stopPropagation();setActiveReason(r.mandatoryReason||r.notes||'Mandatory regulatory compliance requirement.');}} style={{marginLeft:6,cursor:'pointer'}} title="Why is this mandatory?">🚨</span>
                </div>
                <StatusBadge status={r.status} />
              </div>)}
            </div>;
          })}
        </div>
      ):(
        <div style={{background:'#fff',borderRadius:'var(--radius)',boxShadow:'var(--shadow)',overflow:'hidden'}}>
          <table style={{width:'100%',borderCollapse:'collapse'}}>
            <thead>
              <tr style={{background:'var(--gray-50)',borderBottom:'2px solid var(--gray-200)'}}>
                {['ID','Jurisdiction','Regulation / Law','Standards','Priority','Clause','Owner','Status','Next Review',''].map(h=>
                  <th key={h} style={{textAlign:'left',padding:'10px 10px',fontSize:11,fontWeight:700,color:'var(--gray-500)',textTransform:'uppercase',letterSpacing:.4,whiteSpace:'nowrap'}}>{h}</th>
                )}
              </tr>
            </thead>
            <tbody>
              {filtered.length===0&&<tr><td colSpan={10} style={{padding:40,textAlign:'center',color:'var(--gray-500)'}}>No requirements match your filters.</td></tr>}
              {filtered.map((r,i)=>{
                const j=JURISDICTIONS[r.jurisdiction]||{flag:'?',label:'?'};
                const expanded=expandedId===r.id;
                const overdue=r.nextReview&&new Date(r.nextReview)<new Date()&&r.status!=='compliant';
                return [
                  <tr key={r.id} onClick={()=>setExpandedId(expanded?null:r.id)} style={{borderBottom:'1px solid var(--gray-100)',cursor:'pointer',background:expanded?'var(--gray-50)':'#fff'}}
                    onMouseEnter={e=>!expanded&&(e.currentTarget.style.background='var(--gray-50)')}
                    onMouseLeave={e=>!expanded&&(e.currentTarget.style.background='#fff')}>
                    <td style={{padding:'10px 10px',fontFamily:'var(--mono)',fontSize:10,color:'var(--gray-500)'}}>{r.id}</td>
                    <td style={{padding:'10px 10px',whiteSpace:'nowrap'}}><span style={{fontSize:16}}>{j.flag}</span> <span style={{fontSize:11,fontWeight:600,color:j.color}}>{r.jurisdiction}</span></td>
                    <td style={{padding:'10px 10px',maxWidth:260}}><div style={{fontWeight:600,fontSize:12,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                        {r.name}
                        <a onClick={e=>e.stopPropagation()} href={r.docLink||`https://www.google.com/search?q=${encodeURIComponent(r.name)}`} target="_blank" style={{marginLeft:6,textDecoration:'none'}} title="View Real Document">📄</a>
                        <span onClick={e=>{e.stopPropagation();setActiveReason(r.mandatoryReason||r.notes||'Mandatory regulatory compliance requirement.');}} style={{marginLeft:6,cursor:'pointer'}} title="Why is this mandatory?">🚨</span>
                      </div>
                      <div style={{fontSize:10,color:r.type==='mandatory'?'var(--red)':'var(--gray-500)',fontWeight:500,marginTop:1,textTransform:'uppercase'}}>{TYPES[r.type]}</div>
                    </td>
                    <td style={{padding:'10px 10px'}}><div style={{display:'flex',flexWrap:'wrap',gap:3}}>{(r.standardIds||[]).map(s=><span key={s} style={{background:`${STD_COLOR[s]}18`,color:STD_COLOR[s],borderRadius:4,padding:'1px 5px',fontSize:10,fontWeight:700}}>{STD_ABBR[s]}</span>)}</div></td>
                    <td style={{padding:'10px 10px'}}><PriorityBadge priority={r.priority} /></td>
                    <td style={{padding:'10px 10px',fontFamily:'var(--mono)',fontSize:11,color:'var(--gray-600)'}}>{r.clause}</td>
                    <td style={{padding:'10px 10px',fontSize:11,color:'var(--gray-700)',whiteSpace:'nowrap'}}>{r.owner}</td>
                    <td style={{padding:'10px 10px'}}><StatusBadge status={r.status} /></td>
                    <td style={{padding:'10px 10px',fontSize:11,color:overdue?'var(--red)':'var(--gray-600)',fontWeight:overdue?700:400,whiteSpace:'nowrap'}}>{r.nextReview?new Date(r.nextReview).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'2-digit'}):'—'}{overdue&&' ⚠'}</td>
                    <td style={{padding:'10px 10px'}} onClick={e=>{e.stopPropagation();setModal({item:r,isNew:false});}}><button style={{padding:'4px 10px',borderRadius:5,border:'1px solid var(--gray-300)',fontSize:11,fontWeight:600,color:'var(--gray-700)',cursor:'pointer',background:'#fff'}}>Edit</button></td>
                  </tr>,
                  expanded&&<tr key={`${r.id}-exp`} style={{background:'#F8FAFF',borderBottom:'2px solid var(--gray-200)'}}>
                    <td colSpan={10} style={{padding:'14px 24px'}}>
                      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:14}}>
                        {[{l:'Compliance Evidence',v:r.evidence||'—'},{l:'Action Required',v:r.action||'None'},{l:'Notes',v:r.notes||'—'}].map(f=>
                          <div key={f.l}><div style={{fontSize:10,fontWeight:700,color:f.l==='Action Required'&&r.action?'var(--red)':'var(--gray-500)',textTransform:'uppercase',marginBottom:4}}>{f.l}</div><div style={{fontSize:12,color:'var(--gray-800)',lineHeight:1.5}}>{f.v}</div></div>
                        )}
                      </div>
                    </td>
                  </tr>
                ];
              })}
            </tbody>
          </table>
        </div>
      )}
    </div>

    <div style={{padding:'12px 28px',borderTop:'1px solid var(--gray-200)',display:'flex',gap:16,alignItems:'center'}}>
      <a href="Dashboard.html" style={{fontSize:12,color:'var(--gray-600)',textDecoration:'none',fontWeight:500}}>← Dashboard</a>
      <a href="Risk Register.html" style={{fontSize:12,color:'#2563EB',textDecoration:'none',fontWeight:500}}>Risk Register</a>
      <a href="Audit Checklist.html" style={{fontSize:12,color:'#2563EB',textDecoration:'none',fontWeight:500}}>Audit Checklist</a>
      <button onClick={()=>setView(view==='table'?'map':'table')} style={{fontSize:12,color:'var(--gray-600)',padding:'4px 10px',borderRadius:5,border:'1px solid var(--gray-300)',cursor:'pointer'}}>{view==='table'?'⊞ Map View':'≡ Table View'}</button>
      <button onClick={()=>{if(confirm('Reset Store?')){GRCStore.reset();setItems(GRCStore.getLegalReqs());}}} style={{marginLeft:'auto',fontSize:12,color:'var(--gray-500)',padding:'4px 10px',borderRadius:5,border:'1px solid var(--gray-300)',cursor:'pointer'}}>Reset Store</button>
    </div>

    {modal&&<LRModal item={modal.item} isNew={modal.isNew} onSave={save} onClose={()=>setModal(null)} />}
    {activeReason&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',zIndex:999,display:'flex',alignItems:'center',justifyContent:'center'}} onClick={()=>setActiveReason(null)}>
      <div style={{background:'#fff',padding:24,borderRadius:12,maxWidth:400,boxShadow:'0 20px 40px rgba(0,0,0,0.2)'}} onClick={e=>e.stopPropagation()}>
         <div style={{fontSize:18,fontWeight:800,marginBottom:8,color:'var(--red)',display:'flex',alignItems:'center',gap:8}}><span>🚨</span> Mandatory Requirement</div>
         <div style={{fontSize:13,color:'var(--gray-800)',lineHeight:1.5,marginBottom:20}}>{activeReason}</div>
         <button onClick={()=>setActiveReason(null)} style={{width:'100%',padding:'10px',background:'var(--navy)',color:'#fff',borderRadius:6,fontWeight:600,cursor:'pointer'}}>Understood</button>
      </div>
    </div>}
  </div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script></body></html>
