<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" integrity="sha384-JcnsjUPPylna1s1fvi1u12X5qjY5OL56iySh75FdtrwhO/SWXgMjoVqcKyIIWOLk" crossorigin="anonymous"></script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy: #0D1B2A; --red: #E2001A;
  --gray-50: #f7f7f5; --gray-100: #f1f1f0; --gray-200: #e9ecef;
  --gray-300: #dee2e6; --gray-500: #868685; --gray-600: #6c757d;
  --gray-700: #37352f; --gray-900: #050505;
  --font: 'Plus Jakarta Sans', sans-serif; --mono: 'DM Mono', monospace;
  --shadow: 0 1px 3px rgba(15, 15, 15, 0.1); --shadow-sm: 0 1px 2px rgba(15, 15, 15, 0.1);
  --radius: 6px; --radius-lg: 10px;
}
html, body, #root { height: 100%; font-family: var(--font); background: var(--gray-50); color: var(--gray-900); font-size: 13px; }

<body>
<div role="note" style="position:sticky;top:0;z-index:9999;background:linear-gradient(90deg,#fef3c7,#fde68a);color:#78350f;border-bottom:1px solid #f59e0b;padding:8px 16px;font:500 12.5px/1.4 -apple-system,BlinkMacSystemFont,'Plus Jakarta Sans',Inter,sans-serif;text-align:center;letter-spacing:.01em;">
  <strong>MOCK-UP — Brainstorming Simulation.</strong> No data from Telin is used. This prototype is for ideation around <em>ISO One Telin 2026</em>. ISO Crosswalk content may vary.
</div>

<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useMemo } = React;
const STDS = Object.keys(STD_META);

// ─── Helpers ───────────────────────────────────────────────────────────────
function getEvidenceForControl(controlId, evidence) {
  return evidence.filter(e => (e.clauseRefs || []).includes(controlId) || (controlId !== 'SoA' && (e.clauseRefs || []).includes('SoA')));
}

function getControlCoverage(evidence) {
  const allControls = ANNEX_CONTROL_CROSSWALK.flatMap(cat => cat.controls);
  let covered = 0;
  allControls.forEach(c => {
    const evs = getEvidenceForControl(c.id, evidence);
    if (evs.length > 0) covered++;
  });
  return { total: allControls.length, covered, pct: Math.round(covered / allControls.length * 100) };
}

const COV_STYLE = {
  full:     { bg: '#DCFCE7', color: '#15803D', border: '#86EFAC', label: 'Full' },
  extended: { bg: '#EFF6FF', color: '#1D4ED8', border: '#93C5FD', label: 'Extended' },
  partial:  { bg: '#FEF3C7', color: '#92400E', border: '#FCD34D', label: 'Partial' },
  na:       { bg: '#F1F3F5', color: '#ADB5BD', border: '#DEE2E6', label: '—' },
};

const DELTA_STYLE = {
  new:      { bg: '#DCFCE7', color: '#15803D', label: 'NEW' },
  modified: { bg: '#FEF3C7', color: '#92400E', label: 'MODIFIED' },
  moved:    { bg: '#DBEAFE', color: '#1D4ED8', label: 'MOVED' },
  enhanced: { bg: '#F3E8FF', color: '#7C3AED', label: 'ENHANCED' },
  renamed:  { bg: '#F1F3F5', color: '#6B7280', label: 'RENAMED' },
};

// ─── HLS Crosswalk Table ───────────────────────────────────────────────────
function CovCell({ mapping, active, highlight, onClick }) {
  const cov = mapping?.coverage || 'na';
  const s = COV_STYLE[cov];
  return (
    <td onClick={onClick} style={{
      padding: '6px 8px', verticalAlign: 'top', cursor: cov !== 'na' ? 'pointer' : 'default',
      background: active ? s.bg : highlight && cov !== 'na' ? `${s.bg}88` : cov !== 'na' ? '#fff' : '#FAFAFA',
      borderLeft: `3px solid ${active ? s.border : 'transparent'}`,
      transition: 'all .15s', minWidth: 120,
    }}>
      {cov !== 'na' ? (
        <div>
          <span style={{ display: 'inline-block', fontSize: 10, fontWeight: 700, background: active ? s.color : s.bg, color: active ? '#fff' : s.color, borderRadius: 4, padding: '1px 6px', marginBottom: 3 }}>{s.label}</span>
          <div style={{ fontFamily: 'var(--mono)', fontSize: 10, color: active ? '#374151' : '#9CA3AF', lineHeight: 1.3 }}>{mapping?.ref}</div>
          {active && mapping?.note && <div style={{ fontSize: 11, color: '#374151', marginTop: 4, lineHeight: 1.4 }}>{mapping.note}</div>}
        </div>
      ) : <span style={{ color: '#D1D5DB', fontSize: 12 }}>—</span>}
    </td>
  );
}

function HLSTable({ highlightStd }) {
  const [activeCell, setActiveCell] = useState(null);
  return (
    <div style={{ overflowX: 'auto' }}>
      <table style={{ width: '100%', borderCollapse: 'collapse', minWidth: 900 }}>
        <thead style={{ position: 'sticky', top: 0, zIndex: 10 }}>
          <tr>
            <th style={{ background: 'var(--navy)', color: '#fff', padding: '10px 16px', textAlign: 'left', width: 260, fontSize: 12, fontWeight: 700 }}>Clause</th>
            {STDS.map(sid => {
              const s = STD_META[sid]; const isHL = highlightStd === sid;
              return <th key={sid} style={{ background: isHL ? s.color : 'var(--navy)', color: '#fff', padding: '10px 12px', textAlign: 'left', fontSize: 11, fontWeight: 700, borderLeft: '1px solid rgba(255,255,255,.1)', minWidth: 130, transition: 'background .2s' }}>
                <div style={{ fontWeight: 800, marginBottom: 1 }}>{s.abbr}</div>
                <div style={{ fontSize: 10, opacity: .7, fontWeight: 400 }}>{s.short}</div>
              </th>;
            })}
          </tr>
        </thead>
        <tbody>
          {HLS_CLAUSES.map(section => [
            <tr key={`sec-${section.section}`}>
              <td colSpan={8} style={{ background: 'var(--gray-100)', padding: '8px 16px', fontWeight: 700, fontSize: 13, color: 'var(--navy)', borderLeft: '3px solid var(--red)', borderTop: '1px solid var(--gray-200)' }}>
                §{section.section} — {section.title}
              </td>
            </tr>,
            ...section.clauses.map((clause, ci) => {
              const rowKey = `${section.section}-${ci}`;
              return <tr key={rowKey} style={{ borderBottom: '1px solid var(--gray-100)' }}>
                <td style={{ padding: '8px 16px', verticalAlign: 'top', background: '#FAFAFA' }}>
                  <div style={{ fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--red)', fontWeight: 600, marginBottom: 2 }}>{clause.ref}</div>
                  <div style={{ fontWeight: 600, fontSize: 12, color: 'var(--gray-900)', lineHeight: 1.4 }}>{clause.title}</div>
                </td>
                {STDS.map(sid => {
                  const cellKey = `${rowKey}-${sid}`;
                  return <CovCell key={sid} mapping={clause.mapping[sid]} active={activeCell === cellKey} highlight={highlightStd === sid} onClick={() => setActiveCell(activeCell === cellKey ? null : cellKey)} />;
                })}
              </tr>;
            })
          ])}
        </tbody>
      </table>
    </div>
  );
}

// ─── Annex A Controls Tab (93 controls) ────────────────────────────────────
function AnnexControlsTab({ highlightStd, evidence }) {
  const [expanded, setExpanded] = useState({});
  const [expandedControl, setExpandedControl] = useState(null);

  const toggleCat = (catId) => setExpanded(prev => ({ ...prev, [catId]: !prev[catId] }));

  return (
    <div>
      {ANNEX_CONTROL_CROSSWALK.map(cat => {
        const isExpanded = expanded[cat.category] !== false; // default open
        const catEvidence = cat.controls.map(c => ({ ...c, evs: getEvidenceForControl(c.id, evidence) }));
        const covered = catEvidence.filter(c => c.evs.length > 0).length;

        return (
          <div key={cat.category} style={{ marginBottom: 16, border: '1px solid var(--gray-200)', borderRadius: 8, overflow: 'hidden' }}>
            <div onClick={() => toggleCat(cat.category)} style={{ background: 'var(--gray-100)', padding: '12px 16px', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 12, borderBottom: isExpanded ? '1px solid var(--gray-200)' : 'none' }}>
              <span style={{ fontSize: 14, fontWeight: 800, color: 'var(--navy)', minWidth: 40 }}>{cat.category}</span>
              <span style={{ fontWeight: 700, fontSize: 13, color: 'var(--gray-900)', flex: 1 }}>{cat.title} ({cat.count})</span>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <div style={{ width: 120, height: 6, background: '#E5E7EB', borderRadius: 3, overflow: 'hidden' }}>
                  <div style={{ width: `${Math.round(covered / cat.count * 100)}%`, height: '100%', background: covered === cat.count ? '#15803D' : '#3B82F6', borderRadius: 3, transition: 'width .3s' }} />
                </div>
                <span style={{ fontSize: 11, fontWeight: 700, color: covered === cat.count ? '#15803D' : '#3B82F6', minWidth: 50 }}>{covered}/{cat.count}</span>
              </div>
              <span style={{ fontSize: 16, color: 'var(--gray-500)', transform: isExpanded ? 'rotate(180deg)' : 'none', transition: 'transform .2s' }}>▾</span>
            </div>
            {isExpanded && (
              <table style={{ width: '100%', borderCollapse: 'collapse', background: '#fff' }}>
                <tbody>
                  {catEvidence.map(ctrl => {
                    const isActive = expandedControl === ctrl.id;
                    const hasCoverage = ctrl.evs.length > 0;
                    const applicable = !highlightStd || ctrl.applicableStandards.includes(highlightStd);
                    return [
                      <tr key={ctrl.id} onClick={() => setExpandedControl(isActive ? null : ctrl.id)} style={{ borderBottom: '1px solid var(--gray-100)', cursor: 'pointer', opacity: applicable ? 1 : 0.3, transition: 'opacity .2s' }}>
                        <td style={{ padding: '8px 16px', width: 80, fontFamily: 'var(--mono)', fontSize: 11, fontWeight: 600, color: 'var(--red)' }}>{ctrl.id}</td>
                        <td style={{ padding: '8px 12px', fontSize: 12, fontWeight: 600, color: 'var(--gray-900)' }}>{ctrl.title}</td>
                        <td style={{ padding: '8px 12px', width: 200 }}>
                          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 3 }}>
                            {ctrl.applicableStandards.map(sid => (
                              <span key={sid} style={{ background: `${STD_META[sid]?.color || '#666'}18`, color: STD_META[sid]?.color || '#666', borderRadius: 3, padding: '1px 5px', fontSize: 10, fontWeight: 700 }}>{STD_META[sid]?.abbr || sid}</span>
                            ))}
                          </div>
                        </td>
                        <td style={{ padding: '8px 16px', width: 100, textAlign: 'right' }}>
                          {hasCoverage ? (
                            <span style={{ background: '#DCFCE7', color: '#15803D', borderRadius: 4, padding: '2px 8px', fontSize: 10, fontWeight: 700 }}>{ctrl.evs.length} evidence</span>
                          ) : (
                            <span style={{ background: '#FEE2E2', color: '#DC2626', borderRadius: 4, padding: '2px 8px', fontSize: 10, fontWeight: 700 }}>GAP</span>
                          )}
                        </td>
                      </tr>,
                      isActive && (
                        <tr key={`${ctrl.id}-detail`}>
                          <td colSpan={4} style={{ padding: '12px 16px 16px 96px', background: '#FAFBFC', borderBottom: '2px solid var(--gray-200)' }}>
                            {ctrl.note && <div style={{ fontSize: 12, color: 'var(--gray-600)', marginBottom: 8, lineHeight: 1.5 }}>{ctrl.note}</div>}
                            {Object.keys(ctrl.crossRef).length > 0 && (
                              <div style={{ marginBottom: 8 }}>
                                <span style={{ fontSize: 10, fontWeight: 700, color: 'var(--gray-500)', textTransform: 'uppercase' }}>Cross-standard refs: </span>
                                {Object.entries(ctrl.crossRef).map(([sid, ref]) => (
                                  <span key={sid} style={{ marginRight: 8, fontSize: 11 }}>
                                    <span style={{ color: STD_META[sid]?.color || '#666', fontWeight: 700 }}>{STD_META[sid]?.abbr}</span>
                                    <span style={{ color: 'var(--gray-600)' }}> {ref}</span>
                                  </span>
                                ))}
                              </div>
                            )}
                            <div style={{ fontSize: 10, fontWeight: 700, color: 'var(--gray-500)', textTransform: 'uppercase', marginBottom: 4 }}>Linked evidence:</div>
                            {ctrl.evs.length === 0 ? (
                              <div style={{ fontSize: 12, color: '#DC2626', fontWeight: 600 }}>No evidence mapped — audit gap</div>
                            ) : ctrl.evs.map(ev => (
                              <div key={ev.id} style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '4px 0', fontSize: 12 }}>
                                <span style={{ fontFamily: 'var(--mono)', fontSize: 10, color: 'var(--gray-500)', minWidth: 40 }}>{ev.id}</span>
                                <span style={{ fontWeight: 600, color: 'var(--gray-900)' }}>{ev.name}</span>
                                <span style={{
                                  fontSize: 10, fontWeight: 700, borderRadius: 3, padding: '1px 6px',
                                  background: ev.status === 'approved' ? '#DCFCE7' : ev.status === 'in-review' ? '#DBEAFE' : ev.status === 'draft' ? '#FEF3C7' : '#F1F3F5',
                                  color: ev.status === 'approved' ? '#15803D' : ev.status === 'in-review' ? '#1D4ED8' : ev.status === 'draft' ? '#92400E' : '#6B7280',
                                }}>{ev.status}</span>
                                <span style={{ fontSize: 11, color: 'var(--gray-500)' }}>{ev.owner}</span>
                              </div>
                            ))}
                          </td>
                        </tr>
                      )
                    ];
                  })}
                </tbody>
              </table>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ─── Evidence Coverage Tab ─────────────────────────────────────────────────
function EvidenceCoverageTab({ evidence }) {
  const [filterOwner, setFilterOwner] = useState('');
  const owners = [...new Set(evidence.map(e => e.owner))].sort();

  const allControls = useMemo(() => ANNEX_CONTROL_CROSSWALK.flatMap(cat =>
    cat.controls.map(c => ({ ...c, category: cat.category, evs: getEvidenceForControl(c.id, evidence) }))
  ), [evidence]);

  const filtered = filterOwner ? allControls.map(c => ({ ...c, evs: c.evs.filter(e => e.owner === filterOwner) })) : allControls;
  const gaps = filtered.filter(c => c.evs.length === 0);

  return (
    <div>
      <div style={{ display: 'flex', gap: 16, alignItems: 'center', marginBottom: 16, flexWrap: 'wrap' }}>
        <div style={{ display: 'flex', gap: 12 }}>
          {[
            { label: 'Total Controls', val: allControls.length, color: 'var(--navy)' },
            { label: 'Covered', val: allControls.filter(c => c.evs.length > 0).length, color: '#15803D' },
            { label: 'Gaps', val: gaps.length, color: '#DC2626' },
            { label: 'Coverage', val: Math.round(allControls.filter(c => c.evs.length > 0).length / allControls.length * 100) + '%', color: '#3B82F6' },
          ].map(kpi => (
            <div key={kpi.label} style={{ background: '#fff', border: '1px solid var(--gray-200)', borderRadius: 8, padding: '10px 16px', minWidth: 100 }}>
              <div style={{ fontSize: 10, fontWeight: 700, color: 'var(--gray-500)', textTransform: 'uppercase' }}>{kpi.label}</div>
              <div style={{ fontSize: 22, fontWeight: 800, color: kpi.color }}>{kpi.val}</div>
            </div>
          ))}
        </div>
        <select value={filterOwner} onChange={e => setFilterOwner(e.target.value)} style={{ padding: '6px 12px', borderRadius: 6, border: '1px solid var(--gray-300)', fontSize: 12, fontFamily: 'var(--font)' }}>
          <option value="">All owners</option>
          {owners.map(o => <option key={o} value={o}>{o}</option>)}
        </select>
      </div>

      {gaps.length > 0 && (
        <div style={{ background: '#FEF2F2', border: '1px solid #FECACA', borderRadius: 8, padding: '12px 16px', marginBottom: 16 }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: '#DC2626', marginBottom: 6 }}>Audit Gaps — {gaps.length} controls without evidence</div>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4 }}>
            {gaps.map(g => (
              <span key={g.id} style={{ fontFamily: 'var(--mono)', fontSize: 10, background: '#FEE2E2', color: '#DC2626', borderRadius: 3, padding: '2px 6px', fontWeight: 600 }}>{g.id}</span>
            ))}
          </div>
        </div>
      )}

      <table style={{ width: '100%', borderCollapse: 'collapse', background: '#fff', borderRadius: 8, overflow: 'hidden', border: '1px solid var(--gray-200)' }}>
        <thead>
          <tr style={{ background: 'var(--gray-50)' }}>
            <th style={{ padding: '8px 16px', textAlign: 'left', fontSize: 11, fontWeight: 700, color: 'var(--gray-600)', borderBottom: '1px solid var(--gray-200)', width: 80 }}>Control</th>
            <th style={{ padding: '8px 12px', textAlign: 'left', fontSize: 11, fontWeight: 700, color: 'var(--gray-600)', borderBottom: '1px solid var(--gray-200)' }}>Title</th>
            <th style={{ padding: '8px 12px', textAlign: 'left', fontSize: 11, fontWeight: 700, color: 'var(--gray-600)', borderBottom: '1px solid var(--gray-200)' }}>Evidence</th>
            <th style={{ padding: '8px 16px', textAlign: 'center', fontSize: 11, fontWeight: 700, color: 'var(--gray-600)', borderBottom: '1px solid var(--gray-200)', width: 80 }}>Status</th>
          </tr>
        </thead>
        <tbody>
          {filtered.map(ctrl => {
            const bestStatus = ctrl.evs.length === 0 ? 'gap' : ctrl.evs.some(e => e.status === 'approved') ? 'approved' : ctrl.evs.some(e => e.status === 'in-review') ? 'in-review' : ctrl.evs.some(e => e.status === 'draft') ? 'draft' : 'not-started';
            const statusColor = { gap: '#DC2626', approved: '#15803D', 'in-review': '#1D4ED8', draft: '#92400E', 'not-started': '#6B7280' };
            const statusBg = { gap: '#FEE2E2', approved: '#DCFCE7', 'in-review': '#DBEAFE', draft: '#FEF3C7', 'not-started': '#F1F3F5' };
            return (
              <tr key={ctrl.id} style={{ borderBottom: '1px solid var(--gray-100)' }}>
                <td style={{ padding: '6px 16px', fontFamily: 'var(--mono)', fontSize: 11, fontWeight: 600, color: 'var(--red)' }}>{ctrl.id}</td>
                <td style={{ padding: '6px 12px', fontSize: 12, color: 'var(--gray-900)' }}>{ctrl.title}</td>
                <td style={{ padding: '6px 12px' }}>
                  <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4 }}>
                    {ctrl.evs.length === 0 ? <span style={{ fontSize: 11, color: '#DC2626', fontWeight: 600 }}>—</span> :
                      ctrl.evs.map(ev => <span key={ev.id} style={{ fontSize: 10, fontWeight: 600, color: 'var(--gray-600)', background: 'var(--gray-100)', borderRadius: 3, padding: '1px 5px' }}>{ev.id}</span>)}
                  </div>
                </td>
                <td style={{ padding: '6px 16px', textAlign: 'center' }}>
                  <span style={{ fontSize: 10, fontWeight: 700, borderRadius: 3, padding: '2px 8px', background: statusBg[bestStatus], color: statusColor[bestStatus] }}>{bestStatus === 'gap' ? 'GAP' : bestStatus}</span>
                </td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

// ─── ISO 37001 Delta Tab ───────────────────────────────────────────────────
function DeltaTab() {
  const [expandedItem, setExpandedItem] = useState(null);
  const d = ISO37001_DELTA;

  return (
    <div>
      <div style={{ background: '#fff', border: '1px solid var(--gray-200)', borderRadius: 8, padding: '20px', marginBottom: 20 }}>
        <div style={{ fontSize: 16, fontWeight: 800, color: 'var(--navy)', marginBottom: 8 }}>ISO 37001:2025 — Transition from 2016</div>
        <div style={{ fontSize: 13, color: 'var(--gray-600)', marginBottom: 16, lineHeight: 1.5 }}>{d.strategy.telinContext}</div>
        <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap', marginBottom: 16 }}>
          {[
            { label: 'New Clauses', val: d.summary.newClauses, color: '#15803D' },
            { label: 'Modified', val: d.summary.modifiedClauses, color: '#92400E' },
            { label: 'Moved', val: d.summary.movedClauses, color: '#1D4ED8' },
            { label: 'Enhanced', val: d.summary.enhanced, color: '#7C3AED' },
            { label: 'Renamed', val: d.summary.renamed, color: '#6B7280' },
          ].map(k => (
            <div key={k.label} style={{ background: '#FAFAFA', border: '1px solid var(--gray-200)', borderRadius: 8, padding: '10px 16px', minWidth: 90, textAlign: 'center' }}>

// ─── Crosswalk export helpers (CSV + A4 PDF) ──────────────────────────────
const FOOTER_TEXT = 'ISO 2026 readiness  |  made by rudy.prasetiya@telin.net  |  April, 2026';

function downloadBlob(content, filename, mime) {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function csvEscape(v) {
  if (v == null) return '';
  const s = String(v);
  return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
}

function buildCrosswalkCSV(data) {
  const rows = [];
  rows.push(['standard_id', 'standard_code', 'standard_name', 'hs_revision', 'clause_or_extension_ref', 'title', 'kind', 'notes', 'deviation_summary'].map(csvEscape).join(','));
  // HS skeleton rows
  data.harmonized_structure.clauses.forEach(c => {
    if (!c.subclauses) return;
    c.subclauses.forEach(sc => {
      rows.push(['_HS_SPINE', 'Harmonized Structure', data.harmonized_structure.version_in_use_for_skeleton, '2022 HS', sc.id, sc.title, 'hs_spine', sc.notes || '', ''].map(csvEscape).join(','));
      if (sc.children) sc.children.forEach(ch => {
        rows.push(['_HS_SPINE', 'Harmonized Structure', data.harmonized_structure.version_in_use_for_skeleton, '2022 HS', ch.id, ch.title, 'hs_spine_child', ch.notes || '', ''].map(csvEscape).join(','));
      });
    });
  });
  // Per-standard extensions
  data.standards.forEach(s => {
    (s.extensions_beyond_hs || []).forEach(ext => {
      rows.push([s.id, s.code, s.name, s.hs_revision_followed, ext.ref, ext.title, 'extension', ext.notes || '', s.deviation_notes || ''].map(csvEscape).join(','));
    });
    if (s.annex_controls && s.annex_controls.themes) {
      s.annex_controls.themes.forEach(t => {
        rows.push([s.id, s.code, s.name, s.hs_revision_followed, t.id, `${t.title} (${t.count} controls)`, 'annex_theme', '', s.deviation_notes || ''].map(csvEscape).join(','));
      });
    }
  });
  return rows.join('\n');
}

function buildCrosswalkPDF(data) {
  if (!window.jspdf || !window.jspdf.jsPDF) {
    alert('PDF library failed to load. Check your network and CSP.');

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'portrait' });
  const pageW = doc.internal.pageSize.getWidth();
  const pageH = doc.internal.pageSize.getHeight();
  const M = 16;
  let y;

  const drawFooter = () => {
    const total = doc.getNumberOfPages();
    for (let i = 1; i <= total; i++) {
      doc.setPage(i);
      doc.setFontSize(8); doc.setTextColor(120);
      doc.setDrawColor(220); doc.line(M, pageH - 12, pageW - M, pageH - 12);
      doc.text(FOOTER_TEXT, pageW / 2, pageH - 7, { align: 'center' });
      doc.text(`Page ${i} / ${total}`, pageW - M, pageH - 7, { align: 'right' });

  // Title page
  doc.setFillColor(15, 23, 42); doc.rect(0, 0, pageW, 48, 'F');
  doc.setTextColor(255); doc.setFontSize(20); doc.setFont('helvetica', 'bold');

  doc.setFontSize(12); doc.setFont('helvetica', 'normal');
  doc.text('Harmonized Structure mapping for 7 management system standards', M, 30);
  doc.setFontSize(9); doc.setTextColor(200);
  doc.text(`Generated ${data.metadata.generated}  ·  Spec v${data.metadata.version}`, M, 38);

  doc.setTextColor(40); y = 58;
  doc.setFontSize(10); doc.setFont('helvetica', 'bold');
  doc.text('Scope', M, y); y += 5;
  doc.setFont('helvetica', 'normal'); doc.setFontSize(9);
  const scopeLines = doc.splitTextToSize(
    'This document maps the seven ISO/IEC management system standards in scope of the Telin ISO Programme 2026 onto the Harmonized Structure (HS, formerly Annex SL Appendix 2). It captures HS revision adopted, standard-specific subclause extensions, and key deviation notes per standard. Use as a brainstorming aid; final clause-by-clause crosswalk validation is the responsibility of an accredited certification body (Intertek, BSI, DNV, TUEV, SGS, BV).',
    pageW - 2 * M
  );
  doc.text(scopeLines, M, y); y += scopeLines.length * 4.5 + 4;

  doc.setFont('helvetica', 'bold'); doc.setFontSize(10);
  doc.text('Disclaimer', M, y); y += 5;
  doc.setFont('helvetica', 'normal'); doc.setFontSize(9);
  const discLines = doc.splitTextToSize(
    'MOCK-UP — Brainstorming simulation. No data from Telin is used. ISO Crosswalk content may vary across iterations. Title-and-structure level reconstructed from secondary authoritative summaries (BSI, DNV, DQS, NQA, SGS, ANSI, Advisera, PECB, Amtivo). Not a substitute for the normative text of the ISO standards (copyrighted; available via ISO Store / ANSI / BSI Knowledge).',
    pageW - 2 * M
  );

  // Summary table
  doc.setFont('helvetica', 'bold'); doc.setFontSize(11);
  doc.text('Standards in scope', M, y); y += 3;
  doc.autoTable({
    startY: y + 2,
    margin: { left: M, right: M, bottom: 16 },
    head: [['#', 'Family', 'Code', 'HS revision', 'Extensions', 'Annex']],
    body: data.standards.map((s, i) => [
      i + 1,
      ({iso27001:'ISMS', iso27701:'PIMS', iso20000_1:'ITSMS', iso22301:'BCMS', iso37001_2016:'ABMS', iso37001_2025:'ABMS', iso45001:'OHSMS', iso50001:'EnMS'}[s.id] || ''),
      s.code,
      (s.hs_revision_followed || '').slice(0, 32),
      (s.extensions_beyond_hs || []).length,
      s.annex_controls ? (s.annex_controls.total_controls ? `${s.annex_controls.total_controls} ctrls` : 'see annex') : '—',
    ]),
    styles: { fontSize: 8, cellPadding: 2 },
    headStyles: { fillColor: [37, 99, 235], textColor: 255, fontStyle: 'bold' },
    alternateRowStyles: { fillColor: [248, 250, 252] },
  });

  // HS skeleton page
  doc.addPage();
  doc.setFont('helvetica', 'bold'); doc.setFontSize(14); doc.setTextColor(15, 23, 42);

  doc.setFontSize(9); doc.setFont('helvetica', 'normal'); doc.setTextColor(80);
  doc.text(data.harmonized_structure.version_in_use_for_skeleton, M, 24);
  const hsBody = [];

    if (!c.subclauses) {
      hsBody.push([{ content: `§${c.id} ${c.title}`, colSpan: 2, styles: { fontStyle: 'bold', fillColor: [241, 245, 249] } }, '']);
    } else {
      hsBody.push([{ content: `§${c.id} ${c.title}`, colSpan: 2, styles: { fontStyle: 'bold', fillColor: [241, 245, 249] } }, '']);
      c.subclauses.forEach(sc => {
        hsBody.push([sc.id, sc.title + (sc.notes ? `  ⚠ ${sc.notes}` : '')]);

  doc.autoTable({
    startY: 28,
    margin: { left: M, right: M, bottom: 16 },

      doc.setFont('helvetica', 'normal');
      const dl = doc.splitTextToSize(s.deviation_notes, pageW - 2 * M);
      doc.setFillColor(254, 243, 199);
      doc.rect(M, yy - 3, pageW - 2 * M, dl.length * 4 + 4, 'F');

    }
    if (s.extensions_beyond_hs && s.extensions_beyond_hs.length) {
      doc.autoTable({

        columnStyles: { 0: { cellWidth: 18, fontStyle: 'bold', textColor: [220, 38, 38] }, 2: { textColor: [120, 53, 15] } },
      });

    }
    if (s.annex_controls) {
      doc.setTextColor(15, 23, 42); doc.setFont('helvetica', 'bold'); doc.setFontSize(9);

      doc.setFont('helvetica', 'normal'); doc.setFontSize(8); doc.setTextColor(80);

          startY: yy,

        });
      } else {
        const annText = JSON.stringify(ann, null, 0).slice(0, 200);
        const al = doc.splitTextToSize(annText, pageW - 2 * M);
        doc.text(al, M, yy);
      }
    }
  });

  // Methodology + sources page
  doc.addPage();
  doc.setFont('helvetica', 'bold'); doc.setFontSize(14); doc.setTextColor(15, 23, 42);
  doc.text('Methodology', M, 18);
  doc.setFontSize(9); doc.setFont('helvetica', 'normal'); doc.setTextColor(60);
  let my = 24;
  const introLines = doc.splitTextToSize(data.methodology.intro, pageW - 2 * M);
  doc.text(introLines, M, my); my += introLines.length * 4.5 + 3;
  data.methodology.steps.forEach(st => {
    doc.setFont('helvetica', 'bold'); doc.text(`${st.step}. ${st.name}`, M, my); my += 4;
    doc.setFont('helvetica', 'normal');
    const sl = doc.splitTextToSize(st.detail, pageW - 2 * M);
    doc.text(sl, M, my); my += sl.length * 4 + 3;
  });
  doc.setFont('helvetica', 'bold'); doc.text('Validation path', M, my); my += 4;
  doc.setFont('helvetica', 'normal');
  const vp = doc.splitTextToSize(data.methodology.validation_path, pageW - 2 * M);
  doc.text(vp, M, my); my += vp.length * 4 + 4;

  doc.autoTable({
    startY: my,
    margin: { left: M, right: M, bottom: 16 },
    head: [['Source', 'URL', 'Status / claims']],
    body: data.sources.map(s => [s.id, s.url, (s.status ? `[${s.status}] ` : '') + ((s.claims || []).join('; ') || s.use || '')]),
    styles: { fontSize: 7, cellPadding: 1.5, overflow: 'linebreak' },

    columnStyles: { 0: { cellWidth: 32, fontStyle: 'bold' }, 1: { cellWidth: 70, textColor: [37, 99, 235] }, 2: { cellWidth: 'auto' } },

  // Caveats page
  doc.addPage();
  doc.setFont('helvetica', 'bold'); doc.setFontSize(14); doc.setTextColor(15, 23, 42);
  doc.text('Caveats', M, 18);
  doc.setFont('helvetica', 'normal'); doc.setFontSize(9); doc.setTextColor(60);

  data.caveats.forEach((c, i) => {

}

// ─── HS Evolution Sankey (3-layer: Standard → HS clause → Origin) ─────────
// Locked left-column order requested by Telin: ISMS, PIMS, ITSMS, BCMS, OHSMS, ABMS, EnMS
const SANKEY_LEFT_ORDER = [
  { family: 'ISMS',  stdId: 'iso27001',     code: 'ISO/IEC 27001:2022',  hsBucket: '2022 HS' },
  { family: 'PIMS',  stdId: 'iso27701',     code: 'ISO/IEC 27701:2019',  hsBucket: 'Extension' },
  { family: 'ITSMS', stdId: 'iso20000_1',   code: 'ISO/IEC 20000-1:2018', hsBucket: '2012 HLS' },
  { family: 'BCMS',  stdId: 'iso22301',     code: 'ISO 22301:2019',      hsBucket: '2012 HLS' },
  { family: 'OHSMS', stdId: 'iso45001',     code: 'ISO 45001:2018',      hsBucket: '2012 HLS' },
  { family: 'ABMS',  stdId: 'iso37001_2025', code: 'ISO 37001:2025 (was 2016)', hsBucket: '2022 HS' },
  { family: 'EnMS',  stdId: 'iso50001',     code: 'ISO 50001:2018',      hsBucket: '2012 HLS' },
];

const HS_CLAUSES_ORDER = [
  { id: '4',  title: 'Context' },
  { id: '5',  title: 'Leadership' },
  { id: '6',  title: 'Planning' },
  { id: '7',  title: 'Support' },
  { id: '8',  title: 'Operation' },
  { id: '9',  title: 'Performance' },
  { id: '10', title: 'Improvement' },
];

const ORIGIN_BUCKETS_ORDER = [
  { id: 'spine_2022', label: 'HS spine · 2022 HS', color: '#2563EB' },
  { id: 'spine_2012', label: 'HS spine · 2012 HLS', color: '#64748B' },
  { id: 'extension',  label: 'Standard-specific extension', color: '#9333EA' },
];

const FAMILY_COLORS = {
  'ISMS':  '#2563EB',
  'PIMS':  '#9333EA',
  'ITSMS': '#0891B2',
  'BCMS':  '#059669',
  'OHSMS': '#EA580C',
  'ABMS':  '#DC2626',
  'EnMS':  '#CA8A04',
};

// HS spine subclause counts per clause (used as baseline weights)
const HS_SPINE_2012 = { '4': 4, '5': 3, '6': 2, '7': 5, '8': 1, '9': 3, '10': 2 };
const HS_SPINE_2022 = { '4': 4, '5': 3, '6': 3, '7': 5, '8': 1, '9': 3, '10': 2 };

function HSEvolutionSankey() {
  const data = window.ISO_DATA && window.ISO_DATA.hlsMapping;
  const err = data ? null : 'window.ISO_DATA not loaded — ensure data/iso.js is included.';
  const [focusFamily, setFocusFamily] = useState(null);
  const chartRef = useRef(null);

  React.useEffect(() => {
    if (!data || !chartRef.current || !window.Highcharts) return;

    // Build node list (forced order via offset trick: prepend sortable numeric prefix)
    const stdNodes = SANKEY_LEFT_ORDER.map((s, i) => ({
      id: `S${i}|${s.family} · ${s.code}`,
      column: 0,
      color: FAMILY_COLORS[s.family],
      offset: i * 40,
    }));
    const clauseNodes = HS_CLAUSES_ORDER.map((c, i) => ({
      id: `C${i}|§${c.id} ${c.title}`,
      column: 1,
      color: '#1E293B',
      offset: i * 40,
    }));
    const originNodes = ORIGIN_BUCKETS_ORDER.map((o, i) => ({
      id: `O${i}|${o.label}`,
      column: 2,
      color: o.color,
      offset: i * 40,
    }));

    // Build flows
    const links = [];
    SANKEY_LEFT_ORDER.forEach((s, si) => {
      const sNode = stdNodes[si].id;
      const std = data.standards.find(x => x.id === s.stdId);
      if (!std) return;
      // For PIMS (extension), inherit 2022 HS spine via 27001 base; flag as Extension origin in addition
      const usesNewHS = s.hsBucket === '2022 HS' || s.hsBucket === 'Extension';
      const spine = usesNewHS ? HS_SPINE_2022 : HS_SPINE_2012;

      // Count extensions per HS clause from standard.extensions_beyond_hs[]
      const extByClause = {};
      (std.extensions_beyond_hs || []).forEach(ext => {
        const top = String(ext.ref).split('.')[0];
        if (HS_SPINE_2022[top]) extByClause[top] = (extByClause[top] || 0) + 1;
      });

      HS_CLAUSES_ORDER.forEach((c, ci) => {
        const spineCount = spine[c.id] || 0;
        const extCount = extByClause[c.id] || 0;
        const total = spineCount + extCount;
        if (total === 0) return;
        const cNode = clauseNodes[ci].id;
        // Standard → Clause (sum)
        links.push({
          from: sNode, to: cNode, weight: total,
          custom: { family: s.family, code: s.code, clauseTitle: c.title, spineCount, extCount, hsBucket: s.hsBucket }
        });
        // Clause → Origin buckets
        if (spineCount > 0) {
          const originId = usesNewHS ? originNodes[0].id : originNodes[1].id;
          links.push({ from: cNode, to: originId, weight: spineCount, custom: { family: s.family, kind: 'spine' } });
        }
        if (extCount > 0) {
          links.push({ from: cNode, to: originNodes[2].id, weight: extCount, custom: { family: s.family, kind: 'extension' } });
        }
      });
    });

    // Filter by focused family
    const filteredLinks = focusFamily
      ? links.filter(l => l.custom?.family === focusFamily)
      : links;

    chartRef.current.innerHTML = '';
    try {
      // Strip the sortable prefix ("S0|", "C0|", "O0|") from a node id
      const stripPrefix = (id) => (id || '').split('|').slice(1).join('|') || id;
      window.Highcharts.chart(chartRef.current, {
        chart: { type: 'sankey', height: 920, backgroundColor: 'transparent', style: { fontFamily: 'Inter, system-ui, sans-serif' } },
        title: { text: null },
        credits: { enabled: false },
        accessibility: { enabled: false },
        tooltip: {
          useHTML: true,
          backgroundColor: '#ffffff',
          borderColor: '#1E293B',
          borderWidth: 1,
          shadow: true,
          padding: 10,
          style: { fontSize: '12px', color: '#1E293B' },
          headerFormat: '',
          nodeFormatter: function () {
            const label = stripPrefix(this.id || this.name);
            return `<b>${label}</b><br/><span style="color:#64748B">Total flow: ${this.sum} subclauses</span>`;
          },
          pointFormatter: function () {
            const c = this.options.custom || {};
            const a = stripPrefix(this.from);
            const b = stripPrefix(this.to);
            // Standard → Clause flow (has spineCount + extCount)
            if (c.spineCount !== undefined) {
              const ext = c.extCount > 0
                ? `<br/><span style="color:#9333EA">+ ${c.extCount} ${c.family}-specific extension${c.extCount === 1 ? '' : 's'}</span>`
                : '';
              return `<b>${c.code}</b> contributes <b>${this.weight}</b> subclause${this.weight === 1 ? '' : 's'} to <b>${b}</b>` +
                `<br/><span style="color:#64748B">${c.spineCount} from the ${c.hsBucket} spine</span>${ext}`;
            }
            // Clause → Origin flow (kind = 'spine' or 'extension')
            if (c.kind === 'spine') {
              return `<b>${a}</b> uses <b>${this.weight}</b> spine subclause${this.weight === 1 ? '' : 's'} from the <b>${b}</b>` +
                `<br/><span style="color:#64748B">Inherited from the Harmonized Structure — common across many ISO standards.</span>`;
            }
            if (c.kind === 'extension') {
              return `<b>${a}</b> adds <b>${this.weight}</b> ${c.family}-specific extension subclause${this.weight === 1 ? '' : 's'}` +
                `<br/><span style="color:#64748B">Discipline-specific addition beyond the HS spine.</span>`;
            }
            return `<b>${a} → ${b}</b><br/>${this.weight}`;
          }
        },
        plotOptions: {
          sankey: {
            nodePadding: 14,
            nodeWidth: 18,
            curveFactor: 0.5,
            linkOpacity: 0.45,
            states: { hover: { linkOpacity: 0.85 } },
            dataLabels: {
              enabled: true,
              style: { fontSize: '11px', fontWeight: '600', textOutline: 'none', color: '#1E293B' },
              // Only label nodes; suppress the auto-generated "highcharts-XXX" link labels
              formatter: function () {
                if (!this.point.isNode) return null;
                return stripPrefix(this.point.name);
              },
              nodeFormatter: function () { return stripPrefix(this.name); }
            }
          }
        },
        series: [{
          keys: ['from', 'to', 'weight'],
          data: filteredLinks,
          nodes: [...stdNodes, ...clauseNodes, ...originNodes],
          name: 'HS evolution flow'
        }]
      });
    } catch (e) {
      chartRef.current.innerHTML = `<div style="color:#DC2626;padding:20px">Highcharts error: ${e.message}</div>`;
    }
  }, [data, focusFamily]);

  if (err) return <div style={{ padding: 20, color: '#DC2626' }}>{err}</div>;
  if (!data) return <div style={{ padding: 20, color: 'var(--gray-600)' }}>Loading…</div>;

  // Auto callouts derived from data
  const onHS2022 = SANKEY_LEFT_ORDER.filter(s => s.hsBucket === '2022 HS').length;
  const onHLS2012 = SANKEY_LEFT_ORDER.filter(s => s.hsBucket === '2012 HLS').length;

            Read left-to-right: each standard contributes subclauses to the seven HS clauses (§4–§10), which then trace back to either the 2012 HLS spine, the 2022 HS spine, or that standard's own extensions. Locked vertical order on the left.
          </p>
        </div>
        <div style={{ display: 'flex', gap: 12, fontSize: 11, alignItems: 'center', flexWrap: 'wrap' }}>

              <span style={{ width: 12, height: 12, background: o.color, borderRadius: 3, opacity: 0.6, display: 'inline-block' }} />{o.label}
            </span>
          ))}
        </div>
      </div>

      {/* Download bar */}
      <div style={{ display: 'flex', gap: 8, marginBottom: 12, padding: '10px 12px', background: '#F8FAFC', border: '1px solid var(--gray-200)', borderRadius: 8, alignItems: 'center', flexWrap: 'wrap' }}>

        <button onClick={() => downloadBlob(buildCrosswalkCSV(data), 'iso-crosswalk-2026.csv', 'text/csv;charset=utf-8')} style={{ padding: '6px 12px', fontSize: 12, fontWeight: 700, background: '#fff', border: '1px solid #2563EB', color: '#2563EB', borderRadius: 6, cursor: 'pointer' }}>

// ─── Dependency Graph ──────────────────────────────────────────────────────
function DependencyGraph({ highlightStd }) {
  const chartRef = useRef(null);
  React.useEffect(() => {
    if (!chartRef.current || !window.Highcharts) return;
    const linksMap = {};
    HLS_CLAUSES.forEach(section => {
      const targetName = `§${section.section} ${section.title.split(' ')[0]}`;
      section.clauses.forEach(clause => {
        STDS.forEach(sid => {
          const cov = clause.mapping[sid]?.coverage;
          if (cov === 'full' || cov === 'extended') {
            const key = `${STD_META[sid].abbr}|${targetName}`;
            linksMap[key] = (linksMap[key] || 0) + 1;
          }
        });
      });
    });
    
    // Explicit Node Order required by the user
    // The sequence is: Clauses 4-10 sequentially, followed by the standards order
    const orderedNodes = [
      '§4 Context', '§5 Leadership', '§6 Planning', '§7 Support', '§8 Operation', '§9 Performance', '§10 Improvement',
      ...STDS.map(sid => STD_META[sid].abbr)
    ];

    // Highcharts determines node order based on first encounter in the data set.
    // By creating a ring of invisible negligible links perfectly following our required order, we force the perimeter order.
    const data = [];
    for (let i = 0; i < orderedNodes.length; i++) {
        const nextId = orderedNodes[i === orderedNodes.length - 1 ? 0 : i + 1];
        data.push([orderedNodes[i], nextId, 1e-9]); // negligible weight prevents visual distraction but sets the frame
    }
    
    // Append the real visual data mappings
    Object.keys(linksMap).forEach(key => { 
        const [from, to] = key.split('|'); 
        data.push([from, to, linksMap[key]]); 
    });

    let chart;
    try {
      chart = Highcharts.chart(chartRef.current, {
        chart: { style: { fontFamily: 'var(--font)' }, backgroundColor: 'transparent' },
        title: { text: null }, credits: { enabled: false },
        series: [{ keys: ['from', 'to', 'weight'], data, type: 'dependencywheel', name: 'Dependency Flow', size: '95%',
          dataLabels: { color: 'var(--gray-900)', textPath: { enabled: true, attributes: { dy: 5 } }, distance: 10, style: { fontWeight: '700', fontSize: '12px', textOutline: 'none' } },
          nodes: orderedNodes.map(id => ({ 
              id, 
              color: id.startsWith('§') ? '#6B7280' : STD_META[STDS.find(s => STD_META[s].abbr === id)].color 
          }))
        }]
      });
    } catch(e) { chartRef.current.innerHTML = `<div style="color:red;font-weight:bold;padding:20px;">Highcharts Error: ${e.message}</div>`; }
    return () => { if (chart) chart.destroy(); };
  }, [highlightStd]);
  return (
    <div style={{ background: '#fff', padding: 20, borderRadius: 8, border: '1px solid var(--gray-200)' }}>
      <div style={{ color: 'var(--gray-600)', fontSize: 13, marginBottom: 16, textAlign: 'center' }}>
        Dependency Wheel: How 7 standards map into shared High-Level Structure (HLS) domains.
      </div>
      <div ref={chartRef} style={{ width: '100%', height: 750 }}></div>
    </div>
  );
}

// ─── Main App ──────────────────────────────────────────────────────────────

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
