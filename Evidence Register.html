function getControlDescription(id) {
  const data = typeof RAW_ISO_DATA !== 'undefined' ? RAW_ISO_DATA : null;
  if (!data) return '';
  let title = '';
  const search = (list) => {
    if (!list) return;
    for (let item of list) {
      if (item.id === id) { title = item.title; return; }
      if (item.subclauses) search(item.subclauses);
      if (item.controls) search(item.controls);
      if (item.categories) search(item.categories);
    }
  };
  const isms = data.standards.find(s => s.id === 'iso27001');
  const pims = data.standards.find(s => s.id === 'iso27701');
  if (id.startsWith('A.') || id.startsWith('B.')) {
     if (isms && isms.annexes) search(isms.annexes);
     if (pims && pims.annexes) search(pims.annexes);
  } else {
     if (isms) search(isms.clauses);
  }
  return title || 'Strategic Guideline / Specific Standard Clause';
}

// ── HELPERS ──────────────────────────────────────────────────────────────
const TODAY = new Date();
const daysBetween = (a, b) => Math.round((b - a) / 86400000);

function getAgingInfo(ev) {
  if (ev.status === 'approved' || ev.status === 'not-applicable') return { days: 0, severity: 'none', label: '' };
  if (!ev.due) return { days: 0, severity: 'unknown', label: 'No due date' };
  const due = new Date(ev.due);
  const diff = daysBetween(TODAY, due);
  if (diff < 0) {
    const overdue = Math.abs(diff);
    if (overdue > 30) return { days: overdue, severity: 'critical', label: `${overdue}d overdue` };
    if (overdue > 14) return { days: overdue, severity: 'high', label: `${overdue}d overdue` };
    return { days: overdue, severity: 'medium', label: `${overdue}d overdue` };
  }
  if (diff <= 7) return { days: diff, severity: 'warning', label: `${diff}d left` };
  return { days: diff, severity: 'ok', label: `${diff}d left` };
}

const AGING_COLOR = {
  critical: { color: '#991B1B', bg: '#FEF2F2', border: '#FCA5A5' },

function StdTag({ sid }) {
  const s = STD_META[sid];
  if (!s) return null;
  return (
    <span style={{ display: 'inline-flex', alignItems: 'center', background: `${s.color}18`, color: s.color, borderRadius: 4, padding: '1px 6px', fontSize: 10, fontWeight: 700, whiteSpace: 'nowrap' }}>

}

function ClauseTag({ label }) {
  return (
    <span style={{ display: 'inline-flex', background: '#F1F3F5', color: '#495057', borderRadius: 4, padding: '1px 6px', fontSize: 10, fontFamily: 'var(--mono)', whiteSpace: 'nowrap' }}>
      {label}

}

function AgingBadge({ ev }) {
  const aging = getAgingInfo(ev);
  if (aging.severity === 'none') return <span style={{ fontSize: 11, color: '#059669', fontWeight: 600 }}>Done</span>;
  const ac = AGING_COLOR[aging.severity];
  return (
    <span className={aging.severity === 'critical' ? 'aging-pulse' : ''} style={{
      display: 'inline-flex', alignItems: 'center', gap: 4,
      background: ac.bg, color: ac.color, border: `1px solid ${ac.border}`,
      borderRadius: 'var(--radius-pill)', padding: '2px 8px', fontSize: 10, fontWeight: 700, whiteSpace: 'nowrap',
    }}>
      {aging.severity === 'critical' && '🔥'}
      {aging.severity === 'high' && '⚠️'}
      {aging.label}
    </span>
  );
}

function MultiSelect({ options, selected, onChange, placeholder, renderOption, renderTag, grouped, inline, height }) {
  const [open, setOpen] = useState(false);
  const [search, setSearch] = useState('');
  const [collapsedGroups, setCollapsedGroups] = useState({});
  const ref = useRef();
  useEffect(() => {
    if (inline) return;
    const handler = e => { if (!ref.current?.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [inline]);

  const CheckBox = ({ sel }) => (
    <span style={{ width: 14, height: 14, border: `2px solid ${sel ? 'var(--blue)' : 'var(--gray-300)'}`, borderRadius: 3, background: sel ? 'var(--blue)' : '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
      {sel && <span style={{ color: '#fff', fontSize: 9, fontWeight: 900 }}>✓</span>}
    </span>
  );

  // Build display list — grouped or flat
  const renderDropdown = () => {
    const q = search.toLowerCase();
    if (grouped) {
      // Grouped mode: HLS clauses, then Annex A groups, then specials
      let sections = [
        { label: 'HLS Clauses (4-10)', items: HLS_CLAUSE_IDS },
        ...ANNEX_A_GROUPS.map(g => ({ label: `${g.id} — ${g.title} (${g.controls.length})`, items: g.controls, groupId: g.id })),
        { label: 'Special / Other', items: SPECIAL_REFS },
      ];
      // Filter available options
      sections = sections.map(sec => ({
        ...sec, items: sec.items.filter(o => options.includes(o))
      })).filter(s => s.items.length > 0);

      const header = inline && (
        <div style={{ display: 'flex', justifyContent: 'flex-end', padding: '6px 14px', background: '#F8F9FA', gap: 14, borderBottom: '1px solid var(--gray-200)', fontSize: 10 }}>
          <button onClick={() => setCollapsedGroups({})} style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--blue)', fontWeight: 700 }}>Expand All</button>
          <button onClick={() => {
            const c = {};
            sections.forEach(s => c[s.label] = true);
            setCollapsedGroups(c);
          }} style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--gray-600)', fontWeight: 700 }}>Collapse All</button>
        </div>
      );

      return (
        <div style={{ display: 'flex', flexDirection: 'column' }}>
          {header}
          {sections.map(sec => {
            const filtered = q ? sec.items.filter(o => o.toLowerCase().includes(q)) : sec.items;
            if (filtered.length === 0) return null;
            const allSelected = filtered.every(o => selected.includes(o));
            const isColl = collapsedGroups[sec.label];
            return (
              <div key={sec.label}>
                <div style={{ padding: '6px 14px', background: 'var(--gray-50)', borderBottom: '1px solid var(--gray-200)', display: 'flex', alignItems: 'center', gap: 8, position: 'sticky', top: 0, zIndex: 1 }}>
                  <div style={{ cursor: 'pointer' }} onClick={() => {
                    if (allSelected) onChange(selected.filter(s => !filtered.includes(s)));
                    else onChange([...selected, ...filtered.filter(o => !selected.includes(o))]);
                  }}>
                    <CheckBox sel={allSelected} />
                  </div>
                  <span style={{ fontSize: 11, fontWeight: 800, color: 'var(--navy)', textTransform: 'uppercase', letterSpacing: 0.5 }}>{sec.label}</span>
                  <div onClick={() => setCollapsedGroups(p => ({ ...p, [sec.label]: !p[sec.label] }))} style={{ marginLeft: 'auto', display: 'flex', alignItems: 'center', gap: 6, cursor: 'pointer', padding: '2px 6px', background: 'var(--gray-200)', borderRadius: 4 }}>
                    <span style={{ fontSize: 10, color: 'var(--gray-700)', fontWeight: 600 }}>{filtered.filter(o => selected.includes(o)).length}/{filtered.length}</span>
                    <span style={{ fontSize: 9, color: 'var(--gray-500)' }}>{isColl ? '▼' : '▲'}</span>
                  </div>
                </div>
                {!isColl && filtered.map(opt => {
                  const sel = selected.includes(opt);
                  return (
                    <div key={opt} onClick={() => onChange(sel ? selected.filter(x => x !== opt) : [...selected, opt])}
                      style={{ padding: '8px 14px 8px 30px', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 8, background: sel ? '#F0F7FF' : '#fff', borderBottom: '1px solid #f8f9fa' }}>
                      <CheckBox sel={sel} />
                      {renderOption(opt)}
                    </div>
                  );
                })}
              </div>
            );
          })}
        </div>
      );
    }
    // Flat mode (for standards etc.)
    const filtered = q ? options.filter(o => (typeof o === 'string' ? o : '').toLowerCase().includes(q)) : options;
    return filtered.map(opt => {
      const sel = selected.includes(opt);
      return (
        <div key={opt} onClick={() => onChange(sel ? selected.filter(x => x !== opt) : [...selected, opt])}
          style={{ padding: '7px 12px', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 8, background: sel ? 'var(--gray-50)' : '#fff' }}>
          <CheckBox sel={sel} />
          {renderOption(opt)}
        </div>
      );
    });
  };

  return (
    <div ref={ref} style={{ position: 'relative', height: height || 'auto', display: inline ? 'flex' : 'block', flexDirection: 'column' }}>
      {!inline && (
        <div onClick={() => setOpen(!open)} style={{
          padding: '8px 12px', border: `1px solid ${open ? 'var(--blue)' : 'var(--gray-300)'}`,
          borderRadius: 8, background: '#fff', cursor: 'pointer',
          display: 'flex', flexWrap: 'wrap', gap: 4, minHeight: 36, alignItems: 'center',
          boxShadow: open ? '0 0 0 3px rgba(37,99,235,.1)' : 'none',
        }}>
          {selected.length ? (
            selected.length <= 6 ? selected.map(s => renderTag(s)) : (
              <span style={{ fontSize: 12, color: 'var(--gray-700)', fontWeight: 600 }}>{selected.length} selected</span>
            )
          ) : <span style={{ color: 'var(--gray-400)', fontSize: 12 }}>{placeholder}</span>}
          <span style={{ marginLeft: 'auto', color: 'var(--gray-400)', fontSize: 10 }}>▼</span>
        </div>
      )}
      {(open || inline) && (
        <div style={{
          position: inline ? 'relative' : 'absolute', top: inline ? 0 : '100%', left: 0, right: 0, 
          background: '#fff', border: inline ? 'none' : '1px solid var(--gray-200)', 
          borderRadius: inline ? 0 : 8, boxShadow: inline ? 'none' : '0 8px 24px rgba(0,0,0,.1)',
          zIndex: inline ? 1 : 100, marginTop: inline ? 0 : 4, display: 'flex', flexDirection: 'column', 
          flex: inline ? 1 : 'none', maxHeight: inline ? '100%' : 320, overflow: 'hidden'
        }}>
          {/* Search input */}
          <div style={{ padding: '6px 8px', borderBottom: '1px solid var(--gray-200)', background: inline ? 'var(--gray-50)' : '#fff' }}>
            <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Type to filter..." autoFocus={!inline}
              onClick={e => e.stopPropagation()}
              style={{ width: '100%', padding: '6px 10px', fontSize: 12, border: '1px solid var(--gray-300)', borderRadius: 6, outline: 'none' }} />
          </div>
          <div style={{ overflowY: 'auto', flex: 1, background: '#fff' }}>
            {renderDropdown()}
          </div>
          {selected.length > 0 && (
            <div style={{ padding: '6px 12px', borderTop: '1px solid var(--gray-200)', display: 'flex', justifyContent: 'space-between', alignItems: 'center', background: 'var(--gray-50)', marginTop: 'auto' }}>
              <span style={{ fontSize: 11, color: 'var(--gray-600)', fontWeight: 600 }}>{selected.length} currently selected</span>
              <button onClick={e => { e.stopPropagation(); onChange([]); }} style={{ fontSize: 11, color: 'var(--red)', fontWeight: 700, background: 'none', border: 'none', cursor: 'pointer', padding: '4px 8px' }}>Clear all</button>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ── EVIDENCE MODAL ───────────────────────────────────────────────────────
function EvidenceModal({ item, persona, onSave, onClose }) {
  const isNew = !item.id;
  const [form, setForm] = useState({
    name: item.name || '', type: item.type || 'Policy', standardIds: item.standardIds || [],
    clauseRefs: item.clauseRefs || [], status: item.status || 'draft',
    owner: item.owner || 'Internal Audit', due: item.due || '',
    requestedDate: item.requestedDate || '', collectedDate: item.collectedDate || '',
    notes: item.notes || '', followUps: item.followUps || 0,
  });
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
  const [clauseFilter, setClauseFilter] = useState(null);

  const getFilteredClauseOptions = () => {
    if (!clauseFilter) return CLAUSE_REFS;
    const hls = HLS_CLAUSE_IDS;
    if (clauseFilter === 'iso27001' || clauseFilter === 'iso27701') return [...hls, ...ALL_ANNEX_IDS, 'SoA'];
    if (clauseFilter === 'iso37001') return [...hls, '8.x (ABMS)'];
    if (clauseFilter === 'iso20000') return [...hls, '8.x (ITSMS)'];
    if (clauseFilter === 'iso50001') return [...hls, '6.x (EnMS)'];
    if (clauseFilter === 'iso45001') return [...hls, '8.x (OHS)'];
    return [...hls, '4.5'];
  };
  const filteredClauseOptions = getFilteredClauseOptions();

  const handleSaveWrapper = () => {
    let warning = false;
    for (const c of form.clauseRefs) {
      if ((c.startsWith('A.') || c.startsWith('B.')) && (!form.standardIds.includes('iso27001') && !form.standardIds.includes('iso27701'))) warning = true;
      if (c.includes('ABMS') && !form.standardIds.includes('iso37001')) warning = true;
      if (c.includes('ITSMS') && !form.standardIds.includes('iso20000')) warning = true;
      if (c.includes('EnMS') && !form.standardIds.includes('iso50001')) warning = true;
      if (c.includes('OHS') && !form.standardIds.includes('iso45001')) warning = true;
    }
    if (warning) {
      if (!window.confirm("The mapping clauses are beyond your pre-defined applicable ISO standards. Are you sure?")) return;

    onSave(form, isNew ? 'Created new evidence' : 'General metadata update');

// ── COLLECTION TRACKER (Owner Accountability) ────────────────────────────
function CollectionTracker({ items }) {
  const ownerStats = useMemo(() => {
    const map = {};
    items.forEach(ev => {
      if (!map[ev.owner]) map[ev.owner] = { total: 0, approved: 0, overdue: 0, pending: 0, followUps: 0 };
      const o = map[ev.owner];
      o.total++;
      if (ev.status === 'approved') o.approved++;
      const aging = getAgingInfo(ev);
      if (aging.severity === 'critical' || aging.severity === 'high' || aging.severity === 'medium') o.overdue++;
      if (ev.status === 'draft' || ev.status === 'pending-review') o.pending++;
      o.followUps += (ev.followUps || 0);
    });
    return Object.entries(map).sort((a, b) => b[1].overdue - a[1].overdue);
  }, [items]);

  return (
    <div style={{ background: '#fff', borderRadius: 'var(--radius)', border: '1px solid var(--gray-200)', overflow: 'hidden' }}>
      <div style={{ padding: '16px 20px', borderBottom: '1px solid var(--gray-200)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <div style={{ fontWeight: 800, fontSize: 15, color: 'var(--navy)' }}>Collection Tracker — Who's Blocking?</div>
        <div style={{ fontSize: 11, color: 'var(--gray-500)' }}>Sorted by overdue count</div>
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(220px, 1fr))', gap: 1, background: 'var(--gray-200)' }}>
        {ownerStats.map(([owner, s]) => {
          const pct = s.total ? Math.round(s.approved / s.total * 100) : 0;
          const isBlocked = s.overdue > 0;
          return (
            <div key={owner} style={{ background: '#fff', padding: '16px 18px' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
                <div style={{ fontWeight: 700, fontSize: 13, color: 'var(--gray-900)' }}>{owner}</div>
                {isBlocked && <span style={{ background: '#FEF2F2', color: '#DC2626', borderRadius: 'var(--radius-pill)', padding: '2px 8px', fontSize: 10, fontWeight: 700 }}>{s.overdue} overdue</span>}
              </div>
              {/* Progress bar */}
              <div style={{ height: 6, borderRadius: 3, background: 'var(--gray-100)', marginBottom: 8, overflow: 'hidden' }}>
                <div style={{ height: '100%', borderRadius: 3, background: pct >= 80 ? '#059669' : pct >= 50 ? '#D97706' : '#DC2626', width: `${pct}%`, transition: 'width .3s' }} />
              </div>
              <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 11, color: 'var(--gray-500)' }}>
                <span><b style={{ color: '#059669' }}>{s.approved}</b>/{s.total} approved</span>
                <span>{s.pending > 0 && <span style={{ color: '#D97706' }}>{s.pending} pending</span>}</span>
              </div>
              {s.followUps > 0 && (
                <div style={{ marginTop: 6, fontSize: 10, color: '#7C3AED', fontWeight: 600 }}>
                  {s.followUps} follow-up{s.followUps > 1 ? 's' : ''} sent
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── GAP HEATMAP (Clauses × Standards) ────────────────────────────────────
function GapHeatmap({ items }) {
  // Build coverage: for each (clause, standard) pair, count evidence and best status
  const coverage = useMemo(() => {
    const map = {};
    HLS_CLAUSES.forEach(c => {
      map[c.id] = {};
      STDS.forEach(sid => { map[c.id][sid] = { count: 0, bestStatus: null }; });
    });
    items.forEach(ev => {
      (ev.clauseRefs || []).forEach(cr => {
        // Match against HLS clause IDs
        const hlsMatch = HLS_CLAUSES.find(h => cr.startsWith(h.id));
        if (!hlsMatch) return;
        (ev.standardIds || []).forEach(sid => {
          if (!map[hlsMatch.id]?.[sid]) return;
          map[hlsMatch.id][sid].count++;
          const order = EV_STATUS[ev.status]?.order ?? -1;
          const bestOrder = map[hlsMatch.id][sid].bestStatus ? (EV_STATUS[map[hlsMatch.id][sid].bestStatus]?.order ?? -1) : -1;
          if (order > bestOrder) map[hlsMatch.id][sid].bestStatus = ev.status;
        });
      });
    });
    return map;
  }, [items]);

  const cellColor = (count, bestStatus) => {
    if (count === 0) return { bg: '#FEF2F2', color: '#991B1B', label: 'GAP', border: '#FECACA' };
    if (bestStatus === 'approved') return { bg: '#ECFDF5', color: '#059669', label: count, border: '#A7F3D0' };
    if (bestStatus === 'in-review') return { bg: '#EFF6FF', color: '#2563EB', label: count, border: '#BFDBFE' };
    if (bestStatus === 'draft') return { bg: '#FFFBEB', color: '#D97706', label: count, border: '#FDE68A' };
    return { bg: '#F5F3FF', color: '#7C3AED', label: count, border: '#DDD6FE' };
  };

  return (
    <div style={{ background: '#fff', borderRadius: 'var(--radius)', border: '1px solid var(--gray-200)', overflow: 'hidden' }}>
      <div style={{ padding: '16px 20px', borderBottom: '1px solid var(--gray-200)' }}>
        <div style={{ fontWeight: 800, fontSize: 15, color: 'var(--navy)' }}>Evidence Gap Analysis — HLS Clauses × Standards</div>
        <div style={{ fontSize: 11, color: 'var(--gray-500)', marginTop: 4 }}>
          Red = GAP (no evidence mapped). Number = evidence count. Color = best status achieved.
        </div>
      </div>
      <div style={{ overflowX: 'auto' }}>
        <table style={{ borderCollapse: 'collapse', width: '100%', minWidth: 700 }}>
          <thead>
            <tr>
              <th style={{ padding: '8px 12px', background: 'var(--navy)', color: '#fff', fontSize: 11, fontWeight: 700, textAlign: 'left', position: 'sticky', left: 0, zIndex: 2, minWidth: 200 }}>HLS Clause</th>
              {STDS.map(sid => (
                <th key={sid} style={{ padding: '6px 8px', background: 'var(--navy)', color: STD_META[sid].color, fontSize: 11, fontWeight: 700, textAlign: 'center', minWidth: 65 }}>{STD_META[sid].abbr}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {HLS_CLAUSES.map((clause, ci) => (
              <tr key={clause.id} style={{ background: ci % 2 === 0 ? '#fff' : 'var(--gray-50)' }}>
                <td style={{ padding: '6px 12px', fontSize: 12, position: 'sticky', left: 0, background: ci % 2 === 0 ? '#fff' : 'var(--gray-50)', borderRight: '1px solid var(--gray-200)', zIndex: 1 }}>
                  <span style={{ fontFamily: 'var(--mono)', fontWeight: 700, color: 'var(--gray-700)', marginRight: 8 }}>{clause.id}</span>
                  <span style={{ color: 'var(--gray-500)' }}>{clause.label}</span>
                </td>
                {STDS.map(sid => {
                  const cell = coverage[clause.id]?.[sid] || { count: 0, bestStatus: null };
                  const style = cellColor(cell.count, cell.bestStatus);
                  return (
                    <td key={sid} style={{ textAlign: 'center', padding: 4 }}>
                      <div style={{
                        width: 36, height: 24, borderRadius: 4, margin: '0 auto',
                        background: style.bg, border: `1px solid ${style.border}`,
                        display: 'flex', alignItems: 'center', justifyContent: 'center',
                        fontSize: cell.count === 0 ? 8 : 11, fontWeight: 700, color: style.color,
                      }}>
                        {style.label}
                      </div>
                    </td>
                  );
                })}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      {/* Legend */}
      <div style={{ padding: '10px 20px', borderTop: '1px solid var(--gray-200)', display: 'flex', gap: 16, flexWrap: 'wrap' }}>
        {[
          { label: 'GAP', bg: '#FEF2F2', color: '#991B1B', border: '#FECACA' },
          { label: 'Requested/Pending', bg: '#F5F3FF', color: '#7C3AED', border: '#DDD6FE' },
          { label: 'Draft', bg: '#FFFBEB', color: '#D97706', border: '#FDE68A' },
          { label: 'In Review', bg: '#EFF6FF', color: '#2563EB', border: '#BFDBFE' },
          { label: 'Approved', bg: '#ECFDF5', color: '#059669', border: '#A7F3D0' },
        ].map(l => (
          <span key={l.label} style={{ display: 'flex', alignItems: 'center', gap: 4, fontSize: 11, color: 'var(--gray-600)' }}>
            <span style={{ width: 16, height: 12, borderRadius: 3, background: l.bg, border: `1px solid ${l.border}`, display: 'inline-block' }} />
            {l.label}
          </span>
        ))}
      </div>
    </div>
  );
}

// ── ANNEX A HEATMAP (93 controls × evidence coverage) ─────────────────
function AnnexHeatmap({ items }) {
  const [expandedCat, setExpandedCat] = useState(null);

  // Helper: does this evidence cover this control?
  const coversControl = (ev, ctrlId) => {
    const refs = ev.clauseRefs || [];
    return refs.includes(ctrlId) || refs.includes('SoA');
  };

  // Build per-control coverage
  const controlCoverage = useMemo(() => {
    const map = {};
    ALL_ANNEX_IDS.forEach(cid => {
      const covering = items.filter(ev => coversControl(ev, cid));
      const count = covering.length;
      let bestStatus = null;
      covering.forEach(ev => {
        const order = EV_STATUS[ev.status]?.order ?? -1;
        const bestOrder = bestStatus ? (EV_STATUS[bestStatus]?.order ?? -1) : -1;
        if (order > bestOrder) bestStatus = ev.status;
      });
      map[cid] = { count, bestStatus, items: covering };
    });
    return map;
  }, [items]);

  // Category summaries
  const catSummary = useMemo(() => ANNEX_A_GROUPS.map(g => {
    const covered = g.controls.filter(c => controlCoverage[c]?.count > 0).length;
    const approved = g.controls.filter(c => controlCoverage[c]?.bestStatus === 'approved').length;
    return { ...g, covered, approved, gaps: g.controls.length - covered };
  }), [controlCoverage]);

  const totalCovered = catSummary.reduce((s, c) => s + c.covered, 0);
  const totalGaps = 93 - totalCovered;

  const cellColor = (count, bestStatus) => {
    if (count === 0) return { bg: '#FEF2F2', color: '#991B1B', label: 'GAP', border: '#FECACA' };
    if (bestStatus === 'approved') return { bg: '#ECFDF5', color: '#059669', label: count, border: '#A7F3D0' };
    if (bestStatus === 'pending-approval') return { bg: '#EFF6FF', color: '#2563EB', label: count, border: '#BFDBFE' };
    if (bestStatus === 'pending-review') return { bg: '#FFFBEB', color: '#D97706', label: count, border: '#FDE68A' };
    return { bg: '#F5F3FF', color: '#7C3AED', label: count, border: '#DDD6FE' };
  };

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
      {/* KPI strip */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 12 }}>
        {[
          { label: 'Total Controls', value: 93, color: 'var(--navy)' },
          { label: 'Covered', value: totalCovered, color: '#059669' },
          { label: 'Gaps', value: totalGaps, color: '#DC2626' },
          { label: 'Coverage', value: `${Math.round(totalCovered / 93 * 100)}%`, color: totalCovered >= 80 ? '#059669' : '#D97706' },
        ].map(k => (
          <div key={k.label} style={{ background: '#fff', border: '1px solid var(--gray-200)', borderRadius: 'var(--radius-lg)', padding: '12px 16px' }}>
            <div style={{ fontSize: 10, fontWeight: 700, color: 'var(--gray-500)', textTransform: 'uppercase', letterSpacing: 0.8, marginBottom: 4 }}>{k.label}</div>
            <div style={{ fontSize: 24, fontWeight: 800, color: k.color, letterSpacing: '-1px' }}>{k.value}</div>
          </div>
        ))}
      </div>

      {/* Collapsible category cards */}
      {catSummary.map(cat => {
        const isOpen = expandedCat === cat.id;
        const pct = Math.round(cat.covered / cat.controls.length * 100);
        return (
          <div key={cat.id} style={{ background: '#fff', borderRadius: 'var(--radius)', border: '1px solid var(--gray-200)', overflow: 'hidden' }}>
            {/* Category header */}
            <div onClick={() => setExpandedCat(isOpen ? null : cat.id)} style={{
              padding: '14px 20px', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 12,
              borderBottom: isOpen ? '1px solid var(--gray-200)' : 'none',
            }}>
              <span style={{ fontSize: 14, fontWeight: 800, color: 'var(--navy)', fontFamily: 'var(--mono)', minWidth: 36 }}>{cat.id}</span>
              <span style={{ fontWeight: 600, color: 'var(--gray-700)', flex: 1 }}>{cat.title}</span>
              {/* Mini progress bar */}
              <div style={{ width: 120, height: 6, borderRadius: 3, background: 'var(--gray-100)', overflow: 'hidden' }}>
                <div style={{ height: '100%', borderRadius: 3, background: pct >= 80 ? '#059669' : pct >= 50 ? '#D97706' : '#DC2626', width: `${pct}%`, transition: 'width .3s' }} />
              </div>
              <span style={{ fontSize: 12, fontWeight: 700, color: pct >= 80 ? '#059669' : pct >= 50 ? '#D97706' : '#DC2626', minWidth: 45, textAlign: 'right' }}>
                {cat.covered}/{cat.controls.length}
              </span>
              {cat.gaps > 0 && <span style={{ background: '#FEF2F2', color: '#DC2626', borderRadius: 'var(--radius-pill)', padding: '2px 8px', fontSize: 10, fontWeight: 700 }}>{cat.gaps} gaps</span>}
              <span style={{ color: 'var(--gray-400)', fontSize: 12, transition: 'transform .2s', transform: isOpen ? 'rotate(180deg)' : 'none' }}>▼</span>
            </div>
            {/* Expanded control grid */}
            {isOpen && (
              <div style={{ padding: '12px 20px' }}>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(200px, 1fr))', gap: 6 }}>
                  {cat.controls.map(cid => {
                    const cv = controlCoverage[cid];
                    const cs = cellColor(cv.count, cv.bestStatus);
                    return (
                      <div key={cid} title={cv.count > 0 ? cv.items.map(e => `${e.id}: ${e.name}`).join('\n') : 'No evidence mapped'}
                        style={{
                          padding: '6px 10px', borderRadius: 5, border: `1px solid ${cs.border}`, background: cs.bg,
                          display: 'flex', alignItems: 'center', gap: 8, fontSize: 12,
                        }}>
                        <span style={{ fontFamily: 'var(--mono)', fontWeight: 700, color: cs.color, minWidth: 42 }}>{cid}</span>
                        <span style={{ flex: 1, color: cv.count > 0 ? 'var(--gray-700)' : '#991B1B', fontSize: 11, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                          {cv.count > 0 ? `${cv.count} evidence` : 'GAP'}
                        </span>
                        {cv.bestStatus && (
                          <span style={{ width: 8, height: 8, borderRadius: '50%', background: EV_STATUS[cv.bestStatus]?.color || '#ccc', flexShrink: 0 }} />
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </div>
        );
      })}

      {/* Legend */}
      <div style={{ display: 'flex', gap: 16, flexWrap: 'wrap', padding: '8px 0' }}>
        {[
          { label: 'GAP', bg: '#FEF2F2', color: '#991B1B', border: '#FECACA' },
          { label: 'Requested/Pending', bg: '#F5F3FF', color: '#7C3AED', border: '#DDD6FE' },
          { label: 'Draft/Review', bg: '#FFFBEB', color: '#D97706', border: '#FDE68A' },
          { label: 'Approved', bg: '#ECFDF5', color: '#059669', border: '#A7F3D0' },
        ].map(l => (
          <span key={l.label} style={{ display: 'flex', alignItems: 'center', gap: 4, fontSize: 11, color: 'var(--gray-600)' }}>
            <span style={{ width: 16, height: 12, borderRadius: 3, background: l.bg, border: `1px solid ${l.border}`, display: 'inline-block' }} />
            {l.label}
          </span>
        ))}
      </div>
    </div>
  );
}

// ── COVERAGE MATRIX ──────────────────────────────────────────────────────
function MatrixView({ items }) {
  return (
    <div style={{ overflowX: 'auto' }}>
      <table style={{ borderCollapse: 'collapse', minWidth: 700 }}>
        <thead>
          <tr>
            <th style={{ padding: '8px 12px', background: 'var(--navy)', color: '#fff', fontSize: 12, fontWeight: 700, textAlign: 'left', width: 120, position: 'sticky', left: 0, zIndex: 2 }}>Standard</th>
            {items.map(ev => (
              <th key={ev.id} style={{ padding: '4px 6px', background: 'var(--navy)', color: 'rgba(255,255,255,.7)', fontSize: 10, fontWeight: 500, textAlign: 'center', minWidth: 60, maxWidth: 80, writingMode: 'vertical-rl', transform: 'rotate(180deg)', height: 100 }}>
                <span title={ev.name}>{ev.id}</span>
              </th>
            ))}
          </tr>
        </thead>
        <tbody>
          {STDS.map((sid, si) => (
            <tr key={sid} style={{ background: si % 2 === 0 ? '#fff' : 'var(--gray-50)' }}>
              <td style={{ padding: '8px 12px', fontWeight: 700, fontSize: 12, color: STD_META[sid].color, position: 'sticky', left: 0, background: si % 2 === 0 ? '#fff' : 'var(--gray-50)', borderRight: '1px solid var(--gray-200)' }}>
                {STD_META[sid].abbr}
              </td>
              {items.map(ev => {
                const covers = (ev.standardIds || []).includes(sid);
                const st = EV_STATUS[ev.status];
                return (
                  <td key={ev.id} title={covers ? `${ev.name} — ${st.label}` : 'Not applicable'} style={{ textAlign: 'center', padding: 4 }}>
                    {covers ? (
                      <div style={{ width: 20, height: 20, borderRadius: 4, background: st.bg, border: `1px solid ${st.color}44`, margin: '0 auto', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                        <span style={{ fontSize: 10, color: st.color, fontWeight: 700 }}>✓</span>
                      </div>
                    ) : (
                      <span style={{ color: 'var(--gray-200)', fontSize: 12 }}>·</span>
                    )}
                  </td>
                );
              })}
            </tr>
          ))}
        </tbody>
      </table>
      <div style={{ padding: '8px 0', fontSize: 11, color: 'var(--gray-500)' }}>
        Columns = evidence items. Hover for name. Color = status.
        <span style={{ display: 'inline-flex', gap: 8, marginLeft: 12 }}>
          {Object.entries(EV_STATUS).slice(0,5).map(([k, v]) => (
            <span key={k} style={{ display: 'flex', alignItems: 'center', gap: 3 }}>
              <span style={{ width: 10, height: 10, borderRadius: 2, background: v.bg, border: `1px solid ${v.color}44`, display: 'inline-block' }} />
              {v.label}
            </span>
          ))}
        </span>
      </div>
    </div>
  );
}

// ── MAIN APP ─────────────────────────────────────────────────────────────
function App() {
  const [items, setItems] = useState(() => GRCStore.getEvidence());
  const [logs, setLogs] = useState(() => GRCStore.getAuditLogs());
  const users = useMemo(() => GRCStore.getUsers() || [], []);
  const persona = { id: 'U-001', role: 'System', name: 'System Admin', isoScope: 'all' };

  const [filterStd, setFilterStd] = useState('');
  const [filterStatus, setFilterStatus] = useState('');
  const [filterType, setFilterType] = useState('');
  const [filterClause, setFilterClause] = useState('');
  const [search, setSearch] = useState('');
  const [modal, setModal] = useState(null);
  const [selectedIds, setSelectedIds] = useState(new Set());
  const [view, setView] = useState('table');
  const [expandedId, setExpandedId] = useState(null);

  useEffect(() => { 
    const h = () => { setItems(GRCStore.getEvidence()); setLogs(GRCStore.getAuditLogs()); }; 
    GRCStore.on('change', h); return () => GRCStore.off('change', h); 
  }, []);

  const filtered = useMemo(() => items.filter(ev => {
    // Note: RBAC isoScope filtering disabled for MVP.

    if (filterStd && !(ev.standardIds || []).includes(filterStd)) return false;
    if (filterStatus && ev.status !== filterStatus) return false;
    if (filterType && ev.type !== filterType) return false;
    if (filterClause && !(ev.clauseRefs || []).includes(filterClause)) return false;
    if (search) {
      const q = search.toLowerCase();
      if (!ev.name.toLowerCase().includes(q) && !(ev.notes || '').toLowerCase().includes(q) && !ev.owner.toLowerCase().includes(q)) return false;
    }
    return true;
  }), [items, filterStd, filterStatus, filterType, filterClause, search, persona]);

  const stats = useMemo(() => {
    const s = { 'pending-approval': 0, approved: 0, 'pending-review': 0, draft: 0, rejected: 0, overdue: 0, totalFollowUps: 0 };
    filtered.forEach(e => {
      s[e.status] = (s[e.status] || 0) + 1;
      const aging = getAgingInfo(e);
      if (aging.severity === 'critical' || aging.severity === 'high' || aging.severity === 'medium') s.overdue++;
      s.totalFollowUps += (e.followUps || 0);
    });
    return s;
  }, [filtered]);

  const saveItem = (form, auditMsg) => {
    const isNew = !form.id;
    GRCStore.upsertEvidence(form); // Store handles creating the ID if new
    // We fetch again to get the exact ID if it was newly created
    const refreshed = GRCStore.getEvidence();
    const finalId = form.id || refreshed[refreshed.length - 1].id;
    
    GRCStore.logAction(persona.id, persona.role, isNew ? 'CREATE' : 'UPDATE', finalId, auditMsg || 'Metadata updated');
    setModal(null);
  };

  const deleteSelected = () => {
    if (!selectedIds.size) return;
    if (!confirm(`Delete ${selectedIds.size} item(s)?`)) return;
    selectedIds.forEach(id => {
      GRCStore.logAction(persona.id, persona.role, 'DELETE', id, 'Deleted item entirely');
      GRCStore.deleteEvidence(id);
    });
    setSelectedIds(new Set());
  };

  const toggleSelect = id => setSelectedIds(prev => {
    const next = new Set(prev);
    next.has(id) ? next.delete(id) : next.add(id);
    return next;
  });

  // Quick action: mark as requested with today's date
  const markRequested = (ev) => {
    GRCStore.upsertEvidence({ id: ev.id, status: 'requested', requestedDate: new Date().toISOString().slice(0, 10), followUps: (ev.followUps || 0) + 1 });
    setItems(GRCStore.getEvidence());
  };

  return (
    <div style={{ minHeight: '100vh', background: 'var(--gray-50)' }}>
      {/* Header */}
      <div style={{ background: '#fff', borderBottom: '1px solid var(--gray-200)', padding: '24px 28px' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 24 }}>
          <div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, color: 'var(--gray-500)', fontSize: 12, marginBottom: 4 }}>
              <a href="Dashboard.html" style={{ color: 'var(--gray-500)', textDecoration: 'none' }}>ISO Certification 2026</a>
              <span>/</span>
              <span style={{ fontWeight: 600, color: 'var(--gray-900)' }}>Evidence Register</span>
            </div>
            <div style={{ fontSize: 24, fontWeight: 800, color: 'var(--gray-900)', letterSpacing: '-0.5px' }}>Evidence & Document Register</div>
            <div style={{ fontSize: 13, color: 'var(--gray-500)', marginTop: 4 }}>Collection Workflow · Gap Analysis · 7 Standards Coverage</div>
          </div>
          <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
            <button onClick={() => setModal({ item: {} })} style={{ padding: '8px 20px', borderRadius: 'var(--radius-pill)', background: 'var(--navy)', color: '#fff', fontWeight: 700, fontSize: 13, border: 'none', boxShadow: 'var(--shadow-sm)', cursor: 'pointer' }}>+ New Evidence</button>
            {selectedIds.size > 0 && (
              <button onClick={deleteSelected} style={{ padding: '8px 16px', borderRadius: 'var(--radius-pill)', background: '#DC2626', color: '#fff', fontWeight: 700, fontSize: 12, border: 'none', cursor: 'pointer' }}>
                Delete {selectedIds.size}
              </button>
            )}
          </div>
        </div>

        {/* KPI Cards */}
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(6, 1fr)', gap: 12, marginBottom: 8 }}>
          {[
            { label: 'Total', value: items.length, sub: 'evidence items', color: 'var(--gray-900)' },
            { label: 'Approved', value: stats.approved, sub: 'audit-ready', color: '#059669' },
            { label: 'In Review', value: stats['in-review'], sub: 'needs verification', color: '#2563EB' },
            { label: 'Draft', value: stats.draft, sub: 'work in progress', color: '#D97706' },
            { label: 'Overdue', value: stats.overdue, sub: 'past due date', color: '#DC2626', highlight: stats.overdue > 0 },
            { label: 'Follow-ups', value: stats.totalFollowUps, sub: 'reminders sent', color: '#7C3AED' },
          ].map(kpi => (
            <div key={kpi.label} style={{
              background: kpi.highlight ? '#FEF2F2' : '#fff',
              border: `1px solid ${kpi.highlight ? '#FECACA' : 'var(--gray-200)'}`,
              borderRadius: 'var(--radius-lg)', padding: '14px 16px',
              transition: 'all 0.2s',
            }}>
              <div style={{ fontSize: 10, fontWeight: 700, color: 'var(--gray-500)', textTransform: 'uppercase', letterSpacing: 0.8, marginBottom: 6 }}>{kpi.label}</div>
              <div style={{ fontSize: 26, fontWeight: 800, color: kpi.color, lineHeight: 1, letterSpacing: '-1px' }}>{kpi.value}</div>
              <div style={{ fontSize: 11, color: 'var(--gray-500)', marginTop: 4, fontWeight: 500 }}>{kpi.sub}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Filters & View Toggle */}
      <div style={{ background: '#fff', borderBottom: '1px solid var(--gray-200)', padding: '10px 28px', display: 'flex', gap: 10, alignItems: 'center', flexWrap: 'wrap' }}>
        <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search evidence..." style={{ width: 200, padding: '6px 10px', fontSize: 12 }} />
        <select value={filterStd} onChange={e => setFilterStd(e.target.value)} style={{ fontSize: 12, padding: '6px 10px' }}>
          <option value="">All Standards</option>
          {STDS.map(sid => <option key={sid} value={sid}>{STD_META[sid].abbr}</option>)}
        </select>
        <select value={filterStatus} onChange={e => setFilterStatus(e.target.value)} style={{ fontSize: 12, padding: '6px 10px' }}>
          <option value="">All Statuses</option>
          {Object.entries(EV_STATUS).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
        </select>
        <select value={filterType} onChange={e => setFilterType(e.target.value)} style={{ fontSize: 12, padding: '6px 10px' }}>
          <option value="">All Types</option>
          {EVIDENCE_TYPES.map(t => <option key={t}>{t}</option>)}
        </select>
        {(search || filterStd || filterStatus || filterType || filterClause) && (
          <button onClick={() => { setSearch(''); setFilterStd(''); setFilterStatus(''); setFilterType(''); setFilterClause(''); }}
            style={{ fontSize: 12, color: 'var(--red)', fontWeight: 600, padding: '4px 8px', cursor: 'pointer', background: 'none', border: 'none' }}>Clear ×</button>
        )}
        <div style={{ marginLeft: 'auto', display: 'flex', gap: 4 }}>
          {[
            { id: 'table', label: '≡ List' },
            { id: 'tracker', label: '📊 Tracker' },
            { id: 'gaps', label: '🔍 Gap Map' },
            { id: 'annex', label: '🛡 Annex A' },
            { id: 'matrix', label: '⊞ Matrix' },
          ].map(v => (
            <button key={v.id} onClick={() => setView(v.id)} style={{
              padding: '5px 12px', borderRadius: 6, fontSize: 12, fontWeight: 600, border: '1px solid var(--gray-300)',
              background: view === v.id ? 'var(--navy)' : '#fff', color: view === v.id ? '#fff' : 'var(--gray-700)',
              cursor: 'pointer',
            }}>{v.label}</button>
          ))}
        </div>
        <span style={{ fontSize: 12, color: 'var(--gray-500)' }}>{filtered.length}/{items.length}</span>
      </div>

      {/* Content */}
      <div style={{ padding: '20px 28px' }}>
        {view === 'tracker' && <CollectionTracker items={items} />}
        {view === 'gaps' && <GapHeatmap items={items} />}
        {view === 'annex' && <AnnexHeatmap items={items} />}
        {view === 'matrix' && (
          <div style={{ background: '#fff', borderRadius: 'var(--radius)', border: '1px solid var(--gray-200)', padding: 20 }}>
            <div style={{ fontWeight: 700, fontSize: 15, color: 'var(--navy)', marginBottom: 14 }}>Evidence × Standards Coverage Matrix</div>
            <MatrixView items={filtered} />
          </div>
        )}
        {view === 'table' && (
          <div style={{ background: '#fff', borderRadius: 'var(--radius)', border: '1px solid var(--gray-200)', overflow: 'hidden' }}>
            <table style={{ width: '100%', borderCollapse: 'collapse' }}>
              <thead>
                <tr style={{ background: 'var(--gray-50)', borderBottom: '2px solid var(--gray-200)' }}>
                  <th style={{ width: 36, padding: '10px 12px' }}>
                    <input type="checkbox" onChange={e => setSelectedIds(e.target.checked ? new Set(filtered.map(f => f.id)) : new Set())}
                      checked={selectedIds.size > 0 && filtered.every(f => selectedIds.has(f.id))} />
                  </th>
                  {['Evidence / Document', 'Type', 'Standards', 'Owner', 'Status', 'Aging', ''].map(h => (
                    <th key={h} style={{ textAlign: 'left', padding: '10px 10px', fontSize: 11, fontWeight: 700, color: 'var(--gray-500)', textTransform: 'uppercase', letterSpacing: .5 }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {filtered.length === 0 && (
                  <tr><td colSpan={8} style={{ padding: 40, textAlign: 'center', color: 'var(--gray-500)' }}>No evidence items match your filters.</td></tr>
                )}
                {filtered.map((ev, i) => {
                  const st = EV_STATUS[ev.status] || EV_STATUS['not-started'];
                  const isExpanded = expandedId === ev.id;
                  return [
                    <tr key={ev.id} onClick={() => setExpandedId(isExpanded ? null : ev.id)}
                      style={{ borderBottom: '1px solid var(--gray-100)', cursor: 'pointer', background: isExpanded ? '#F8FAFF' : i % 2 === 0 ? '#fff' : '#FAFAFA' }}
                      onMouseEnter={e => { if (!isExpanded) e.currentTarget.style.background = 'var(--gray-50)'; }}
                      onMouseLeave={e => { if (!isExpanded) e.currentTarget.style.background = i % 2 === 0 ? '#fff' : '#FAFAFA'; }}>
                      <td style={{ padding: '10px 12px' }} onClick={e => e.stopPropagation()}>
                        <input type="checkbox" checked={selectedIds.has(ev.id)} onChange={() => toggleSelect(ev.id)} />
                      </td>
                      <td style={{ padding: '10px 10px', maxWidth: 280 }}>
                        <div style={{ fontWeight: 600, fontSize: 13, color: 'var(--gray-900)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{ev.name}</div>
                        <div style={{ fontSize: 11, color: 'var(--gray-400)', fontFamily: 'var(--mono)', marginTop: 2 }}>{ev.id}</div>
                      </td>
                      <td style={{ padding: '10px 10px' }}>
                        <span style={{ background: 'var(--gray-100)', color: 'var(--gray-600)', borderRadius: 4, padding: '2px 7px', fontSize: 11, fontWeight: 500 }}>{ev.type}</span>
                      </td>
                      <td style={{ padding: '10px 10px' }}>
                        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 3, maxWidth: 160 }}>
                          {(ev.standardIds || []).map(sid => <StdTag key={sid} sid={sid} />)}
                        </div>
                      </td>
                      <td style={{ padding: '10px 10px', fontSize: 12, color: 'var(--gray-700)', whiteSpace: 'nowrap' }}>{ev.owner}</td>
                      <td style={{ padding: '10px 10px' }}>
                        <span style={{ background: st.bg, color: st.color, borderRadius: 20, padding: '3px 9px', fontSize: 11, fontWeight: 700, border: `1px solid ${st.color}22` }}>
                          {st.icon} {st.label}
                        </span>
                      </td>
                      <td style={{ padding: '10px 10px' }}><AgingBadge ev={ev} /></td>
                      <td style={{ padding: '10px 6px', whiteSpace: 'nowrap' }} onClick={e => e.stopPropagation()}>
                        <div style={{ display: 'flex', gap: 4 }}>
                          <button onClick={() => setModal({ item: ev, id: ev.id })} title="Edit"
                            style={{ fontSize: 11, color: 'var(--blue)', fontWeight: 600, padding: '3px 8px', borderRadius: 5, border: '1px solid #BFDBFE', cursor: 'pointer', background: 'none' }}>Edit</button>
                          {(ev.status === 'draft' || ev.status === 'pending-review') && (
                            <button onClick={() => markRequested(ev)} title="Send follow-up"
                              style={{ fontSize: 11, color: '#7C3AED', fontWeight: 600, padding: '3px 8px', borderRadius: 5, border: '1px solid #DDD6FE', cursor: 'pointer', background: 'none' }}>
                              Chase
                            </button>
                          )}
                        </div>
                      </td>
                    </tr>,
                    isExpanded && (
                      <tr key={`${ev.id}-exp`} style={{ background: '#F8FAFF', borderBottom: '2px solid var(--gray-200)' }}>
                        <td colSpan={8} style={{ padding: '16px 60px 20px' }}>
                          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 20 }}>
                            <div>
                              <div style={{ fontSize: 11, fontWeight: 700, color: 'var(--gray-500)', marginBottom: 6, textTransform: 'uppercase' }}>Clause Coverage</div>
                              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4 }}>
                                {(ev.clauseRefs || []).map(c => <ClauseTag key={c} label={c} />)}
                                {!(ev.clauseRefs || []).length && <span style={{ fontSize: 12, color: 'var(--gray-400)' }}>None mapped</span>}
                              </div>
                            </div>
                            <div>
                              <div style={{ fontSize: 11, fontWeight: 700, color: 'var(--gray-500)', marginBottom: 6, textTransform: 'uppercase' }}>Collection Timeline</div>
                              <div style={{ fontSize: 12, color: 'var(--gray-700)', lineHeight: 1.8 }}>
                                <div>Requested: <b>{ev.requestedDate ? new Date(ev.requestedDate).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }) : '—'}</b></div>
                                <div>Collected: <b>{ev.collectedDate ? new Date(ev.collectedDate).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }) : '—'}</b></div>
                                <div>Due: <b>{ev.due ? new Date(ev.due).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }) : '—'}</b></div>
                                {ev.followUps > 0 && <div style={{ color: '#7C3AED', fontWeight: 600, marginTop: 4 }}>{ev.followUps} follow-up{ev.followUps > 1 ? 's' : ''} sent</div>}
                              </div>
                            </div>
                            <div>
                              <div style={{ fontSize: 11, fontWeight: 700, color: 'var(--gray-500)', marginBottom: 6, textTransform: 'uppercase' }}>Notes</div>
                              <div style={{ fontSize: 13, color: 'var(--gray-800)', lineHeight: 1.5 }}>{ev.notes || '—'}</div>
                            </div>
                          </div>
                          {/* Cross-standard coverage */}
                          <div style={{ marginTop: 14, paddingTop: 14, borderTop: '1px solid var(--gray-200)' }}>
                            <div style={{ fontSize: 11, fontWeight: 700, color: 'var(--gray-500)', marginBottom: 6, textTransform: 'uppercase' }}>Cross-Standard Coverage</div>
                            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
                              {STDS.map(sid => {
                                const covers = (ev.standardIds || []).includes(sid);
                                const s = STD_META[sid];
                                return (
                                  <span key={sid} style={{ padding: '3px 8px', borderRadius: 5, fontSize: 11, fontWeight: 700, background: covers ? `${s.color}18` : 'var(--gray-100)', color: covers ? s.color : 'var(--gray-400)', textDecoration: covers ? 'none' : 'line-through' }}>{s.abbr}</span>
                                );
                              })}
                            </div>
                          </div>
                          
                          {/* Audit Trail Pane */}
                          <div style={{ marginTop: 14, paddingTop: 14, borderTop: '1px solid var(--gray-200)' }}>
                            <div style={{ fontSize: 11, fontWeight: 700, color: 'var(--gray-500)', marginBottom: 10, textTransform: 'uppercase' }}>Audit History & Approvals</div>
                            {logs && logs.filter(l => l.entityId === ev.id).length > 0 ? (
                              <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                                {logs.filter(l => l.entityId === ev.id).map(log => (
                                  <div key={log.id} style={{ display: 'flex', gap: 12, fontSize: 12, padding: '6px 10px', background: '#fff', borderRadius: 6, border: '1px solid var(--gray-200)', alignItems: 'center' }}>
                                    <div style={{ color: 'var(--gray-500)', fontFamily: 'var(--mono)', fontSize: 11, whiteSpace: 'nowrap' }}>
                                      {new Date(log.timestamp).toLocaleString('en-GB', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' })}
                                    </div>
                                    <div style={{ display: 'flex', gap: 8, alignItems: 'center', minWidth: 150 }}>
                                      <span style={{ fontWeight: 600, color: 'var(--navy)' }}>{log.action}</span>
                                      <span style={{ fontSize: 10, background: 'var(--gray-100)', padding: '1px 5px', borderRadius: 4, color: 'var(--gray-600)' }}>{log.userRole}</span>
                                    </div>
                                    <div style={{ color: 'var(--gray-700)' }}>{log.details}</div>
                                  </div>
                                ))}
                              </div>
                            ) : (
                              <div style={{ fontSize: 12, color: 'var(--gray-400)', fontStyle: 'italic' }}>No audit history available.</div>
                            )}
                          </div>

                        </td>
                      </tr>
                    )
                  ];
                })}
              </tbody>
            </table>
          </div>
        )}
      </div>

      {/* Footer */}
      <div style={{ padding: '16px 28px', borderTop: '1px solid var(--gray-200)', display: 'flex', gap: 16 }}>
        <a href="Dashboard.html" style={{ fontSize: 12, color: 'var(--gray-600)', textDecoration: 'none', fontWeight: 500 }}>← Dashboard</a>
        <a href="ISO Crosswalk.html" style={{ fontSize: 12, color: '#2563EB', textDecoration: 'none', fontWeight: 500 }}>ISO Crosswalk →</a>
        <button onClick={() => { if (confirm('Reset ALL GRC data?')) { GRCStore.reset(); setItems(GRCStore.getEvidence()); } }}
          style={{ marginLeft: 'auto', fontSize: 12, color: 'var(--gray-500)', padding: '4px 10px', borderRadius: 5, border: '1px solid var(--gray-300)', cursor: 'pointer', background: 'none' }}>Reset Store</button>
      </div>

      {/* Modal */}
      {modal && (
        <EvidenceModal item={modal.item} onClose={() => setModal(null)}
          onSave={form => saveItem(form, modal.id)} />
      )}
    </div>
  );
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { hasError: false, error: null }; }
  static getDerivedStateFromError(error) { return { hasError: true, error }; }
  render() {
    if (this.state.hasError) {
      return <div style={{padding:40, color:'red', fontFamily:'monospace'}}><b>React Crashed:</b><br/>{this.state.error.toString()}<br/>{this.state.error.stack}</div>;
    }
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App /></ErrorBoundary>);
</script>
</body>
</html>
