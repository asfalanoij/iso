<body>
<div role="note" style="position:sticky;top:0;z-index:9999;background:linear-gradient(90deg,#fef3c7,#fde68a);color:#78350f;border-bottom:1px solid #f59e0b;padding:8px 16px;font:500 12.5px/1.4 -apple-system,BlinkMacSystemFont,'Plus Jakarta Sans',Inter,sans-serif;text-align:center;letter-spacing:.01em;">
  <strong>MOCK-UP — Brainstorming Simulation.</strong> No data from Telin is used. This prototype is for ideation around <em>ISO One Telin 2026</em>. ISO Crosswalk content may vary.
</div>

<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ── CONSTANTS ──────────────────────────────────────────────────────────
const STATUS_CYCLE = ['not-started', 'in-progress', 'done', 'blocked'];
const STATUS_LABEL = { 'not-started': 'Not Started', 'in-progress': 'In Progress', done: 'Done', blocked: 'Blocked' };
const STATUS_COLOR = { 'not-started': '#ADB5BD', 'in-progress': '#2563EB', done: '#16A34A', blocked: '#E2001A' };
const STATUS_BG   = { 'not-started': '#F1F3F5', 'in-progress': '#EFF6FF', done: '#DCFCE7', blocked: '#FFF1F2' };
const OWNER_COLORS = {
  'Konsultan 1':   { bg: '#EEF2FF', text: '#4338CA' },
  'Konsultan 2':   { bg: '#F5F3FF', text: '#6D28D9' },
  'Internal Audit':{ bg: '#ECFDF5', text: '#065F46' },
  'CB':            { bg: '#FFF7ED', text: '#9A3412' },
};

// Weeks from Apr 1 2026
const WEEK_LABELS = [];
const start = new Date('2026-04-01');
for (let w = 0; w <= 30; w++) {
  const d = new Date(start); d.setDate(d.getDate() + w*7);
  WEEK_LABELS.push(d.toLocaleDateString('en-GB', { day:'numeric', month:'short' }));
}
const MONTH_MARKS = [
  { label: 'Apr', week: 0 }, { label: 'May', week: 4.4 },
  { label: 'Jun', week: 8.7 }, { label: 'Jul', week: 13 },
  { label: 'Aug', week: 17.4 }, { label: 'Sep', week: 21.7 },
  { label: 'Oct', week: 26 },
];
const PROJECT_META = {
  org: 'Telin',
  projectName: 'Multi-Standard ISO Certification Programme 2026',
  phase1: { label: 'Phase 1 — Jasa Konsultan', start: 'Jun 2026', end: 'Oct 2026', startWeek: 8.7, endWeek: 30 },
  phase2: { label: 'Phase 2 — CB Audit', start: 'Oct 2026', end: 'Oct 2026', startWeek: 26, endWeek: 30 },
  currentWeek: 3.2,
  totalWeeks: 30,
  consultants: ['Konsultan 1', 'Konsultan 2'],
  internalAudit: 'Internal Audit Team',
  cb: 'Certification Body'
};

// ── HELPERS ────────────────────────────────────────────────────────────
function calcProgress(milestones) {
  if (!milestones.length) return 0;
  const weights = { done: 1, 'in-progress': 0.5, 'not-started': 0, blocked: 0 };
  return Math.round(milestones.reduce((s, m) => s + (weights[m.status] || 0), 0) / milestones.length * 100);
}
function calcRAG(progress, milestones) {
  if (milestones.some(m => m.status === 'blocked')) return 'red';
  if (progress >= 70) return 'green';
  if (progress >= 30) return 'amber';
  return 'red';
}
const RAG_COLOR = { green: '#16A34A', amber: '#D97706', red: '#E2001A' };
const RAG_BG    = { green: '#DCFCE7', amber: '#FEF3C7', red: '#FFF1F2' };
const RAG_LABEL = { green: 'On Track', amber: 'At Risk', red: 'Off Track' };
const DOC_STATUS = {
  approved:    { label: 'Approved',    color: '#16A34A', bg: '#DCFCE7' },
  'in-review': { label: 'In Review',  color: '#2563EB', bg: '#EFF6FF' },
  draft:       { label: 'Draft',      color: '#D97706', bg: '#FEF3C7' },
  'not-started': { label: 'Pending',  color: '#ADB5BD', bg: '#F1F3F5' },
};

// ── SIDEBAR ────────────────────────────────────────────────────────────
const NAV_ITEMS = [
  { id: 'dashboard', icon: '⊞', label: 'Dashboard' },
  { id: 'timeline',  icon: '▤',  label: 'Timeline' },
  { id: 'standards', icon: '◈', label: 'Standards' },
  { id: 'documents', icon: '◻', label: 'Documents' },
  { id: 'ai-diagnostics', icon: '🧠', label: 'AI Diagnostics', hidden: true },
  { id: 'analytics', icon: '📊', label: 'Executive Analytics' },
  { id: 'project-charter', icon: '📋', label: 'Project Charter' },
];
const NAV_LINKS = [
  { href: 'Data Governance.html',   icon: '⊛', label: 'Data Governance' },
  { href: 'ISO Crosswalk.html',     icon: '⊕', label: 'ISO Crosswalk' },
  { href: 'Evidence Register.html', icon: '◷', label: 'Evidence Register' },
  { href: 'NCR Tracker.html',       icon: '⚠', label: 'NCR Tracker' },
  { href: 'Risk Register.html',     icon: '◈', label: 'Risk Register' },
  { href: 'Audit Checklist.html',   icon: '✓', label: 'Audit Checklist' },
  { href: 'Legal Register.html',    icon: '⚖', label: 'Legal Register' },
];
function Sidebar({ active, onNav, showHidden, onToggleHidden }) {
  return (
    <aside style={{
      width: 'var(--sidebar-w)', minHeight: '100vh', background: 'var(--navy)',
      display: 'flex', flexDirection: 'column', flexShrink: 0, position: 'sticky', top: 0,
    }}>
      <div style={{ padding: '24px 20px 16px', borderBottom: '1px solid rgba(255,255,255,.08)' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <div style={{
            width: 36, height: 36, background: 'var(--red)', borderRadius: 8,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            color: '#fff', fontWeight: 800, fontSize: 16, letterSpacing: -1,
          }}>T</div>
          <div>
            <div style={{ color: '#fff', fontWeight: 700, fontSize: 15, lineHeight: 1.2 }}>Telin</div>
            <div style={{ color: 'rgba(255,255,255,.45)', fontSize: 11, lineHeight: 1.3 }}>ISO One Telin 2026 · Mock</div>
          </div>
        </div>
      </div>
      <nav style={{ padding: '12px 12px', flex: 1 }}>
        {NAV_ITEMS.filter(item => !item.hidden || showHidden).map(item => (
          <button key={item.id} onClick={() => onNav(item.id)} style={{
            width: '100%', display: 'flex', alignItems: 'center', gap: 10,
            padding: '9px 10px', borderRadius: 8, marginBottom: 2,
            background: active === item.id ? 'rgba(226,0,26,.18)' : 'transparent',
            color: active === item.id ? '#FF6B7A' : 'rgba(255,255,255,.55)',
            fontWeight: active === item.id ? 600 : 400, fontSize: 13.5,
            transition: 'all .15s',
          }}>
            <span style={{ fontSize: 16 }}>{item.icon}</span>
            {item.label}
          </button>
        ))}
      </nav>
      <div style={{ padding: '12px 12px', borderTop: '1px solid rgba(255,255,255,.08)' }}>
        <div style={{ fontSize: 10, color: 'rgba(255,255,255,.3)', fontWeight: 700, letterSpacing: .5, textTransform: 'uppercase', marginBottom: 6, paddingLeft: 10 }}>Tools</div>
        {NAV_LINKS.map(link => (
          <a key={link.href} href={link.href} style={{
            display: 'flex', alignItems: 'center', gap: 10, padding: '8px 10px', borderRadius: 8, marginBottom: 2,
            color: 'rgba(255,255,255,.5)', fontSize: 13, fontWeight: 400, textDecoration: 'none', transition: 'all .15s',
          }}
          onMouseEnter={e => { e.currentTarget.style.background = 'rgba(255,255,255,.07)'; e.currentTarget.style.color = 'rgba(255,255,255,.85)'; }}
          onMouseLeave={e => { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.color = 'rgba(255,255,255,.5)'; }}>
            <span style={{ fontSize: 14 }}>{link.icon}</span>{link.label}
          </a>
        ))}
        <div 
          onClick={onToggleHidden}
          style={{ 
            marginTop: 10, paddingLeft: 10, borderTop: '1px solid rgba(255,255,255,.06)', 
            paddingTop: 10, cursor: 'pointer', transition: 'opacity 0.2s'
          }}
          onMouseEnter={e => e.currentTarget.style.opacity = 1}
          onMouseLeave={e => e.currentTarget.style.opacity = 0.5}
        >
          {showHidden ? (
            <div style={{ color: 'rgba(255,255,255,.4)', fontSize: 11 }}>
              <div style={{ color: 'rgba(255,255,255,.3)' }}>Internal Audit Team</div>
              <div style={{ marginTop: 1 }}>Orchestrator Mode Active</div>
            </div>
          ) : (
            <div style={{ color: 'rgba(255,255,255,.15)', fontSize: 11 }}>
              System Integrity Verified
            </div>
          )}
        </div>
      </div>
    </aside>
  );
}

// ── RAG BADGE ──────────────────────────────────────────────────────────
function RAGBadge({ rag, size = 'sm' }) {
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 5,
      background: RAG_BG[rag], color: RAG_COLOR[rag],
      borderRadius: 'var(--radius-pill)', padding: size === 'lg' ? '6px 14px' : '4px 10px',
      fontSize: size === 'lg' ? 12 : 10, fontWeight: 700,
      letterSpacing: 0.3, textTransform: 'uppercase',
      border: `1px solid ${RAG_COLOR[rag]}22`
    }}>
      <span style={{ width: size==='lg'?8:6, height: size==='lg'?8:6, borderRadius: '50%', background: RAG_COLOR[rag], display: 'inline-block' }} />
      {RAG_LABEL[rag]}
    </span>
  );
}

// ── PROGRESS RING ─────────────────────────────────────────────────────
function ProgressRing({ pct, color, size = 48 }) {
  const r = (size - 6) / 2;
  const circ = 2 * Math.PI * r;
  const dash = (pct / 100) * circ;
  return (
    <svg width={size} height={size} style={{ transform: 'rotate(-90deg)' }}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--gray-200)" strokeWidth={5} />
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={5}
        strokeDasharray={`${dash} ${circ - dash}`} strokeLinecap="round"
        style={{ transition: 'stroke-dasharray .5s ease' }} />
    </svg>
  );
}

// ── STATUS PILL ────────────────────────────────────────────────────────
function StatusPill({ status, onClick }) {
  return (
    <button onClick={onClick} title="Click to cycle status" style={{
      display: 'inline-flex', alignItems: 'center', gap: 5,
      background: STATUS_BG[status], color: STATUS_COLOR[status],
      border: `1px solid ${STATUS_COLOR[status]}33`,
      borderRadius: 20, padding: '2px 8px', fontSize: 11, fontWeight: 600,
      cursor: 'pointer', transition: 'all .15s',
    }}>
      <span style={{ width: 6, height: 6, borderRadius: '50%', background: STATUS_COLOR[status] }} />
      {STATUS_LABEL[status]}
    </button>
  );
}

// ── STANDARD CARD ─────────────────────────────────────────────────────
function StandardCard({ std, onMilestoneClick, onClick }) {
  const progress = calcProgress(std.milestones);
  const rag = calcRAG(progress, std.milestones);
  const done = std.milestones.filter(m => m.status === 'done').length;
  return (
    <div onClick={onClick} style={{
      background: '#fff', borderRadius: 'var(--radius)', 
      padding: '24px', cursor: 'pointer', 
      transition: 'all 0.2s ease',
      border: '1px solid var(--gray-200)',
      position: 'relative', overflow: 'hidden'
    }}
    onMouseEnter={e => { 
      e.currentTarget.style.borderColor = '#d4d4d4';
      e.currentTarget.style.background = '#f9fafb';
      e.currentTarget.style.boxShadow = 'var(--shadow-sm)';
    }}
    onMouseLeave={e => { 
      e.currentTarget.style.borderColor = 'var(--gray-200)';
      e.currentTarget.style.background = '#fff';
      e.currentTarget.style.boxShadow = 'none';
    }}
    >
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 16 }}>
        <div>
          <div style={{ fontSize: 10, color: 'var(--gray-500)', fontWeight: 800, letterSpacing: 0.8, textTransform: 'uppercase', marginBottom: 4 }}>{std.code}</div>
          <div style={{ fontWeight: 800, fontSize: 18, color: 'var(--gray-900)', lineHeight: 1.2, letterSpacing: -0.5 }}>{std.abbr}</div>
          <div style={{ fontSize: 13, color: 'var(--gray-600)', marginTop: 4, fontWeight: 500 }}>{std.name}</div>
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 6 }}>
          <ProgressRing pct={progress} color={std.color} size={48} />
          <div style={{ fontSize: 13, fontWeight: 700, color: std.color }}>{progress}%</div>
        </div>
      </div>
      <div style={{ display: 'flex', gap: 6, marginBottom: 12, flexWrap: 'wrap' }}>
        <RAGBadge rag={rag} />
        <span style={{
          background: std.certType === 'New Certification' ? '#FEF3C7' : std.certType === 'Recertification' ? '#FEE2E2' : '#EFF6FF',
          color: std.certType === 'New Certification' ? '#92400E' : std.certType === 'Recertification' ? '#991B1B' : '#1E40AF',
          borderRadius: 20, padding: '3px 8px', fontSize: 11, fontWeight: 600,
        }}>{std.certType}</span>
      </div>
      <div style={{ fontSize: 11, color: 'var(--gray-600)', marginBottom: 6, fontWeight: 500 }}>
        MILESTONES — {done}/{std.milestones.length} complete
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
        {std.milestones.map((m, i) => (
          <div key={m.id} onClick={e => { e.stopPropagation(); onMilestoneClick(std.id, i); }}
            style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '4px 6px', borderRadius: 5, background: 'var(--gray-50)' }}>
            <span style={{ fontSize: 12, color: 'var(--gray-700)', fontWeight: 500, flex: 1, minWidth: 0, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{m.name}</span>
            <StatusPill status={m.status} onClick={() => {}} />
          </div>
        ))}
      </div>
    </div>
  );
}

// ── EXECUTIVE SUMMARY ─────────────────────────────────────────────────
function ExecSummary({ standards }) {
  const allMilestones = standards.flatMap(s => s.milestones);
  const overall = calcProgress(allMilestones);
  const byRAG = { green: 0, amber: 0, red: 0 };
  standards.forEach(s => { byRAG[calcRAG(calcProgress(s.milestones), s.milestones)]++; });
  const totalDocs = standards.flatMap(s => s.documents).length;
  const approvedDocs = standards.flatMap(s => s.documents).filter(d => d.status === 'approved').length;

  return (
    <div style={{ 
      background: 'linear-gradient(135deg, #fff 0%, #f9fafb 100%)', 
      borderRadius: 'var(--radius-lg)', 
      boxShadow: 'var(--premium-shadow)', 
      padding: '28px 32px', 
      marginBottom: 32,
      border: '1px solid var(--gray-200)',
      position: 'relative',
      overflow: 'hidden'
    }}>
      {/* Decorative Blur */}
      <div style={{ position: 'absolute', top: -40, right: -40, width: 200, height: 200, background: 'rgba(226, 0, 26, 0.03)', borderRadius: '50%', filter: 'blur(60px)' }} />
      
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 24, position: 'relative' }}>
        <div>
          <div style={{ fontSize: 11, color: 'var(--gray-500)', fontWeight: 600, letterSpacing: .5, textTransform: 'uppercase' }}>Executive Summary</div>
          <div style={{ fontSize: 20, fontWeight: 800, color: 'var(--navy)', marginTop: 2 }}>Multi-Standard ISO Certification Programme 2026</div>
        </div>
        <div style={{ textAlign: 'right' }}>
          <div style={{ fontSize: 11, color: 'var(--gray-500)', fontWeight: 500 }}>Current Phase</div>
          <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--blue)', marginTop: 2 }}>Phase 1 — Jasa Konsultan</div>
          <div style={{ fontSize: 11, color: 'var(--gray-500)' }}>Apr 2026 – Jul 2026</div>
        </div>
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: 16 }}>
        {[
          { label: 'Overall Progress', value: `${overall}%`, sub: 'across 7 standards', accent: 'var(--navy)', isMain: true },
          { label: 'On Track', value: byRAG.green, sub: 'standards', accent: '#059669', glow: '#05966908' },
          { label: 'At Risk', value: byRAG.amber, sub: 'standards', accent: '#D97706', glow: '#D9770608' },
          { label: 'Off Track', value: byRAG.red, sub: 'standards', accent: '#E2001A', glow: '#E2001A08' },
          { label: 'Documents Ready', value: `${approvedDocs}/${totalDocs}`, sub: 'approved', accent: '#2563EB', glow: '#2563EB08' },
        ].map((kpi, idx) => (
          <div key={kpi.label} style={{ 
            background: '#fff', 
            borderRadius: 'var(--radius-lg)', 
            padding: kpi.isMain ? '22px 24px' : '18px 20px',
            border: '1px solid #e9ecef',
            boxShadow: '0 1px 2px rgba(0,0,0,0.05)',
            position: 'relative',
            overflow: 'hidden',
            display: 'flex',
            flexDirection: 'column',
            justifyContent: 'center',
            transition: 'all 0.2s ease',
            cursor: 'default',
            minHeight: 110
          }}
          onMouseEnter={e => { 
            e.currentTarget.style.borderColor = '#d4d4d4';
            e.currentTarget.style.background = '#f9fafb';
          }}
          onMouseLeave={e => { 
            e.currentTarget.style.borderColor = '#e9ecef';
            e.currentTarget.style.background = '#fff';
          }}
          >
            <div style={{ fontSize: 10, color: 'var(--gray-500)', fontWeight: 700, marginBottom: 8, letterSpacing: 0.8, textTransform: 'uppercase' }}>{kpi.label}</div>
            <div style={{ 
              fontSize: kpi.isMain ? 44 : 30, 
              fontWeight: 800, 
              color: 'var(--gray-900)', 
              lineHeight: 1, 
              letterSpacing: -1,
              display: 'flex',
              alignItems: 'baseline',
              gap: 4
            }}>
              {kpi.value}
            </div>
            <div style={{ fontSize: 11, color: 'var(--gray-500)', marginTop: 8, fontWeight: 500 }}>{kpi.sub}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── TIMELINE (GANTT) ───────────────────────────────────────────────────
function Timeline({ standards, onMilestoneClick }) {
  const TOTAL_W = 30;
  const BAR_H = 22;
  const ROW_H = 42;
  const LABEL_W = 200;

  return (
    <div style={{ background: '#fff', borderRadius: 'var(--radius)', boxShadow: 'var(--shadow)', overflow: 'hidden' }}>
      <div style={{ padding: '16px 20px', borderBottom: '1px solid var(--gray-200)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <div style={{ fontWeight: 700, fontSize: 16, color: 'var(--navy)' }}>Programme Timeline</div>
        <div style={{ display: 'flex', gap: 12 }}>
          {Object.entries(STATUS_COLOR).map(([s, c]) => (
            <span key={s} style={{ display: 'flex', alignItems: 'center', gap: 4, fontSize: 11, color: 'var(--gray-600)' }}>
              <span style={{ width: 10, height: 10, borderRadius: 2, background: c, display: 'inline-block' }} />
              {STATUS_LABEL[s]}
            </span>
          ))}
        </div>
      </div>

                          pointerEvents: 'none',

      </div>
    </div>
  );

              <div style={{ fontWeight: 800, color: '#92400E', marginBottom: 4 }}>4. CI/CD & Automation</div>
              <div style={{ color: '#92400E', lineHeight: 1.4 }}>Status: <strong>⚠️ Needed</strong><br/>Establish GitLab CI / GitHub Actions pipeline executing Linting, Unit testing, and automated deploying on PR merges.</div>
            </div>
          </div>
        </div>

        {/* Data Management & Lineage */}
        <div style={{ background: '#fff', borderRadius: 'var(--radius)', boxShadow: 'var(--shadow)', padding: 20, borderLeft: '4px solid #7C3AED' }}>
          <h3 style={{ fontSize: 15, color: '#7C3AED', marginBottom: 12, display: 'flex', alignItems: 'center', gap: 8 }}><span>🗄️</span> Data Management Architecture</h3>
          <p style={{ fontSize: 12, color: 'var(--gray-600)', marginBottom: 16 }}>Following DAMA-DMBOK 3 principles, the offline-first engineering enforces strict schemas and referential tracking on the client side.</p>
          <ul style={{ listStyle: 'none', padding: 0, margin: 0, fontSize: 13, color: 'var(--gray-700)', display: 'flex', flexDirection: 'column', gap: 12 }}>
            <li style={{ padding: '12px 14px', background: 'var(--gray-50)', borderRadius: 6, border: '1px solid var(--gray-200)', lineHeight: 1.5 }}>
              <strong style={{display:'block',color:'var(--navy)',marginBottom:2}}>Event Bus Reactivity (Data Interoperability):</strong>
              The generic publish-subscribe model implemented inside <code>store.js</code> propagates state changes instantaneously, ensuring DOM instances remain synchronized without API fetches.
            </li>
            <li style={{ padding: '12px 14px', background: 'var(--gray-50)', borderRadius: 6, border: '1px solid var(--gray-200)', lineHeight: 1.5 }}>
              <strong style={{display:'block',color:'var(--navy)',marginBottom:2}}>Reference Immutability (Master Data):</strong>
              Global identifiers (Telco Jurisdiction mappings and standard baseline IDs like ISO 22301) are hardcoded defensively. References are mathematically bound, creating absolute single-source-of-truth reliability.
            </li>
            <li style={{ padding: '12px 14px', background: 'var(--gray-50)', borderRadius: 6, border: '1px solid var(--gray-200)', lineHeight: 1.5 }}>
              <strong style={{display:'block',color:'var(--navy)',marginBottom:2}}>Entity Bidirectionality (Lineage):</strong>
              An advanced local relationship tracking maps objects heavily—from Incident evidence all the way to global risk metrics, preventing orphaned nodes if a standard is retired.
            </li>
          </ul>
        </div>
      </div>
    </div>
  );
}

// ── ANALYTICS VIEW ─────────────────────────────────────────────────────
function AnalyticsView({ standards }) {
  const chartRef = useRef(null);
  const barRef = useRef(null);

  useEffect(() => {
    if (!chartRef.current || !barRef.current) return;

    // Radar Chart: ISO Coverage
    const radarCtx = chartRef.current.getContext('2d');
    const radar = new Chart(radarCtx, {
      type: 'radar',
      data: {
        labels: standards.map(s => s.abbr),
        datasets: [{
          label: 'Maturity %',
          data: standards.map(s => calcProgress(s.milestones)),
          backgroundColor: 'rgba(226, 0, 26, 0.1)',
          borderColor: 'var(--red)',
          borderWidth: 2,
          pointBackgroundColor: 'var(--red)',
        }]
      },
      options: {
        scales: {
          r: { beginAtZero: true, max: 100, ticks: { display: false } }
        },
        plugins: { legend: { display: false } }
      }
    });

    // Bar Chart: NCR Distribution
    const stats = GRCStore.getDataStats();
    const ncrs = GRCStore.getNCRs();
    const ncrByStd = {};
    standards.forEach(s => ncrByStd[s.abbr] = ncrs.filter(n => n.standardId === s.id).length);

    const barCtx = barRef.current.getContext('2d');
    const bar = new Chart(barCtx, {
      type: 'bar',
      data: {
        labels: Object.keys(ncrByStd),
        datasets: [{
          label: 'Total NCRs',
          data: Object.values(ncrByStd),
          backgroundColor: standards.map(s => s.color + '88'),
          borderColor: standards.map(s => s.color),
          borderWidth: 1,
          borderRadius: 4
        }]
      },
      options: {
        indexAxis: 'y',
        plugins: { legend: { display: false } },
        scales: { x: { beginAtZero: true, grid: { display: false } }, y: { grid: { display: false } } }
      }
    });

    return () => { radar.destroy(); bar.destroy(); };
  }, [standards]);

  return (
    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 20 }}>
      <div style={{ background: '#fff', borderRadius: 'var(--radius)', boxShadow: 'var(--shadow)', padding: 24 }}>
        <div style={{ fontWeight: 800, fontSize: 16, color: 'var(--navy)', marginBottom: 20 }}>Programme Maturity Profile</div>
        <div style={{ height: 300, display: 'flex', justifyContent: 'center' }}>
          <canvas ref={chartRef}></canvas>
        </div>
        <div style={{ fontSize: 11, color: 'var(--gray-500)', marginTop: 16, textAlign: 'center' }}>
          Standardized progress across all 7 certification modules.
        </div>
      </div>
      <div style={{ background: '#fff', borderRadius: 'var(--radius)', boxShadow: 'var(--shadow)', padding: 24 }}>
        <div style={{ fontWeight: 800, fontSize: 16, color: 'var(--navy)', marginBottom: 20 }}>NCR Distribution by Standard</div>
        <div style={{ height: 300 }}>
          <canvas ref={barRef}></canvas>
        </div>
        <div style={{ fontSize: 11, color: 'var(--gray-500)', marginTop: 16, textAlign: 'center' }}>
          Current volume of open non-conformities awaiting remediation.
        </div>
      </div>
    </div>
  );
}

// ── MAIN APP ───────────────────────────────────────────────────────────
function App() {
  const [nav, setNav] = useState(() => localStorage.getItem('telin_nav') || 'dashboard');
  const [showMCP, setShowMCP] = useState(() => localStorage.getItem('telin_mcp') === 'true');
  const [standards, setStandards] = useState(() => {
    const store = GRCStore.get();
    return GRCStore.STANDARDS.map(s => ({
      ...s,
      milestones: GRCStore.getMilestones(s.id),
      documents: GRCStore.getDocuments(s.id)
    }));
  });
  const [selectedStd, setSelectedStd] = useState(null);
  const [tweaks, setTweaks] = useState(false);

  useEffect(() => { localStorage.setItem('telin_nav', nav); }, [nav]);
  useEffect(() => { localStorage.setItem('telin_mcp', showMCP); }, [showMCP]);
  useEffect(() => { localStorage.setItem('telin_standards', JSON.stringify(standards)); }, [standards]);

  const cycleMilestone = useCallback((stdId, mIdx) => {
    const std = standards.find(s => s.id === stdId);
    if (!std) return;
    const m = std.milestones[mIdx];
    const cur = STATUS_CYCLE.indexOf(m.status);
    const nextStatus = STATUS_CYCLE[(cur + 1) % STATUS_CYCLE.length];
    
    GRCStore.updateMilestone(stdId, m.id, { status: nextStatus });
    
    setStandards(prev => prev.map(s => {
      if (s.id !== stdId) return s;
      const mils = s.milestones.map((mil, i) => i === mIdx ? { ...mil, status: nextStatus } : mil);
      return { ...s, milestones: mils };
    }));
  }, [standards]);

  // Tweaks
  useEffect(() => {
    window.addEventListener('message', e => {
      if (e.data?.type === '__activate_edit_mode') setTweaks(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaks(false);
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
  }, []);

  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "showPhaseLabel": true,
    "compactCards": true,
    "highlightToday": true
  }/*EDITMODE-END*/;
  const [twkVals, setTwkVals] = useState(TWEAK_DEFAULTS);

  const renderContent = () => {
    if (nav === 'standards' && selectedStd) {
      const std = standards.find(s => s.id === selectedStd);
      return <StandardDetail std={std} onMilestoneClick={cycleMilestone} onBack={() => setSelectedStd(null)} />;
    }
    switch (nav) {
      case 'dashboard':
        return (
          <>
            <ExecSummary standards={standards} />
            <div style={{ fontWeight: 700, fontSize: 15, color: 'var(--gray-700)', marginBottom: 14 }}>Standards Overview</div>
            <div style={{ display: 'grid', gridTemplateColumns: twkVals.compactCards ? 'repeat(3, 1fr)' : 'repeat(2, 1fr)', gap: 16 }}>
              {standards.map(std => (
                <StandardCard key={std.id} std={std} onMilestoneClick={cycleMilestone}
                  onClick={() => { setSelectedStd(std.id); setNav('standards'); }} />
              ))}
            </div>
          </>
        );
      case 'timeline':
        return <Timeline standards={standards} onMilestoneClick={cycleMilestone} />;
      case 'standards':
        return (
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 16 }}>
            {standards.map(std => (
              <StandardCard key={std.id} std={std} onMilestoneClick={cycleMilestone}
                onClick={() => setSelectedStd(std.id)} />
            ))}
          </div>
        );
      case 'documents':
        return <DocumentsView standards={standards} />;
      case 'ai-diagnostics':
        return <AiDiagnosticsView standards={standards} />;
      case 'analytics':
        return <AnalyticsView standards={standards} />;
      case 'project-charter':
        return <ProjectCharterView />;
    }
  };

  const NAV_TITLES = { dashboard: 'Dashboard', timeline: 'Programme Timeline', standards: 'Standards Detail', documents: 'Document Status', 'ai-diagnostics': 'MCP AI Skills Diagnostics', 'project-charter': 'Project Charter & Dev Board' };

  return (
    <div style={{ display: 'flex', minHeight: '100vh', width: '100%' }}>
      <Sidebar 
        active={nav} 
        onNav={id => { setNav(id); setSelectedStd(null); }} 
        showHidden={showMCP}
        onToggleHidden={() => setShowMCP(p => !p)}
      />
      <main style={{ flex: 1, padding: '28px 28px', overflowY: 'auto', maxWidth: '100%' }}>
        {/* Top bar */}
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 24 }}>
          <div>
            <div style={{ fontSize: 22, fontWeight: 800, color: 'var(--navy)' }}>{NAV_TITLES[nav]}</div>
            <div style={{ fontSize: 12, color: 'var(--gray-500)', marginTop: 2 }}>As of 19 April 2026 · Click any milestone status to update</div>
          </div>
          <button onClick={() => { if(confirm('Reset all progress?')) { GRCStore.reset(); location.reload(); } }}
            style={{ 
              fontSize: 12, fontWeight: 700, color: '#fff', 
              padding: '10px 20px', borderRadius: 'var(--radius-pill)', 
              background: 'var(--red)', 
              boxShadow: '0 4px 14px rgba(226, 0, 26, 0.3)',
              cursor: 'pointer', transition: 'all 0.2s',
              border: 'none',
              letterSpacing: 0.5,
              textTransform: 'uppercase'
            }}
            onMouseEnter={e => { e.currentTarget.style.transform = 'scale(1.05)'; e.currentTarget.style.boxShadow = '0 6px 20px rgba(226, 0, 26, 0.4)'; }}
            onMouseLeave={e => { e.currentTarget.style.transform = 'none'; e.currentTarget.style.boxShadow = '0 4px 14px rgba(226, 0, 26, 0.3)'; }}
          >
            Reset Environment
          </button>
        </div>
        {renderContent()}
      </main>

      {/* Tweaks Panel */}
      {tweaks && (
        <div style={{
          position: 'fixed', bottom: 24, right: 24, background: '#fff',
          borderRadius: 12, boxShadow: '0 8px 32px rgba(0,0,0,.15)',
          padding: 20, width: 240, zIndex: 999, border: '1px solid var(--gray-200)',
        }}>
          <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 14, color: 'var(--navy)' }}>Tweaks</div>
          {[
            { key: 'compactCards', label: '3-column card grid' },
            { key: 'showPhaseLabel', label: 'Show phase labels' },
            { key: 'highlightToday', label: 'Highlight today line' },
          ].map(t => (
            <label key={t.key} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10, cursor: 'pointer' }}>
              <span style={{ fontSize: 13, color: 'var(--gray-700)' }}>{t.label}</span>
              <input type="checkbox" checked={twkVals[t.key]} onChange={e => {
                const next = { ...twkVals, [t.key]: e.target.checked };
                setTwkVals(next);
                window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
              }} />
            </label>
          ))}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
