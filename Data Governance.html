// ── Tree Node Component ────────────────────────────────────────────────────────
function TreeNode({node,depth=0,defaultOpen=false}){
  const [open,setOpen]=useState(defaultOpen||depth<1);
  const hasChildren=node.children&&node.children.length>0;
  const indent=depth*20;

  return <div>
    <div onClick={()=>hasChildren&&setOpen(!open)} style={{
      display:'flex',alignItems:'flex-start',gap:8,padding:'8px 12px 8px '+(12+indent)+'px',
      borderRadius:6,cursor:hasChildren?'pointer':'default',
      background:open&&hasChildren?`${node.color||'#6B7280'}08`:'transparent',
      borderLeft:depth===0?`3px solid ${node.color||'#6B7280'}`:`2px solid ${depth===1?node.color+'44':'var(--gray-200)'}`,
      marginBottom:2,transition:'background .15s',
    }}
    onMouseEnter={e=>{if(hasChildren)e.currentTarget.style.background=`${node.color||'#6B7280'}10`;}}
    onMouseLeave={e=>{e.currentTarget.style.background=open&&hasChildren?`${node.color||'#6B7280'}08`:'transparent';}}>
      {hasChildren&&<span style={{fontSize:10,color:node.color||'var(--gray-500)',marginTop:2,flexShrink:0,transition:'transform .2s',display:'inline-block',transform:open?'rotate(90deg)':'none'}}>▶</span>}
      {!hasChildren&&<span style={{width:12,display:'inline-block'}}/>}
      <div style={{flex:1}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          {node.num&&<span style={{fontFamily:'var(--mono)',fontSize:10,color:node.color,fontWeight:700,background:`${node.color}18`,borderRadius:4,padding:'1px 6px'}}>{node.num}</span>}
          {node.icon&&<span style={{fontSize:depth===0?18:13}}>{node.icon}</span>}
          <span style={{fontWeight:depth===0?800:depth===1?600:500,fontSize:depth===0?15:depth===1?13:12,color:depth===0?'var(--navy)':'var(--gray-800)'}}>{node.title}</span>
          {node.steward&&depth===0&&<span style={{marginLeft:'auto',fontSize:10,color:'var(--gray-500)',background:'var(--gray-100)',borderRadius:4,padding:'1px 6px',fontWeight:500}}>Steward: {node.steward}</span>}
        </div>
        {depth===0&&node.desc&&<div style={{fontSize:12,color:'var(--gray-600)',marginTop:3,lineHeight:1.4}}>{node.desc}</div>}
        {node.telin&&<div style={{fontSize:11,color:depth===0?node.color:'var(--gray-600)',marginTop:3,lineHeight:1.4,borderLeft:`2px solid ${node.color||'var(--gray-300)'}`,paddingLeft:8,fontStyle:depth===0?'normal':'italic'}}>{node.telin}</div>}
      </div>
    </div>
    {open&&hasChildren&&<div style={{marginLeft:indent+12}}>
      {node.children.map(child=><TreeNode key={child.id} node={{...child,color:node.color}} depth={depth+1}/>)}
    </div>}
  </div>;
}

// ── Entity Relationship Diagram ────────────────────────────────────────────────
function ERDiagram(){
  const entities=[
    {id:'STD',  label:'standards',    type:'REF',  x:350, y:20,  color:'#6B7280', fields:['id PK','code','abbr','certType','color']},
    {id:'JUR',  label:'jurisdictions',type:'REF',  x:650, y:20,  color:'#6B7280', fields:['id PK','code','label','flag']},
    {id:'MIL',  label:'milestones',   type:'MASTER',x:80, y:160, color:'#059669', fields:['id PK','standardId FK','name','phase','startWeek','status']},
    {id:'DOC',  label:'documents',    type:'MASTER',x:600, y:160, color:'#059669', fields:['id PK','standardId FK','name','status']},
    {id:'EV',   label:'evidence',     type:'OPS',  x:350, y:200, color:'#2563EB', fields:['id PK','standardIds[] FK','clauseRefs[]','type','status','owner']},
    {id:'RISK', label:'risks',        type:'OPS',  x:80,  y:380, color:'#DC2626', fields:['id PK','standardIds[] FK','ncrIds[] FK','likelihood','impact','treatment']},
    {id:'NCR',  label:'ncrs',         type:'OPS',  x:350, y:380, color:'#D97706', fields:['id PK','standardId FK','riskIds[] FK','evidenceIds[] FK','severity','status']},
    {id:'LR',   label:'legalReqs',    type:'OPS',  x:620, y:380, color:'#7C3AED', fields:['id PK','jurisdiction FK','standardIds[] FK','type','priority','status']},
    {id:'CR',   label:'checklistResp',type:'OPS',  x:350, y:540, color:'#0891B2', fields:['id PK','standardId FK','clauseRef','finding','evidenceSampled']},
  ];

  const lines=[
    {from:'MIL', to:'STD', label:'M:1', cascade:'CASCADE'},
    {from:'DOC', to:'STD', label:'M:1', cascade:'CASCADE'},
    {from:'EV',  to:'STD', label:'M:M (standardIds[])', cascade:'SET NULL'},
    {from:'RISK',to:'STD', label:'M:M (standardIds[])', cascade:'SET NULL'},
    {from:'NCR', to:'STD', label:'M:1 (standardId)', cascade:'CASCADE'},
    {from:'NCR', to:'RISK', label:'M:M (riskIds[] ↔ ncrIds[])', cascade:'NULLIFY'},
    {from:'NCR', to:'EV',   label:'M:M (evidenceIds[])', cascade:'NULLIFY'},
    {from:'LR',  to:'JUR',  label:'M:1 (jurisdiction)', cascade:'RESTRICT'},
    {from:'LR',  to:'STD',  label:'M:M (standardIds[])', cascade:'SET NULL'},
    {from:'CR',  to:'STD',  label:'M:1 (standardId)', cascade:'CASCADE'},
  ];

  const entityMap={};
  entities.forEach(e=>entityMap[e.id]=e);

  const typeColors={'REF':'#6B7280','MASTER':'#059669','OPS':'#2563EB'};

    return <div style={{overflowX:'auto', paddingBottom: 20}}>
      <svg width={960} height={720} viewBox="-20 -10 1000 740" style={{fontFamily:'var(--font)',display:'block',margin:'0 auto'}}>
      <defs>
        <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
          <path d="M0,0 L0,6 L8,3 z" fill="#94A3B8"/>
        </marker>
      </defs>

      {/* Legend */}
      {[['REF','Reference (immutable)'],['MASTER','Master Data'],['OPS','Operational Data']].map(([type,label],i)=>
        <g key={type} transform={`translate(${20+i*200},8)`}>
          <rect width={12} height={12} rx={2} fill={typeColors[type]} opacity={.7}/>
          <text x={16} y={10} fontSize={10} fill="#6B7280">{label}</text>
        </g>
      )}

      {/* Relationship lines */}
      {lines.map((l,i)=>{
        const from=entityMap[l.from];
        const to=entityMap[l.to];
        if(!from||!to)return null;
        const x1=from.x+130; const y1=from.y+40;
        const x2=to.x+130;   const y2=to.y+40;
        const mx=(x1+x2)/2;  const my=(y1+y2)/2;
        return <g key={i}>
          <line x1={x1} y1={y1} x2={x2} y2={y2} stroke="#CBD5E1" strokeWidth={1.5} markerEnd="url(#arr)" strokeDasharray={l.cascade==='CASCADE'?'none':'4,3'}/>
          <rect x={mx-30} y={my-8} width={60} height={14} rx={3} fill="#F8FAFF" opacity={.9}/>
          <text x={mx} y={my+3} textAnchor="middle" fontSize={8} fill="#64748B">{l.label}</text>
        </g>;
      })}

      {/* Entity boxes */}
      {entities.map(e=><g key={e.id} transform={`translate(${e.x},${e.y})`}>
        <rect width={260} height={30+e.fields.length*16} rx={6} fill="#fff" stroke={e.color} strokeWidth={1.5}/>
        <rect width={260} height={28} rx={6} fill={e.color} opacity={.12}/>
        <rect width={260} height={4} rx={0} fill={e.color} y={0}/>
        <text x={10} y={18} fontSize={11} fontWeight={700} fill={e.color}>{e.label}</text>
        <text x={240} y={18} textAnchor="end" fontSize={9} fill={e.color} opacity={.7}>{e.type}</text>
        {e.fields.map((f,i)=><text key={i} x={12} y={38+i*16} fontSize={10} fill="#475569" fontFamily="'DM Mono',monospace">
          {f}
        </text>)}
      </g>)}
    </svg>
    <div style={{textAlign:'center',fontSize:11,color:'var(--gray-500)',marginTop:4}}>Solid line = CASCADE · Dashed = SET NULL / NULLIFY · Arrow = FK direction</div>
  </div>;
}

// ── Integrity Panel ────────────────────────────────────────────────────────────
function IntegrityPanel(){
  const [violations,setViolations]=useState(null);
  const [quality,setQuality]=useState(null);
  const [stats,setStats]=useState(null);
  const [running,setRunning]=useState(false);
  const [lastRun,setLastRun]=useState(null);
  const [storeInfo,setStoreInfo]=useState(null);

  const run=useCallback(()=>{
    setRunning(true);
    setTimeout(()=>{
      try{
        const v=GRCStore.validateIntegrity();
        const q=GRCStore.calcDataQuality();
        const s=GRCStore.getDataStats();
        const store=GRCStore.get();
        setViolations(v);
        setQuality(q);
        setStats(s);
        setStoreInfo({version:store._version,created:store._created,lastModified:store._lastModified,size:(JSON.stringify(store).length/1024).toFixed(1)});
        setLastRun(new Date().toLocaleTimeString());
      }catch(e){
        setViolations([{entity:'STORE',id:'—',field:'—',msg:'Error reading store: '+e.message}]);
      }
      setRunning(false);
    },300);
  },[]);

  useEffect(()=>{run();},[]);

  const scoreColor=s=>s>=90?'#16A34A':s>=70?'#D97706':'#DC2626';
  const scoreBg=s=>s>=90?'#DCFCE7':s>=70?'#FEF3C7':'#FEE2E2';

  return <div>
    {/* Notion-Style Header */}
    <div style={{background:'#fff', borderBottom:'1px solid var(--gray-200)', padding:'24px 28px'}}>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:24}}>
        <div>
          <div style={{display:'flex', alignItems:'center', gap:8, color:'var(--gray-500)', fontSize:12, marginBottom:4}}>
            <span>ISO Certification 2026</span>
            <span>/</span>
            <span style={{fontWeight:600, color:'var(--gray-900)'}}>Data Governance</span>
          </div>
          <div style={{fontSize:24, fontWeight:800, color:'var(--gray-900)', letterSpacing:'-0.5px'}}>Data Management & Metadata</div>
          <div style={{fontSize:13, color:'var(--gray-500)', marginTop:4}}>DAMA-DMBOK 3 Architecture · GRC SSoT v1</div>
        </div>
        <div style={{display:'flex', gap:10}}>
          <button onClick={run} style={{padding:'8px 20px', borderRadius:'var(--radius-pill)', background:'var(--navy)', color:'#fff', fontWeight:700, fontSize:13, border:'none', boxShadow:'var(--shadow-sm)'}}>Validate Core</button>
          <a href="Dashboard.html" style={{padding:'8px 16px', borderRadius:6, border:'1px solid var(--gray-200)', color:'var(--gray-700)', textDecoration:'none', fontSize:13, fontWeight:600, display:'flex', alignItems:'center', gap:6}}>
            <span>←</span> Dashboard
          </a>
        </div>
      </div>

      {/* Bento Highlights */}
      <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(130px, 1fr))', gap:16, marginBottom:8}}>
        {[
          { label: 'Schema Version', val: `v${storeInfo?.version}`, color: 'var(--gray-900)', sub: 'Current GRC Schema' },
          { label: 'Store Size', val: `${storeInfo?.size} KB`, color: '#2563EB', sub: 'localStorage utilization' },
          { label: 'Evidence Register', val: stats?.evidence || 0, color: '#059669', sub: 'Total artifacts' },
          { label: 'NCR Findings', val: stats?.ncrs || 0, color: '#E2001A', sub: 'Non-conformities' },
          { label: 'Risk Portfolio', val: stats?.risks || 0, color: '#D97706', sub: 'Managed threats' },
          { label: 'Legal Register', val: stats?.legalReqs || 0, color: '#7C3AED', sub: 'Statutory requirements' },
        ].map(kpi => (
          <div key={kpi.label} style={{
            background: '#fff', border: '1px solid var(--gray-200)', borderRadius: 'var(--radius-lg)',
            padding: '16px 20px', transition: 'all 0.2s',
            boxShadow: '0 1px 2px rgba(0,0,0,0.05)'
          }}
          onMouseEnter={e => { e.currentTarget.style.borderColor = '#d4d4d4'; e.currentTarget.style.background = '#f9fafb'; }}
          onMouseLeave={e => { e.currentTarget.style.borderColor = 'var(--gray-200)'; e.currentTarget.style.background = '#fff'; }}
          >
            <div style={{fontSize:10, fontWeight:700, color:'var(--gray-500)', textTransform:'uppercase', letterSpacing:0.8, marginBottom:8}}>{kpi.label}</div>
            <div style={{fontSize:28, fontWeight:800, color:kpi.color, lineHeight:1, letterSpacing:'-1px'}}>{kpi.val}</div>
            <div style={{fontSize:11, color:'var(--gray-500)', marginTop:6, fontWeight:500}}>{kpi.sub}</div>
          </div>
        ))}
      </div>
    </div>

    {/* Data Quality Scores */}
    {quality&&<div style={{background:'#fff',borderRadius:'var(--radius)',boxShadow:'var(--shadow)',padding:16,marginBottom:16}}>
      <div style={{fontWeight:700,fontSize:13,color:'var(--navy)',marginBottom:12}}>Data Quality Dimensions</div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginBottom:12}}>
        {[
          {label:'Evidence Completeness', score:quality.evidence?.score||0},
          {label:'NCR Completeness',      score:quality.ncrs?.score||0},
          {label:'Risk Completeness',     score:quality.risks?.score||0},
          {label:'Legal Req Completeness',score:quality.legalReqs?.score||0},
        ].map(q=><div key={q.label} style={{background:scoreBg(q.score),borderRadius:8,padding:'12px',textAlign:'center'}}>
          <div style={{fontSize:26,fontWeight:800,color:scoreColor(q.score)}}>{q.score}%</div>
          <div style={{fontSize:11,color:scoreColor(q.score),fontWeight:600,marginTop:2}}>{q.label}</div>
        </div>)}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
        {[
          {label:'Consistency Score',      score:quality.consistency||0,  desc:'Bidirectional NCR↔Risk FK integrity'},
          {label:'Evidence Timeliness',    score:quality.timeliness?.evidence||0, desc:'% evidence items not overdue'},
          {label:'Legal Review Timeliness',score:quality.timeliness?.legalReqs||0,desc:'% legal reqs not overdue for review'},
        ].map(q=><div key={q.label} style={{background:scoreBg(q.score),borderRadius:8,padding:'12px'}}>
          <div style={{fontSize:22,fontWeight:800,color:scoreColor(q.score)}}>{q.score}%</div>
          <div style={{fontSize:12,fontWeight:600,color:scoreColor(q.score),marginTop:1}}>{q.label}</div>
          <div style={{fontSize:11,color:'var(--gray-500)',marginTop:2}}>{q.desc}</div>
        </div>)}
      </div>
    </div>}

    {/* Integrity Violations */}
    {violations!==null&&<div style={{background:'#fff',borderRadius:'var(--radius)',boxShadow:'var(--shadow)',padding:16}}>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
        <div style={{fontWeight:700,fontSize:13,color:'var(--navy)'}}>FK Integrity Check</div>
        {violations.length===0
          ?<span style={{background:'#DCFCE7',color:'#16A34A',borderRadius:20,padding:'2px 10px',fontSize:11,fontWeight:700}}>✓ All {stats?.evidence||0+stats?.ncrs||0+stats?.risks||0+stats?.legalReqs||0} FK references valid — PASS</span>
          :<span style={{background:'#FEE2E2',color:'#DC2626',borderRadius:20,padding:'2px 10px',fontSize:11,fontWeight:700}}>⚠ {violations.length} violation(s) — FAIL</span>
        }
      </div>
      {violations.length===0
        ?<div style={{color:'#16A34A',fontSize:13,padding:'12px',background:'#DCFCE7',borderRadius:8}}>
            ✅ No integrity violations detected. The GRC store is consistent.
          </div>
        :<table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead><tr style={{background:'var(--gray-50)',borderBottom:'2px solid var(--gray-200)'}}>
            {['Entity','ID','Field','Violation'].map(h=><th key={h} style={{textAlign:'left',padding:'8px 10px',fontSize:11,fontWeight:700,color:'var(--gray-500)',textTransform:'uppercase'}}>{h}</th>)}
          </tr></thead>
          <tbody>{violations.map((v,i)=><tr key={i} style={{borderBottom:'1px solid var(--gray-100)',background:i%2===0?'#fff':'var(--gray-50)'}}>
            <td style={{padding:'8px 10px',fontFamily:'var(--mono)',fontSize:11,color:'#D97706'}}>{v.entity}</td>
            <td style={{padding:'8px 10px',fontFamily:'var(--mono)',fontSize:11,color:'var(--gray-500)'}}>{v.id}</td>
            <td style={{padding:'8px 10px',fontFamily:'var(--mono)',fontSize:11,color:'var(--gray-600)'}}>{v.field}</td>
            <td style={{padding:'8px 10px',fontSize:12,color:'#DC2626'}}>{v.msg}</td>
          </tr>)}</tbody>
        </table>
      }
    </div>}
  </div>;
}
