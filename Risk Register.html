<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Telin — Risk Register</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script src="store.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0D1B2A; --red:#E2001A;
  --gray-50:#f7f7f5; --gray-100:#f1f1f0; --gray-200:#e9ecef;
  --gray-300:#dee2e6; --gray-500:#868685; --gray-600:#6c757d;
  --gray-700:#37352f; --gray-900:#050505;
  --font:'Plus Jakarta Sans',sans-serif; --mono:'DM Mono',monospace;
  --shadow:0 1px 3px rgba(15, 15, 15, 0.1); --shadow-sm: 0 1px 2px rgba(15, 15, 15, 0.1);
  --radius:6px; --radius-lg:10px;
}
html,body,#root{height:100%;font-family:var(--font);background:var(--gray-50);color:var(--gray-900);font-size:13px}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:var(--gray-300);border-radius:3px}
button,input,select,textarea{font-family:var(--font)}
input,select,textarea{border:1px solid var(--gray-300);border-radius:6px;padding:7px 10px;font-size:13px;outline:none;background:#fff;transition:border-color .15s;width:100%}
input:focus,select:focus,textarea:focus{border-color:#2563EB;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
</style>
</head>
<body><div id="root"></div>
<script type="text/babel">
const {useState,useMemo,useEffect} = React;

const STD_META = {
  iso27001:{abbr:'ISMS',color:'#2563EB',code:'ISO/IEC 27001:2022'},
  iso27701:{abbr:'PIMS',color:'#7C3AED',code:'ISO/IEC 27701:2019'},
  iso37001:{abbr:'ABMS',color:'#DC2626',code:'ISO 37001:2016'},
  iso20000:{abbr:'ITSMS',color:'#059669',code:'ISO/IEC 20000-1:2018'},
  iso50001:{abbr:'EnMS',color:'#D97706',code:'ISO 50001:2018'},
  iso45001:{abbr:'OHSMS',color:'#0891B2',code:'ISO 45001:2018'},
  iso22301:{abbr:'BCMS',color:'#B91C1C',code:'ISO 22301:2019'},
};

const CATEGORIES = ['Information Security','Privacy / PII','Bribery & Corruption','IT Service Continuity','Energy Performance','Occupational Health & Safety','Legal & Regulatory','Third-Party / Supply Chain','Financial','Reputational','Operational'];
const TREATMENTS = {treat:{label:'Treat (Mitigate)',color:'#2563EB'},accept:{label:'Accept',color:'#16A34A'},transfer:{label:'Transfer (Insurance/Contract)',color:'#7C3AED'},avoid:{label:'Avoid (Eliminate)',color:'#DC2626'}};
const OWNERS = ['IT Security','Legal','HR','Facility Mgmt','Top Management','Internal Audit','Operations','Finance'];
const RISK_STATUS = {open:{label:'Open',color:'#DC2626',bg:'#FEE2E2'},mitigating:{label:'Mitigating',color:'#D97706',bg:'#FEF3C7'},residual:{label:'Residual Accepted',color:'#16A34A',bg:'#DCFCE7'},closed:{label:'Closed',color:'#ADB5BD',bg:'#F1F3F5'}};

const scoreColor = s => s>=16?'#DC2626':s>=9?'#D97706':s>=4?'#F59E0B':'#16A34A';
const scoreBg   = s => s>=16?'#FEE2E2':s>=9?'#FEF3C7':s>=4?'#FFFBEB':'#DCFCE7';
const scoreLabel= s => s>=16?'Critical':s>=9?'High':s>=4?'Medium':'Low';

const SEED = [
  // ISMS Risks
  {id:'R-001',standardIds:['iso27001','iso27701'],category:'Information Security',title:'Ransomware attack on TOCC network',description:'Ransomware targeting the Telin Operation & Command Centre (TOCC) could disrupt 24/7 network surveillance and real-time fault handling across 65 PoPs, impacting all submarine cable and PoP services.',clause:'6.1.2',likelihood:3,impact:5,controls:'EDR/XDR deployed; network segmentation; backup systems; IR plan.',residualL:2,residualI:4,treatment:'treat',owner:'IT Security',reviewDate:'2026-09-30',treatmentPlan:'Deploy zero-trust network architecture; complete TOCC network segmentation Q3 2026; conduct red team exercise.',status:'mitigating',notes:''},
  {id:'R-002',standardIds:['iso27001','iso27701'],category:'Privacy / PII',title:'UU PDP non-compliance — PII breach notification failure',description:'Failure to notify regulators and affected individuals within 14 days of a PII breach as required by UU PDP Art. 46. Risk of IDR 60 billion fine per violation.',clause:'6.1.2',likelihood:3,impact:5,controls:'Incident response procedure exists; basic breach log maintained.',residualL:2,residualI:5,treatment:'treat',owner:'Legal',reviewDate:'2026-06-30',treatmentPlan:'Implement automated breach detection and notification workflow. Appoint DPO. Run breach simulation exercise.',status:'open',notes:'UU PDP enforcement started Oct 2024. HIGH PRIORITY.'},
  {id:'R-003',standardIds:['iso27001'],category:'Third-Party / Supply Chain',title:'Submarine cable equipment supplier compromise',description:'Hardware or software supply chain attack through network equipment from key submarine cable suppliers (e.g. TE SubCom, NEC). Compromised equipment could enable persistent access to Telin\'s global cable infrastructure.',clause:'6.1.2',likelihood:2,impact:5,controls:'Vendor assessment process; equipment inspection; network monitoring.',residualL:2,residualI:4,treatment:'treat',owner:'IT Security',reviewDate:'2026-09-30',treatmentPlan:'Implement NIST CSF 2.0 supply chain security controls; conduct technical audit of key equipment suppliers; apply Annex A.5.19-5.22 controls.',status:'mitigating',notes:''},
  // PIMS Risks
  {id:'R-004',standardIds:['iso27701'],category:'Privacy / PII',title:'Cross-border PII transfer without adequate safeguards',description:'PII transferred between Telin entities (ID→SG→HK→AU→USA) without documented transfer mechanisms. Each jurisdiction has different legal basis requirements for cross-border transfers.',clause:'7.2.1',likelihood:3,impact:4,controls:'Data mapping in progress. Some transfer agreements exist.',residualL:2,residualI:4,treatment:'treat',owner:'Legal',reviewDate:'2026-07-15',treatmentPlan:'Complete cross-border data mapping. Implement standard contractual clauses for each jurisdiction pair. Appoint DPO with cross-border transfer authority.',status:'open',notes:'Directly linked to NCR-002.'},
  // ABMS Risks
  {id:'R-005',standardIds:['iso37001'],category:'Bribery & Corruption',title:'FCPA violation by Telin USA — DOJ enforcement',description:'Telin USA, as a subsidiary of state-owned Telkom, faces Foreign Corrupt Practices Act (FCPA) exposure. DOJ actively investigates payments involving US nexus and foreign officials. Criminal conviction risk.',clause:'8.7',likelihood:2,impact:5,controls:'Anti-bribery policy exists. Gift register maintained at HQ level.',residualL:1,residualI:5,treatment:'treat',owner:'Legal',reviewDate:'2026-06-15',treatmentPlan:'Extend ABMS scope to Telin USA. Conduct FCPA-specific risk assessment. Engage US legal counsel. Implement FCPA training for USA staff. Third-party due diligence programme.',status:'open',notes:'CRITICAL — directly linked to NCR-003. CB must be notified of scope change.'},
  {id:'R-006',standardIds:['iso37001'],category:'Bribery & Corruption',title:'Procurement bribery in network infrastructure contracts',description:'Large-value procurement contracts (submarine cable, data center equipment, PoP infrastructure) create significant bribery risk, particularly in high-risk jurisdictions (Timor-Leste, certain SE Asian markets).',clause:'8.7',likelihood:3,impact:4,controls:'Procurement policy exists. Tender committee established.',residualL:2,residualI:3,treatment:'treat',owner:'Legal',reviewDate:'2026-07-30',treatmentPlan:'Implement mandatory ABMS due diligence for all procurement >IDR 1 billion. Add anti-bribery clause to all vendor contracts. Whistleblower channel activated.',status:'mitigating',notes:''},
  // ITSMS Risks
  {id:'R-007',standardIds:['iso20000'],category:'IT Service Continuity',title:'SLA breach for hyperscaler transit services',description:'Single major service disruption or prolonged degradation could breach SLA commitments with hyperscaler clients (AWS, Google, Microsoft) routing traffic via Telin cables. Penalty clauses and reputational impact.',clause:'8.1',likelihood:2,impact:4,controls:'Redundant cable routes; TOCC 24/7 monitoring; incident management process.',residualL:1,residualI:4,treatment:'treat',owner:'IT Security',reviewDate:'2026-09-30',treatmentPlan:'Implement ISO 22301 BCMS (planned 2027). Conduct quarterly cable route failover tests. Review SLA penalty caps.',status:'mitigating',notes:'ISO 22301 strongly recommended — see ULTRAPLAN.'},
  {id:'R-008',standardIds:['iso20000'],category:'IT Service Continuity',title:'Change management failure causing service outage',description:'Inadequately managed changes to network configuration across 65 PoPs risk causing unplanned service outages, violating ITIL and ISO 20000-1 change management requirements.',clause:'8.5',likelihood:3,impact:3,controls:'Change management procedure; CAB (Change Advisory Board) process.',residualL:2,residualI:3,treatment:'treat',owner:'IT Security',reviewDate:'2026-07-30',treatmentPlan:'Implement automated change validation in ITSM tool. Enforce emergency change protocol. Link to NCR-004 (configuration management gap).',status:'mitigating',notes:''},
  // EnMS Risks
  {id:'R-009',standardIds:['iso50001'],category:'Energy Performance',title:'Energy baseline not established — EnMS new cert failure',description:'Failure to establish documented energy baseline and EnPIs prior to Stage 1 audit will result in Major NC and potential suspension of new certification audit. Entire EnMS programme at risk.',clause:'6.3',likelihood:4,impact:5,controls:'Energy data collection initiated. Facility management team engaged.',residualL:2,residualI:5,treatment:'treat',owner:'Facility Mgmt',reviewDate:'2026-07-01',treatmentPlan:'Appoint Energy Management Representative. Collect 12-month energy consumption data from all in-scope facilities. Establish baseline and EnPIs by June 30, 2026.',status:'open',notes:'CRITICAL — directly linked to NCR-005. Must resolve before Stage 1 CB audit.'},
  {id:'R-010',standardIds:['iso50001'],category:'Energy Performance',title:'Regulatory non-compliance — energy conservation mandate',description:'Indonesian PP ESDM requires organizations consuming >6,000 toe/year to implement EnMS and report to government. Telin\'s data centers likely exceed threshold. Non-compliance risk to operating licence.',clause:'4.2',likelihood:3,impact:4,controls:'EnMS programme initiated (2026 new cert). Preliminary energy audit done.',residualL:1,residualI:4,treatment:'treat',owner:'Facility Mgmt',reviewDate:'2026-08-30',treatmentPlan:'Confirm energy consumption figures for regulatory threshold. File statutory energy conservation report with Kementerian ESDM. Use ISO 50001 programme as evidence.',status:'mitigating',notes:''},
  // OHS Risks
  {id:'R-011',standardIds:['iso45001'],category:'Occupational Health & Safety',title:'Submarine cable maintenance — diving fatality or serious injury',description:'Underwater cable maintenance involves commercial diving operations. High consequence, low probability. Fatality or serious injury would trigger regulatory investigation, potential criminal liability, and reputational damage.',clause:'6.1.2',likelihood:1,impact:5,controls:'Diving contractor OHS assessment; basic JSA in place.',residualL:1,residualI:5,treatment:'treat',owner:'HR',reviewDate:'2026-07-15',treatmentPlan:'Expand HIRA to cover marine operations. Implement Diving at Work regulations equivalent. Pre-qualify diving contractors using ISO 45001 criteria. Link to NCR-006.',status:'open',notes:''},
  {id:'R-012',standardIds:['iso45001'],category:'Occupational Health & Safety',title:'SMK3 audit failure — Indonesia statutory OHS requirement',description:'PP 50/2012 requires mandatory SMK3 (Sistem Manajemen K3) audit every 3 years, separate from ISO 45001 CB audit. Failure results in regulatory sanction and potential suspension of operations.',clause:'9.1.2',likelihood:2,impact:4,controls:'ISO 45001 programme in place. SMK3 cross-mapping initiated.',residualL:1,residualI:3,treatment:'treat',owner:'HR',reviewDate:'2026-09-30',treatmentPlan:'Map ISO 45001 controls to PP 50/2012 SMK3 requirements. Schedule SMK3 government audit alongside or after CB surveillance audit. Coordinate with Kemnaker.',status:'mitigating',notes:'SMK3 is a SEPARATE government audit. ISO 45001 does not replace it.'},
  // Cross-cutting
  {id:'R-013',standardIds:['iso27001','iso27701','iso37001','iso20000','iso50001','iso45001'],category:'Reputational',title:'CB audit Major NC — certificate suspension or withdrawal',description:'If CB issues unresolved Major NCs across multiple standards, Telin risks certificate suspension, impacting contractual obligations with hyperscalers, regulatory standing as PSE, and Telkom Group NYSE reporting.',clause:'10.1',likelihood:2,impact:5,controls:'Internal audit programme. Corrective action tracker. Consultant engagement.',residualL:1,residualI:4,treatment:'treat',owner:'Internal Audit',reviewDate:'2026-10-31',treatmentPlan:'Resolve all NCR Tier 1 items before Stage 1. Build Audit Readiness Self-Assessment. Conduct mock CB audit in June 2026.',status:'mitigating',notes:'This is the master risk — all other risks feed into this.'},
  {id:'R-014',standardIds:['iso27001','iso37001'],category:'Legal & Regulatory',title:'CFIUS/Team Telecom action against Telin USA',description:'US government (CFIUS, DOJ, DHS, DoD) could impose conditions or revoke FCC Section 214 authority for Telin USA given Telkom\'s state ownership. Precedent: China Telecom USA revocation 2021.',clause:'4.2',likelihood:2,impact:5,controls:'FCC licence maintained. Legal counsel engaged for Team Telecom review.',residualL:1,residualI:5,treatment:'treat',owner:'Legal',reviewDate:'2026-07-30',treatmentPlan:'Engage specialized US telecom regulatory counsel. Maintain FCPA/ABMS compliance programme. Prepare network security agreement if required. Monitor Team Telecom proceeding.',status:'open',notes:'CRITICAL risk unique to Telin as SOE operating in USA.'},
  {id:'R-015',standardIds:['iso27001'],category:'Legal & Regulatory',title:'SOCI Act (Australia) — CIRMP non-compliance',description:'Telin Australia as a carrier under Security of Critical Infrastructure Act 2018 must have a documented Critical Infrastructure Risk Management Programme (CIRMP). Non-compliance = civil penalties AUD 250,000+.',clause:'4.2',likelihood:3,impact:4,controls:'ISO 27001 programme in place. SOCI CIRMP status unclear.',residualL:2,residualI:4,treatment:'treat',owner:'Legal',reviewDate:'2026-06-30',treatmentPlan:'Confirm Telin Australia SOCI registration and CIRMP obligation with AU legal counsel. Map ISO 27001 controls to CIRMP requirements. File CIRMP with Australian Government.',status:'open',notes:'Separate from ISO 27001. CIRMP is a statutory requirement.'},
];

let _id=SEED.length+1;
const genId=()=>`R-${String(_id++).padStart('3','0')}`;

// Heatmap
function Heatmap({risks}){
  const cells=[];
  for(let i=5;i>=1;i--)for(let l=1;l<=5;l++){
    const s=l*i;
    const r=risks.filter(r=>r.likelihood===l&&r.impact===i);
    cells.push({l,i,s,risks:r});
  }
  return <div>
    <div style={{display:'grid',gridTemplateColumns:'32px repeat(5,1fr)',gap:2}}>
      <div/>
      {[1,2,3,4,5].map(l=><div key={l} style={{textAlign:'center',fontSize:10,fontWeight:700,color:'var(--gray-500)',paddingBottom:4}}>L{l}</div>)}
      {cells.map(({l,i,s,risks:cr},idx)=>[
        l===1&&<div key={`label-${i}`} style={{display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:700,color:'var(--gray-500)',writingMode:'vertical-rl',transform:'rotate(180deg)'}}>I{i}</div>,
        <div key={`${l}-${i}`} style={{background:scoreBg(s),borderRadius:4,padding:'4px',minHeight:52,position:'relative',border:`1px solid ${scoreColor(s)}33`}}>
          <div style={{fontSize:9,fontWeight:700,color:scoreColor(s),marginBottom:2}}>{scoreLabel(s)} {s}</div>
          {cr.map(r=><div key={r.id} title={r.title} style={{fontSize:9,background:scoreColor(s)+'33',borderRadius:2,padding:'1px 3px',marginBottom:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:scoreColor(s)}}>{r.id}</div>)}
        </div>
      ])}
    </div>
    <div style={{display:'flex',gap:8,marginTop:8,fontSize:10}}>
      {[['Critical','#DC2626','#FEE2E2'],['High','#D97706','#FEF3C7'],['Medium','#F59E0B','#FFFBEB'],['Low','#16A34A','#DCFCE7']].map(([l,c,b])=>
        <span key={l} style={{display:'flex',alignItems:'center',gap:3}}><span style={{width:10,height:10,borderRadius:2,background:b,border:`1px solid ${c}44`,display:'inline-block'}}/>Likelihood × Impact = {l}</span>
      )}
    </div>
  </div>;
}

function ScoreBadge({score}){
  return <span style={{background:scoreBg(score),color:scoreColor(score),borderRadius:4,padding:'2px 8px',fontSize:11,fontWeight:800,fontFamily:'var(--mono)'}}>{score} {scoreLabel(score)}</span>;
}

function RiskModal({item,isNew,onSave,onClose}){
  const [f,setF]=useState(item);
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const inherent=f.likelihood*f.impact;
  const residual=f.residualL*f.residualI;
  const Row=({label,children,hint})=><div style={{marginBottom:12}}>
    <label style={{fontSize:11,fontWeight:700,color:'var(--gray-600)',display:'block',marginBottom:4,textTransform:'uppercase',letterSpacing:.4}}>{label}{hint&&<span style={{fontSize:10,fontWeight:400,color:'var(--gray-500)',marginLeft:6}}>({hint})</span>}</label>
    {children}
  </div>;
  const stds=Object.keys(STD_META);
  return <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.45)',zIndex:300,display:'flex',alignItems:'center',justifyContent:'center',padding:20}} onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div style={{background:'#fff',borderRadius:12,boxShadow:'0 20px 60px rgba(0,0,0,.2)',width:'100%',maxWidth:700,maxHeight:'92vh',overflowY:'auto'}}>
      <div style={{padding:'16px 24px',borderBottom:'1px solid var(--gray-200)',display:'flex',justifyContent:'space-between',alignItems:'center',position:'sticky',top:0,background:'#fff',zIndex:1}}>
        <div style={{fontWeight:800,fontSize:16,color:'var(--navy)'}}>{isNew?'Add Risk':'Edit Risk'}</div>
        <div style={{display:'flex',gap:16,alignItems:'center'}}>
          <span style={{fontSize:12,color:'var(--gray-600)'}}>Inherent: <b style={{color:scoreColor(inherent)}}>{inherent}</b> → Residual: <b style={{color:scoreColor(residual)}}>{residual}</b></span>
          <button onClick={onClose} style={{fontSize:22,color:'var(--gray-500)',lineHeight:1,cursor:'pointer'}}>×</button>
        </div>
      </div>
      <div style={{padding:'20px 24px'}}>
        <Row label="Risk Title"><input value={f.title} onChange={e=>set('title',e.target.value)} placeholder="Short risk title" /></Row>
        <Row label="Description"><textarea value={f.description} onChange={e=>set('description',e.target.value)} style={{minHeight:70,resize:'vertical'}} /></Row>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          <Row label="Category"><select value={f.category} onChange={e=>set('category',e.target.value)}>
            {CATEGORIES.map(c=><option key={c}>{c}</option>)}
          </select></Row>
          <Row label="HLS Clause Ref"><input value={f.clause} onChange={e=>set('clause',e.target.value)} placeholder="e.g. 6.1.2" /></Row>
        </div>
        <Row label="Applicable Standards">
          <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
            {stds.map(sid=>{
              const s=STD_META[sid]; const sel=(f.standardIds||[]).includes(sid);
              return <button key={sid} onClick={()=>set('standardIds',sel?(f.standardIds||[]).filter(x=>x!==sid):[...(f.standardIds||[]),sid])} style={{padding:'4px 10px',borderRadius:6,fontSize:11,fontWeight:700,border:`2px solid ${sel?s.color:'var(--gray-300)'}`,background:sel?`${s.color}18`:'#fff',color:sel?s.color:'var(--gray-500)',cursor:'pointer',transition:'all .15s'}}>{s.abbr}</button>;
            })}
          </div>
        </Row>
        <div style={{background:'var(--gray-50)',borderRadius:8,padding:14,marginBottom:12}}>
          <div style={{fontWeight:700,fontSize:12,color:'var(--navy)',marginBottom:10}}>📊 Inherent Risk (before controls)</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12,alignItems:'center'}}>
            <Row label="Likelihood (1-5)"><select value={f.likelihood} onChange={e=>set('likelihood',Number(e.target.value))}>
              {[1,2,3,4,5].map(n=><option key={n} value={n}>{n} — {['Rare','Unlikely','Possible','Likely','Almost Certain'][n-1]}</option>)}
            </select></Row>
            <Row label="Impact (1-5)"><select value={f.impact} onChange={e=>set('impact',Number(e.target.value))}>
              {[1,2,3,4,5].map(n=><option key={n} value={n}>{n} — {['Negligible','Minor','Moderate','Major','Catastrophic'][n-1]}</option>)}
            </select></Row>
            <div style={{textAlign:'center',paddingTop:20}}><ScoreBadge score={inherent} /></div>
          </div>
        </div>
        <Row label="Existing Controls"><textarea value={f.controls} onChange={e=>set('controls',e.target.value)} style={{minHeight:55,resize:'vertical'}} placeholder="List current controls in place" /></Row>
        <div style={{background:'#EFF6FF',borderRadius:8,padding:14,marginBottom:12}}>
          <div style={{fontWeight:700,fontSize:12,color:'var(--navy)',marginBottom:10}}>🎯 Residual Risk (after controls)</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12,alignItems:'center'}}>
            <Row label="Residual Likelihood"><select value={f.residualL} onChange={e=>set('residualL',Number(e.target.value))}>
              {[1,2,3,4,5].map(n=><option key={n} value={n}>{n}</option>)}
            </select></Row>
            <Row label="Residual Impact"><select value={f.residualI} onChange={e=>set('residualI',Number(e.target.value))}>
              {[1,2,3,4,5].map(n=><option key={n} value={n}>{n}</option>)}
            </select></Row>
            <div style={{textAlign:'center',paddingTop:20}}><ScoreBadge score={residual} /></div>
          </div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12}}>
          <Row label="Treatment"><select value={f.treatment} onChange={e=>set('treatment',e.target.value)}>
            {Object.entries(TREATMENTS).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
          </select></Row>
          <Row label="Risk Owner"><select value={f.owner} onChange={e=>set('owner',e.target.value)}>
            {OWNERS.map(o=><option key={o}>{o}</option>)}
          </select></Row>
          <Row label="Next Review Date"><input type="date" value={f.reviewDate} onChange={e=>set('reviewDate',e.target.value)} /></Row>
        </div>
        <Row label="Treatment Plan"><textarea value={f.treatmentPlan} onChange={e=>set('treatmentPlan',e.target.value)} style={{minHeight:70,resize:'vertical'}} /></Row>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          <Row label="Status"><select value={f.status} onChange={e=>set('status',e.target.value)}>
            {Object.entries(RISK_STATUS).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
          </select></Row>
          <Row label="Notes"><input value={f.notes} onChange={e=>set('notes',e.target.value)} /></Row>
        </div>
      </div>
      <div style={{padding:'14px 24px',borderTop:'1px solid var(--gray-200)',display:'flex',justifyContent:'flex-end',gap:10,position:'sticky',bottom:0,background:'#fff'}}>
        <button onClick={onClose} style={{padding:'8px 18px',borderRadius:7,border:'1px solid var(--gray-300)',color:'var(--gray-700)',fontSize:13,fontWeight:600,cursor:'pointer'}}>Cancel</button>
        <button onClick={()=>onSave(f)} disabled={!f.title} style={{padding:'8px 20px',borderRadius:7,background:f.title?'var(--navy)':'var(--gray-200)',color:f.title?'#fff':'var(--gray-500)',fontSize:13,fontWeight:700,cursor:f.title?'pointer':'not-allowed'}}>{isNew?'Add Risk':'Save Changes'}</button>
      </div>
    </div>
  </div>;
}

function App(){
  const [items,setItems]=useState(()=>GRCStore.getRisks());
  const [modal,setModal]=useState(null);
  const [view,setView]=useState('table');
  const [filterStd,setFilterStd]=useState('');
  const [filterCat,setFilterCat]=useState('');
  const [filterStatus,setFilterStatus]=useState('');
  const [expandedId,setExpandedId]=useState(null);

  useEffect(()=>{ const h=()=>setItems(GRCStore.getRisks()); GRCStore.on('change',h); return ()=>GRCStore.off('change',h); },[]);

  const filtered=useMemo(()=>items.filter(r=>{
    if(filterStd&&!(r.standardIds||[]).includes(filterStd))return false;
    if(filterCat&&r.category!==filterCat)return false;
    if(filterStatus&&r.status!==filterStatus)return false;
    return true;
  }),[items,filterStd,filterCat,filterStatus]);

  const criticalCount=items.filter(r=>r.likelihood*r.impact>=16).length;
  const highCount=items.filter(r=>{const s=r.likelihood*r.impact;return s>=9&&s<16;}).length;
  const openCount=items.filter(r=>r.status==='open').length;
  const avgResidual=(items.reduce((a,r)=>a+r.residualL*r.residualI,0)/items.length).toFixed(1);

  const save=(form)=>{
    GRCStore.upsertRisk(modal.isNew?form:{...modal.item,...form});
    setItems(GRCStore.getRisks());
    setModal(null);
  };

  const blank={standardIds:['iso27001'],category:'Information Security',title:'',description:'',clause:'6.1.2',likelihood:3,impact:3,controls:'',residualL:2,residualI:2,treatment:'treat',owner:'IT Security',reviewDate:'',treatmentPlan:'',status:'open',notes:''};

  return <div style={{minHeight:'100vh',background:'var(--gray-50)'}}>
    {/* Notion-Style Header */}
    <div style={{background:'#fff', borderBottom:'1px solid var(--gray-200)', padding:'24px 28px'}}>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:24}}>
        <div>
          <div style={{display:'flex', alignItems:'center', gap:8, color:'var(--gray-500)', fontSize:12, marginBottom:4}}>
            <span>ISO Certification 2026</span>
            <span>/</span>
            <span style={{fontWeight:600, color:'var(--gray-900)'}}>Risk Register</span>
          </div>
          <div style={{fontSize:24, fontWeight:800, color:'var(--gray-900)', letterSpacing:'-0.5px'}}>Enterprise Risk Register</div>
          <div style={{fontSize:13, color:'var(--gray-500)', marginTop:4}}>All 7 Standards · Likelihood × Impact Assessment</div>
        </div>
        <div style={{display:'flex', gap:10}}>
          <button onClick={()=>setModal({item:blank,isNew:true})} style={{padding:'8px 20px', borderRadius:'var(--radius-pill)', background:'var(--navy)', color:'#fff', fontWeight:700, fontSize:13, border:'none', boxShadow:'var(--shadow-sm)'}}>+ New Risk</button>
          <a href="Dashboard.html" style={{padding:'8px 16px', borderRadius:6, border:'1px solid var(--gray-200)', color:'var(--gray-700)', textDecoration:'none', fontSize:13, fontWeight:600, display:'flex', alignItems:'center', gap:6}}>
            <span>←</span> Dashboard
          </a>
        </div>
      </div>

      {/* Bento Highlights */}
      <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(130px, 1fr))', gap:16, marginBottom:8}}>
        {[
          { label: 'Total Risks', val: items.length, color: 'var(--gray-900)', sub: 'Assessed threats' },
          { label: 'Critical Risks', val: criticalCount, color: '#E2001A', sub: 'Urgent mitigation' },
          { label: 'High Risks', val: highCount, color: '#D97706', sub: 'Prioritized action' },
          { label: 'Open / Unmitigated', val: openCount, color: '#DC2626', sub: 'Residual exposure' },
          { label: 'Avg Residual', val: avgResidual, color: '#059669', sub: 'Post-control health' },
        ].map(kpi => (
          <div key={kpi.label} style={{
            background: '#fff', border: '1px solid var(--gray-200)', borderRadius: 'var(--radius-lg)',
            padding: '16px 20px', transition: 'all 0.2s',
            boxShadow: '0 1px 2px rgba(0,0,0,0.05)'
          }}
          onMouseEnter={e => { e.currentTarget.style.borderColor = '#d4d4d4'; e.currentTarget.style.background = '#f9fafb'; }}
          onMouseLeave={e => { e.currentTarget.style.borderColor = 'var(--gray-200)'; e.currentTarget.style.background = '#fff'; }}
          >
            <div style={{fontSize:10, fontWeight:700, color:'var(--gray-500)', textTransform:'uppercase', letterSpacing:0.8, marginBottom:8}}>{kpi.label}</div>
            <div style={{fontSize:28, fontWeight:800, color:kpi.color, lineHeight:1, letterSpacing:'-1px'}}>{kpi.val}</div>
            <div style={{fontSize:11, color:'var(--gray-500)', marginTop:6, fontWeight:500}}>{kpi.sub}</div>
          </div>
        ))}
      </div>
    </div>

    {/* Filters */}
    <div style={{background:'#fff',borderBottom:'1px solid var(--gray-200)',padding:'10px 28px',display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
      <select value={filterStd} onChange={e=>setFilterStd(e.target.value)} style={{width:'auto',padding:'6px 10px',fontSize:12}}>
        <option value="">All Standards</option>
        {Object.entries(STD_META).map(([k,v])=><option key={k} value={k}>{v.abbr}</option>)}
      </select>
      <select value={filterCat} onChange={e=>setFilterCat(e.target.value)} style={{width:'auto',padding:'6px 10px',fontSize:12}}>
        <option value="">All Categories</option>
        {CATEGORIES.map(c=><option key={c}>{c}</option>)}
      </select>
      <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)} style={{width:'auto',padding:'6px 10px',fontSize:12}}>
        <option value="">All Statuses</option>
        {Object.entries(RISK_STATUS).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
      </select>
      {(filterStd||filterCat||filterStatus)&&<button onClick={()=>{setFilterStd('');setFilterCat('');setFilterStatus('');}} style={{fontSize:12,color:'var(--red)',fontWeight:600,padding:'4px 8px',cursor:'pointer'}}>Clear ×</button>}
      <span style={{marginLeft:'auto',fontSize:12,color:'var(--gray-500)'}}>{filtered.length} risks</span>
    </div>

    <div style={{padding:'20px 28px'}}>
      {view==='heatmap'?(
        <div style={{background:'#fff',borderRadius:'var(--radius)',boxShadow:'var(--shadow)',padding:24}}>
          <div style={{fontWeight:700,fontSize:15,color:'var(--navy)',marginBottom:6}}>Risk Heatmap — Inherent Risk (Likelihood × Impact)</div>
          <div style={{fontSize:12,color:'var(--gray-500)',marginBottom:16}}>Showing {filtered.length} risks · X axis = Likelihood, Y axis = Impact</div>
          <Heatmap risks={filtered} />
          <div style={{marginTop:24,fontWeight:700,fontSize:14,color:'var(--navy)',marginBottom:10}}>Risk Details</div>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {filtered.sort((a,b)=>b.likelihood*b.impact-a.likelihood*a.impact).map(r=>{
              const score=r.likelihood*r.impact; const rs=r.residualL*r.residualI;
              const st=RISK_STATUS[r.status];
              return <div key={r.id} style={{display:'flex',gap:12,alignItems:'center',padding:'10px 14px',background:'var(--gray-50)',borderRadius:8,border:`1px solid ${scoreColor(score)}33`}}>
                <span style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--gray-500)',width:60,flexShrink:0}}>{r.id}</span>
                <div style={{flex:1}}>
                  <div style={{fontWeight:600,fontSize:13}}>{r.title}</div>
                  <div style={{display:'flex',gap:6,marginTop:3,flexWrap:'wrap'}}>
                    {(r.standardIds||[]).map(sid=><span key={sid} style={{background:`${STD_META[sid].color}18`,color:STD_META[sid].color,borderRadius:4,padding:'1px 5px',fontSize:10,fontWeight:700}}>{STD_META[sid].abbr}</span>)}
                  </div>
                </div>
                <ScoreBadge score={score} />
                <span style={{fontSize:11,color:'var(--gray-500)'}}>→ Residual:</span>
                <ScoreBadge score={rs} />
                <span style={{background:st.bg,color:st.color,borderRadius:20,padding:'2px 8px',fontSize:11,fontWeight:600}}>{st.label}</span>
              </div>;
            })}
          </div>
        </div>
      ):(
        <div style={{background:'#fff',borderRadius:'var(--radius)',boxShadow:'var(--shadow)',overflow:'hidden'}}>
          <table style={{width:'100%',borderCollapse:'collapse'}}>
            <thead>
              <tr style={{background:'var(--gray-50)',borderBottom:'2px solid var(--gray-200)'}}>
                {['ID','Title','Standards','Category','Inherent','Controls','Residual','Treatment','Owner','Status',''].map(h=>
                  <th key={h} style={{textAlign:'left',padding:'10px 10px',fontSize:11,fontWeight:700,color:'var(--gray-500)',textTransform:'uppercase',letterSpacing:.4,whiteSpace:'nowrap'}}>{h}</th>
                )}
              </tr>
            </thead>
            <tbody>
              {filtered.length===0&&<tr><td colSpan={11} style={{padding:40,textAlign:'center',color:'var(--gray-500)'}}>No risks match your filters.</td></tr>}
              {filtered.map((r,i)=>{
                const score=r.likelihood*r.impact; const rs=r.residualL*r.residualI;
                const st=RISK_STATUS[r.status];
                const expanded=expandedId===r.id;
                return [
                  <tr key={r.id} onClick={()=>setExpandedId(expanded?null:r.id)} style={{borderBottom:'1px solid var(--gray-100)',cursor:'pointer',background:expanded?'var(--gray-50)':'#fff'}}
                    onMouseEnter={e=>!expanded&&(e.currentTarget.style.background='var(--gray-50)')}
                    onMouseLeave={e=>!expanded&&(e.currentTarget.style.background='#fff')}>
                    <td style={{padding:'10px 10px',fontFamily:'var(--mono)',fontSize:11,color:'var(--gray-500)'}}>{r.id}</td>
                    <td style={{padding:'10px 10px',maxWidth:220}}><div style={{fontWeight:600,fontSize:12,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.title}</div></td>
                    <td style={{padding:'10px 10px'}}><div style={{display:'flex',flexWrap:'wrap',gap:3}}>{(r.standardIds||[]).map(sid=><span key={sid} style={{background:`${STD_META[sid].color}18`,color:STD_META[sid].color,borderRadius:4,padding:'1px 5px',fontSize:10,fontWeight:700}}>{STD_META[sid].abbr}</span>)}</div></td>
                    <td style={{padding:'10px 10px',fontSize:11,color:'var(--gray-600)',maxWidth:120}}><div style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.category}</div></td>
                    <td style={{padding:'10px 10px'}}><ScoreBadge score={score} /></td>
                    <td style={{padding:'10px 10px',maxWidth:160,fontSize:11,color:'var(--gray-600)'}}><div style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.controls}</div></td>
                    <td style={{padding:'10px 10px'}}><ScoreBadge score={rs} /></td>
                    <td style={{padding:'10px 10px'}}><span style={{color:TREATMENTS[r.treatment]?.color||'#666',fontSize:11,fontWeight:600}}>{TREATMENTS[r.treatment]?.label||r.treatment}</span></td>
                    <td style={{padding:'10px 10px',fontSize:11,color:'var(--gray-700)',whiteSpace:'nowrap'}}>{r.owner}</td>
                    <td style={{padding:'10px 10px'}}><span style={{background:st.bg,color:st.color,borderRadius:20,padding:'2px 8px',fontSize:11,fontWeight:600}}>{st.label}</span></td>
                    <td style={{padding:'10px 10px'}} onClick={e=>{e.stopPropagation();setModal({item:r,isNew:false});}}><button style={{padding:'4px 10px',borderRadius:5,border:'1px solid var(--gray-300)',fontSize:11,fontWeight:600,color:'var(--gray-700)',cursor:'pointer',background:'#fff'}}>Edit</button></td>
                  </tr>,
                  expanded&&<tr key={`${r.id}-exp`} style={{background:'#F8FAFF',borderBottom:'2px solid var(--gray-200)'}}>
                    <td colSpan={11} style={{padding:'14px 28px'}}>
                      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:14}}>
                        {[{l:'Description',v:r.description},{l:'Treatment Plan',v:r.treatmentPlan||'—'},{l:'Notes',v:r.notes||'—'}].map(f=>
                          <div key={f.l}><div style={{fontSize:10,fontWeight:700,color:'var(--gray-500)',textTransform:'uppercase',marginBottom:4}}>{f.l}</div><div style={{fontSize:12,color:'var(--gray-800)',lineHeight:1.5}}>{f.v}</div></div>
                        )}
                      </div>
                    </td>
                  </tr>
                ];
              })}
            </tbody>
          </table>
        </div>
      )}
    </div>

    <div style={{padding:'12px 28px',borderTop:'1px solid var(--gray-200)',display:'flex',gap:16}}>
      <a href="Dashboard.html" style={{fontSize:12,color:'var(--gray-600)',textDecoration:'none',fontWeight:500}}>← Dashboard</a>
      <a href="NCR Tracker.html" style={{fontSize:12,color:'#2563EB',textDecoration:'none',fontWeight:500}}>NCR Tracker</a>
      <a href="Audit Checklist.html" style={{fontSize:12,color:'#2563EB',textDecoration:'none',fontWeight:500}}>Audit Checklist →</a>
      <button onClick={()=>{if(confirm('Reset risk register?')){GRCStore.reset();setItems(GRCStore.getRisks());}}} style={{marginLeft:'auto',fontSize:12,color:'var(--gray-500)',padding:'4px 10px',borderRadius:5,border:'1px solid var(--gray-300)',cursor:'pointer'}}>Reset Store</button>
    </div>

    {modal&&<RiskModal item={modal.item} isNew={modal.isNew} onSave={save} onClose={()=>setModal(null)} />}
  </div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script></body></html>
