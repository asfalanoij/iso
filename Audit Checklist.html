function App(){
  const [selectedStd,setSelectedStd]=useState('iso27001');
  const [auditDate,setAuditDate]=useState(new Date().toISOString().split('T')[0]);
  const [auditor,setAuditor]=useState('Internal Audit Team');
  const [auditee,setAuditee]=useState('');
  const [responses,setResponses]=useState(()=>GRCStore.get().checklistResponses||{});
  const [showSummary,setShowSummary]=useState(false);

  useEffect(()=>{ const h=()=>setResponses(GRCStore.get().checklistResponses||{}); GRCStore.on('change',h); return ()=>GRCStore.off('change',h); },[]);

  const std=STD_META[selectedStd];
  const questions=CHECKLISTS[selectedStd]||[];
  const getKey=(stdId,idx)=>`${stdId}-${idx}`;
  const getResp=(stdId,idx)=>responses[getKey(stdId,idx)]||{finding:'not-checked',evidence:'',notes:''};
  const setResp=(stdId,idx,field,val)=>{
    const k=getKey(stdId,idx);
    const updated={...getResp(stdId,idx),[field]:val};
    GRCStore.setChecklistResponse(stdId,idx,updated);
  };

  const stats=useMemo(()=>{
    const s={conform:0,nc:0,ofi:0,'n-a':0,'not-checked':0};
    questions.forEach((_,i)=>{const r=getResp(selectedStd,i);s[r.finding]=(s[r.finding]||0)+1;});
    return s;
  },[selectedStd,responses,questions]);

  const pct=questions.length?Math.round((stats.conform+stats['n-a'])/questions.length*100):0;

  const sections=[...new Set(questions.map(q=>q.section))];

  return <div style={{minHeight:'100vh',background:'var(--gray-50)'}}>
    {/* Notion-Style Header */}
    <div style={{background:'#fff', borderBottom:'1px solid var(--gray-200)', padding:'24px 28px'}}>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:24}}>
        <div>
          <div style={{display:'flex', alignItems:'center', gap:8, color:'var(--gray-500)', fontSize:12, marginBottom:4}}>
            <span>ISO Certification 2026</span>
            <span>/</span>
            <span style={{fontWeight:600, color:'var(--gray-900)'}}>Internal Audit Checklist</span>
          </div>
          <div style={{fontSize:24, fontWeight:800, color:'var(--gray-900)', letterSpacing:'-0.5px'}}>Audit Fieldwork: {std.abbr}</div>
          <div style={{fontSize:13, color:'var(--gray-500)', marginTop:4}}>{std.code} · {auditor}</div>
        </div>
        <div style={{display:'flex', gap:10}}>
          <div style={{textAlign:'right'}}>
            <div style={{fontSize:11, color:'var(--gray-400)', fontWeight:700, textTransform:'uppercase'}}>Audit Date</div>
            <input type="date" value={auditDate} onChange={e=>setAuditDate(e.target.value)} style={{border:'none', padding:0, fontSize:13, fontWeight:600, textAlign:'right', color:'var(--gray-700)', background:'transparent'}}/>
          </div>
          <a href="Dashboard.html" style={{padding:'8px 16px', borderRadius:6, border:'1px solid var(--gray-200)', color:'var(--gray-700)', textDecoration:'none', fontSize:13, fontWeight:600, display:'flex', alignItems:'center', gap:6}}>
            <span>←</span> Dashboard
          </a>
        </div>
      </div>

      {/* Bento Highlights */}
      <div style={{display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:16, marginBottom:8}}>
        {[
          { label: 'Overall Compliance', value: `${pct}%`, color: 'var(--gray-900)', sub: 'Conformance Score' },
          { label: 'Conform', value: stats.conform, color: '#059669', sub: 'Requirements Met' },
          { label: 'Non-Conformity', value: stats.nc, color: '#E2001A', sub: 'Action Required' },
          { label: 'Observations', value: stats.ofi, color: '#2563EB', sub: 'Opportunities for Imp.' },
        ].map(kpi => (
          <div key={kpi.label} style={{
            background: '#fff', border: '1px solid var(--gray-200)', borderRadius: 'var(--radius-lg)',
            padding: '16px 20px', transition: 'all 0.2s',
            boxShadow: '0 1px 2px rgba(0,0,0,0.05)'
          }}
          onMouseEnter={e => { e.currentTarget.style.borderColor = '#d4d4d4'; e.currentTarget.style.background = '#f9fafb'; }}
          onMouseLeave={e => { e.currentTarget.style.borderColor = 'var(--gray-200)'; e.currentTarget.style.background = '#fff'; }}
          >
            <div style={{fontSize:10, fontWeight:700, color:'var(--gray-500)', textTransform:'uppercase', letterSpacing:0.8, marginBottom:8}}>{kpi.label}</div>
            <div style={{fontSize:28, fontWeight:800, color:kpi.color, lineHeight:1, letterSpacing:'-1px'}}>{kpi.value}</div>
            <div style={{fontSize:11, color:'var(--gray-500)', marginTop:6, fontWeight:500}}>{kpi.sub}</div>
          </div>
        ))}
      </div>
    </div>

    {/* Metadata & Standard Selector */}
    <div style={{background:'var(--gray-50)', borderBottom:'1px solid var(--gray-200)', padding:'12px 28px', display:'flex', gap:24, alignItems:'center'}}>
      <div style={{display:'flex', gap:4}}>
        {Object.entries(STD_META).map(([k,v])=>{
          const sel=selectedStd===k;
          return <button key={k} onClick={()=>setSelectedStd(k)} style={{
            padding:'5px 12px', borderRadius:6, fontSize:12, fontWeight:700, 
            border:`1px solid ${sel?v.color:'transparent'}`, 
            background:sel?`${v.color}10`:'transparent', 
            color:sel?v.color:'var(--gray-500)', 
            cursor:'pointer', transition:'all .1s'
          }}>{v.abbr}</button>;
        })}
      </div>
      <div style={{height:20, width:1, background:'var(--gray-300)'}} />
      <div style={{display:'flex', gap:16, alignItems:'center'}}>
        <div style={{display:'flex', gap:8, alignItems:'center'}}>
          <span style={{fontSize:11, fontWeight:700, color:'var(--gray-400)', textTransform:'uppercase'}}>Auditee</span>
          <input value={auditee} onChange={e=>setAuditee(e.target.value)} placeholder="Dept/Owner" style={{border:'none', background:'transparent', padding:0, fontSize:12, fontWeight:600, width:140}}/>
        </div>
      </div>
    </div>

    {/* Progress bar */}
    <div style={{background:'#fff',borderBottom:'1px solid var(--gray-200)',padding:'0 28px'}}>
      <div style={{height:4,background:'var(--gray-200)'}}>
        <div style={{height:'100%',width:`${pct}%`,background:std.color,transition:'width .3s',borderRadius:2}}/>
      </div>
    </div>

    {/* Checklist */}
    <div style={{padding:'20px 28px'}}>
      {sections.map(section=>{
        const sectionQs=questions.map((q,i)=>({...q,idx:i})).filter(q=>q.section===section);
        const sNc=sectionQs.filter(q=>getResp(selectedStd,q.idx).finding==='nc').length;
        return <div key={section} style={{marginBottom:20}}>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10,padding:'8px 14px',background:sNc>0?'#FFF1F2':'var(--gray-100)',borderRadius:8,borderLeft:`3px solid ${sNc>0?'var(--red)':std.color}`}}>
            <span style={{fontWeight:700,fontSize:13,color:'var(--navy)'}}>{section}</span>
            {sNc>0&&<span style={{fontSize:11,color:'var(--red)',fontWeight:700}}>⚠ {sNc} NC{sNc>1?'s':''}</span>}
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:6}}>
            {sectionQs.map(({question,clause,method,evidenceRef,idx})=>{
              const resp=getResp(selectedStd,idx);
              const f=FINDINGS[resp.finding];
              const isNC=resp.finding==='nc';
              return <div key={idx} style={{background:'#fff',borderRadius:8,border:`1px solid ${isNC?'#FECDCD':'var(--gray-200)'}`,overflow:'hidden',boxShadow:'var(--shadow)'}}>
                <div style={{display:'grid',gridTemplateColumns:'1fr auto',gap:10,padding:'12px 14px'}}>
                  <div>
                    <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:6}}>
                      <span style={{fontFamily:'var(--mono)',fontSize:10,color:std.color,fontWeight:700,background:`${std.color}18`,borderRadius:4,padding:'1px 6px'}}>{clause}</span>
                      <span style={{fontSize:10,color:'var(--gray-500)',background:'var(--gray-100)',borderRadius:4,padding:'1px 6px'}}>{method}</span>
                      <span style={{fontSize:10,color:'var(--gray-500)'}}>Evidence: <em>{evidenceRef}</em></span>
                    </div>
                    <div style={{fontWeight:500,fontSize:12,color:'var(--gray-900)',lineHeight:1.5}}>{question}</div>
                  </div>
                  <div style={{display:'flex',gap:4,flexDirection:'column',alignItems:'flex-end',flexShrink:0}}>
                    <div style={{display:'flex',gap:3}}>
                      {Object.entries(FINDINGS).map(([k,v])=>
                        <button key={k} onClick={()=>setResp(selectedStd,idx,'finding',k)}
                          style={{width:36,height:28,borderRadius:5,border:`2px solid ${resp.finding===k?v.color:'var(--gray-200)'}`,background:resp.finding===k?v.bg:'#fff',color:resp.finding===k?v.color:'var(--gray-400)',fontSize:11,fontWeight:700,cursor:'pointer',transition:'all .1s'}}>
                          {v.icon}
                        </button>
                      )}
                    </div>
                    <span style={{background:f.bg,color:f.color,borderRadius:20,padding:'2px 8px',fontSize:10,fontWeight:700}}>{f.label}</span>
                  </div>
                </div>
                {(resp.finding!=='not-checked'&&resp.finding!=='n-a')&&
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,padding:'8px 14px 12px',background:'var(--gray-50)',borderTop:'1px solid var(--gray-200)'}}>
                    <div>
                      <div style={{fontSize:10,fontWeight:700,color:'var(--gray-500)',marginBottom:3,textTransform:'uppercase'}}>Evidence Sampled</div>
                      <input value={resp.evidence} onChange={e=>setResp(selectedStd,idx,'evidence',e.target.value)} placeholder="Document ref, record no., system..." style={{fontSize:11}}/>
                    </div>
                    <div>
                      <div style={{fontSize:10,fontWeight:700,color:isNC?'var(--red)':'var(--gray-500)',marginBottom:3,textTransform:'uppercase'}}>{isNC?'⚠ Finding / Objective Evidence':'Notes'}</div>
                      <input value={resp.notes} onChange={e=>setResp(selectedStd,idx,'notes',e.target.value)} placeholder={isNC?'Describe the nonconformity with objective evidence...':'Auditor notes...'} style={{fontSize:11,borderColor:isNC?'#FECDCD':'var(--gray-300)'}}/>
                    </div>
                  </div>
                }
              </div>;
            })}
          </div>
        </div>;
      })}

      {/* Summary / Export hint */}
      <div style={{background:'#fff',borderRadius:'var(--radius)',boxShadow:'var(--shadow)',padding:20,marginTop:8}}>
        <div style={{fontWeight:700,fontSize:14,color:'var(--navy)',marginBottom:10}}>Audit Summary — {std.code}</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:12,marginBottom:14}}>
          {Object.entries(FINDINGS).map(([k,v])=><div key={k} style={{background:v.bg,borderRadius:8,padding:'10px',textAlign:'center'}}>
            <div style={{fontSize:22,fontWeight:800,color:v.color}}>{stats[k]||0}</div>
            <div style={{fontSize:11,color:v.color,fontWeight:600}}>{v.label}</div>
          </div>)}
        </div>
        <div style={{display:'flex',gap:10,alignItems:'center'}}>
          <div style={{fontSize:12,color:'var(--gray-600)'}}>Auditor: <b>{auditor}</b> · Auditee: <b>{auditee||'—'}</b> · Date: <b>{auditDate}</b> · Standard: <b style={{color:std.color}}>{std.abbr}</b></div>
          <button onClick={()=>{
            const ncs=questions.filter((_,i)=>getResp(selectedStd,i).finding==='nc');
            if(ncs.length===0){alert('No NCs found — great audit result!');}
            else{alert(`${ncs.length} NC(s) found:\n\n${ncs.map((q,i)=>`${i+1}. [${q.clause}] ${q.question.substring(0,80)}...\nEvidence: ${getResp(selectedStd,questions.indexOf(q)).evidence||'None'}\nNotes: ${getResp(selectedStd,questions.indexOf(q)).notes||'None'}`).join('\n\n')}`);}
          }} style={{marginLeft:'auto',padding:'7px 14px',borderRadius:6,background:'var(--navy)',color:'#fff',fontSize:12,fontWeight:700,cursor:'pointer'}}>View NC Summary</button>
          <button onClick={()=>{if(confirm(`Reset all responses for ${std.abbr}?`)){const newR={...responses};questions.forEach((_,i)=>delete newR[getKey(selectedStd,i)]);setResponses(newR);}}} style={{padding:'7px 14px',borderRadius:6,border:'1px solid var(--gray-300)',color:'var(--gray-600)',fontSize:12,fontWeight:600,cursor:'pointer'}}>Reset {std.abbr}</button>
        </div>
      </div>
    </div>

    <div style={{padding:'12px 28px',borderTop:'1px solid var(--gray-200)',display:'flex',gap:16}}>
      <a href="Dashboard.html" style={{fontSize:12,color:'var(--gray-600)',textDecoration:'none',fontWeight:500}}>← Dashboard</a>
      <a href="NCR Tracker.html" style={{fontSize:12,color:'#2563EB',textDecoration:'none',fontWeight:500}}>NCR Tracker</a>
      <a href="Legal Register.html" style={{fontSize:12,color:'#2563EB',textDecoration:'none',fontWeight:500}}>Legal Register</a>
    </div>
  </div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script></body></html>
